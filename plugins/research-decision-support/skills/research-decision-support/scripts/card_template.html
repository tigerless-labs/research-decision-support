<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>card reader</title>
<style>
:root {
  --surface: #fcfcfb; --page: #f9f9f7;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --ring: rgba(11,11,11,0.10);
  --c-sources: #2a78d6; --c-synthesis: #1baf7a; --c-ideas: #eda100;
  --c-ok: #008300; --c-decisions: #4a3aa7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface: #1a1a19; --page: #0d0d0d;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --ring: rgba(255,255,255,0.10);
    --c-sources: #3987e5; --c-synthesis: #199e70; --c-ideas: #c98500;
    --c-ok: #008300; --c-decisions: #9085e9;
  }
}
:root[data-theme="light"] {
  --surface: #fcfcfb; --page: #f9f9f7;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --ring: rgba(11,11,11,0.10);
  --c-sources: #2a78d6; --c-synthesis: #1baf7a; --c-ideas: #eda100;
  --c-ok: #008300; --c-decisions: #4a3aa7;
}
:root[data-theme="dark"] {
  --surface: #1a1a19; --page: #0d0d0d;
  --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
  --grid: #2c2c2a; --ring: rgba(255,255,255,0.10);
  --c-sources: #3987e5; --c-synthesis: #199e70; --c-ideas: #c98500;
  --c-ok: #008300; --c-decisions: #9085e9;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--page); color: var(--ink);
  font: 15px/1.65 system-ui, -apple-system, "Segoe UI", sans-serif;
}
a { color: inherit; }
.sitenav {
  max-width: 880px; margin: 0 auto; padding: 14px 24px 0;
  display: flex; gap: 4px; align-items: center;
}
.sitenav .brand { font-weight: 700; margin-right: 10px; }
.sitenav a {
  text-decoration: none; color: var(--ink-2); padding: 5px 11px; border-radius: 999px;
  border: 1px solid transparent;
}
.sitenav a.on { background: var(--surface); border-color: var(--grid); color: var(--ink); }
.sitenav .spacer { flex: 1; }
.sitenav button { background: none; border: none; color: var(--muted); cursor: pointer; font: inherit; }
main { max-width: 880px; margin: 0 auto; padding: 10px 24px 48px; }
.meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 18px 0 6px; }
.badge {
  font-size: 11px; color: var(--ink-2); border: 1px solid var(--grid);
  border-radius: 999px; padding: 1px 8px; white-space: nowrap;
}
.badge.layer { color: #fff; border: none; background: var(--layer-color); }
.meta .raw { margin-left: auto; font-size: 12px; color: var(--muted); }
article {
  background: var(--surface); border: 1px solid var(--grid); border-radius: 14px;
  padding: 10px 34px 26px;
}
article h1 { font-size: 24px; line-height: 1.3; }
article h1, article h2, article h3 { margin-top: 1.3em; }
article h2 { font-size: 19px; border-bottom: 1px solid var(--grid); padding-bottom: 4px; }
article h3 { font-size: 16px; }
article a { color: var(--c-sources); text-decoration: none; }
article a:hover { text-decoration: underline; }
article code {
  background: var(--page); border: 1px solid var(--grid); border-radius: 5px;
  padding: 1px 5px; font-size: 0.88em;
}
article pre {
  background: var(--page); border: 1px solid var(--grid); border-radius: 10px;
  padding: 13px 16px; overflow-x: auto;
}
article pre code { background: none; border: none; padding: 0; }
article blockquote {
  margin: 1em 0; padding: 2px 16px; border-left: 3px solid var(--grid); color: var(--ink-2);
}
article table { border-collapse: collapse; display: block; overflow-x: auto; }
article th, article td { border: 1px solid var(--grid); padding: 6px 11px; }
article th { background: var(--page); }
article img { max-width: 100%; }
article hr { border: none; border-top: 1px solid var(--grid); }
.rel-row { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; margin-top: 12px; }
.rel-row .rel-label { color: var(--muted); font-size: 11.5px; min-width: 74px; }
a.badge { text-decoration: none; }
a.badge:hover { border-color: var(--ink-2); }
.dirlist h2 { font-size: 15px; margin: 22px 0 8px; color: var(--ink-2); }
.dirlist a { display: block; padding: 4px 0; text-decoration: none; }
.dirlist a:hover { text-decoration: underline; }
footer { max-width: 880px; margin: 0 auto; padding: 0 24px 32px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<!--__NAV__-->
<main>
  <div class="meta" id="meta"></div>
  <article id="content"></article>
  <div id="relations"></div>
</main>
<footer>Rendered with <a href="https://github.com/markedjs/marked">marked</a> +
<a href="https://github.com/cure53/DOMPurify">DOMPurify</a> (MIT, embedded) ·
the markdown file stays the single source of truth.</footer>
<script>/*__MARKED__*/</script>
<script>/*__PURIFY__*/</script>
<script>
const DATA = /*__DATA__*/null;

const nodeById = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));
const outEdges = {}, inEdges = {};
DATA.edges.forEach(e => {
  (outEdges[e.from] = outEdges[e.from] || []).push(e.to);
  (inEdges[e.to] = inEdges[e.to] || []).push(e.from);
});
const el = (tag, cls, text) => {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
};
const layerColor = layer =>
  getComputedStyle(document.documentElement).getPropertyValue("--c-" + layer).trim();
const cardUrl = id => "card.html#" + encodeURIComponent(id);
const rawUrl = id => DATA.workspace_rel + "/" + id;

function resolvePath(baseId, rel) {
  const parts = baseId.split("/").slice(0, -1).concat(rel.split("/"));
  const out = [];
  for (const part of parts) {
    if (part === "." || part === "") continue;
    if (part === "..") out.pop(); else out.push(part);
  }
  return out.join("/");
}

const meta = document.getElementById("meta");
const content = document.getElementById("content");
const relations = document.getElementById("relations");

function chipLink(id) {
  const n = nodeById[id];
  const a = el("a", "badge", n ? n.title : id);
  a.href = cardUrl(id);
  return a;
}

function renderDirectory() {
  document.title = DATA.title + " — cards";
  meta.replaceChildren(el("span", "badge", DATA.nodes.length + " cards"));
  content.replaceChildren(el("h1", "", DATA.title + " — all cards"));
  relations.replaceChildren();
  DATA.layers.forEach(layer => {
    const members = DATA.nodes.filter(n => n.layer === layer);
    if (!members.length) return;
    const section = el("div", "dirlist");
    section.append(el("h2", "", layer.toUpperCase() + " · " + members.length));
    members.forEach(n => {
      const a = el("a", "", n.title + (n.subtype ? "  (" + n.subtype + ")" : ""));
      a.href = cardUrl(n.id);
      section.append(a);
    });
    content.append(section);
  });
}

function renderCard(id) {
  const node = nodeById[id];
  if (!node) return renderDirectory();
  document.title = node.title + " — " + DATA.title;

  meta.replaceChildren();
  const layerBadge = el("span", "badge layer", node.layer);
  layerBadge.style.setProperty("--layer-color", layerColor(node.layer));
  meta.append(layerBadge);
  if (node.subtype) meta.append(el("span", "badge", node.subtype));
  if (node.status) meta.append(el("span", "badge", "status: " + node.status));
  const raw = el("a", "raw", "open raw .md");
  raw.href = rawUrl(id);
  meta.append(raw);

  content.innerHTML = DOMPurify.sanitize(marked.parse(node.body || ""));

  content.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    if (/^[a-z][a-z0-9+.-]*:/i.test(href) || href.startsWith("#")) {
      a.target = "_blank"; a.rel = "noopener";
      return;
    }
    const clean = href.split("#")[0];
    const target = resolvePath(id, clean);
    a.href = nodeById[target] ? cardUrl(target) : rawUrl(target);
  });
  content.querySelectorAll("img[src]").forEach(img => {
    const src = img.getAttribute("src");
    if (!/^[a-z][a-z0-9+.-]*:/i.test(src)) img.src = rawUrl(resolvePath(id, src));
  });

  relations.replaceChildren();
  const cites = outEdges[id] || [], citedBy = inEdges[id] || [];
  if (cites.length) {
    const row = el("div", "rel-row");
    row.append(el("span", "rel-label", "links to"));
    cites.forEach(t => row.append(chipLink(t)));
    relations.append(row);
  }
  if (citedBy.length) {
    const row = el("div", "rel-row");
    row.append(el("span", "rel-label", "linked from"));
    citedBy.forEach(t => row.append(chipLink(t)));
    relations.append(row);
  }
  scrollTo(0, 0);
}

function route() {
  const id = decodeURIComponent(location.hash.slice(1));
  id ? renderCard(id) : renderDirectory();
}
addEventListener("hashchange", route);
route();

document.getElementById("theme-toggle").addEventListener("click", () => {
  const root = document.documentElement;
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  const current = root.dataset.theme || (dark ? "dark" : "light");
  root.dataset.theme = current === "dark" ? "light" : "dark";
});
</script>
</body>
</html>
