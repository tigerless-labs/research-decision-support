<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--__TITLE__--></title>
<style>
:root {
  --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink-2:#52514e;
  --muted:#898781; --grid:#e1e0d9; --ring:rgba(11,11,11,0.10);
  --wash:#f1f1ed; --accent-d:#c2410c;
  --accent-a:#2a78d6; --accent-b:#eda100; --accent-c:#4a3aa7; --positive:#008300;
}
@media (prefers-color-scheme: dark) { :root {
  --surface:#1a1a19; --page:#0d0d0d; --ink:#ffffff; --ink-2:#c3c2b7;
  --muted:#898781; --grid:#2c2c2a; --ring:rgba(255,255,255,0.10);
  --wash:#232322; --accent-d:#e2673a;
  --accent-a:#3987e5; --accent-b:#c98500; --accent-c:#9085e9; --positive:#008300;
}}
:root[data-theme="light"] {
  --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink-2:#52514e;
  --muted:#898781; --grid:#e1e0d9; --ring:rgba(11,11,11,0.10);
  --wash:#f1f1ed; --accent-d:#c2410c;
  --accent-a:#2a78d6; --accent-b:#eda100; --accent-c:#4a3aa7; --positive:#008300;
}
:root[data-theme="dark"] {
  --surface:#1a1a19; --page:#0d0d0d; --ink:#ffffff; --ink-2:#c3c2b7;
  --muted:#898781; --grid:#2c2c2a; --ring:rgba(255,255,255,0.10);
  --wash:#232322; --accent-d:#e2673a;
  --accent-a:#3987e5; --accent-b:#c98500; --accent-c:#9085e9; --positive:#008300;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--page); color:var(--ink);
  font:14px/1.6 system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
header { max-width:1180px; margin:0 auto; padding:30px 24px 6px; }
h1 { margin:0; font-size:21px; letter-spacing:.2px; }
h1 .sub { color:var(--muted); font-weight:400; font-size:14px; margin-left:10px; }
.tabs { display:flex; gap:6px; margin-bottom:12px; }
.tab { border:1px solid var(--grid); background:var(--surface); color:var(--ink-2);
  border-radius:999px; padding:5px 16px; cursor:pointer; font:inherit; font-size:13.5px; }
.tab.on { background:var(--ink); color:var(--page); border-color:var(--ink); }
.controls { max-width:1180px; margin:0 auto; padding:14px 24px 4px;
  display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.chip { border:1px solid var(--grid); background:var(--surface); color:var(--ink-2);
  border-radius:999px; padding:5px 13px; cursor:pointer; font:inherit; font-size:13px; }
.chip.on { background:var(--ink); color:var(--page); border-color:var(--ink); }
.controls input { margin-left:auto; background:var(--surface); color:var(--ink);
  border:1px solid var(--grid); border-radius:9px; padding:7px 12px; font:inherit; width:220px; }
.controls button.theme { background:none; border:none; color:var(--muted); cursor:pointer; font:inherit; }
main { max-width:1180px; margin:0 auto; padding:14px 24px 60px;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:13px; }
.card { background:var(--surface); border:1px solid var(--grid); border-radius:13px;
  padding:15px 16px 13px; cursor:pointer; display:flex; flex-direction:column; gap:8px;
  transition:border-color .12s, transform .12s; }
.card:hover { border-color:var(--ink-2); transform:translateY(-1px); }
.card:focus-visible { outline:2px solid var(--accent-a); outline-offset:2px; }
.card .head { display:flex; gap:8px; align-items:baseline; }
.card .t { font-weight:650; font-size:14.5px; line-height:1.35; text-wrap:balance; }
.badge { font-size:11px; color:var(--ink-2); border:1px solid var(--grid); background:var(--wash);
  border-radius:999px; padding:1px 9px; white-space:nowrap; margin-left:auto; flex:none; }
.card .sum { color:var(--ink-2); font-size:12.5px; margin:0;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
dialog { background:var(--surface); color:var(--ink); border:1px solid var(--grid);
  border-radius:16px; padding:0; width:min(1060px,94vw); max-height:88vh; }
dialog::backdrop { background:rgba(10,10,9,.45); backdrop-filter:blur(2px); }
.dlg { display:grid; grid-template-columns:296px 1fr; max-height:88vh; }
@media (max-width:760px) { .dlg { grid-template-columns:1fr; }
  .rail { border-right:none; border-bottom:1px solid var(--grid); } }
.rail { border-right:1px solid var(--grid); padding:22px 20px; overflow-y:auto;
  background:var(--wash); border-radius:16px 0 0 16px; }
.rail h3 { margin:0 0 4px; font-size:13px; text-transform:uppercase; letter-spacing:.12em;
  color:var(--muted); font-weight:600; }
.rail .hint { color:var(--muted); font-size:12px; margin:0 0 16px; }
.stage { position:relative; padding:0 0 18px 20px; }
.stage::before { content:""; position:absolute; left:5px; top:16px; bottom:-2px; width:2px; background:var(--grid); }
.stage:last-child::before { display:none; }
.stage .mark { position:absolute; left:0; top:4px; width:12px; height:12px; border-radius:50%;
  border:2.5px solid var(--sc); background:var(--surface); }
.stage.filled .mark { background:var(--sc); }
.stage.self .mark { box-shadow:0 0 0 4px color-mix(in srgb, var(--sc) 22%, transparent); }
.stage .sname { font-weight:650; font-size:13px; color:var(--sc); }
.stage .sdesc { color:var(--muted); font-size:11.5px; margin:1px 0 7px; }
.stage a.node { display:block; text-decoration:none; color:var(--ink); background:var(--surface);
  border:1px solid var(--grid); border-radius:9px; padding:6px 10px; margin-bottom:6px;
  font-size:12.5px; line-height:1.4; }
.stage a.node:hover { border-color:var(--sc); }
.stage .none { color:var(--muted); font-size:12px; font-style:italic; }
.content { padding:24px 30px 30px; overflow-y:auto; }
.content .top { display:flex; gap:10px; align-items:baseline; margin-bottom:4px; }
.content .top .badge { margin-left:0; }
.content .top button { margin-left:auto; background:none; border:1px solid var(--grid);
  border-radius:8px; color:var(--ink-2); cursor:pointer; font:inherit; padding:4px 12px; flex:none; }
.md { font-size:14px; }
.md h1 { font-size:19px; margin:.4em 0 .5em; line-height:1.35; text-wrap:balance; }
.md h2 { font-size:15.5px; margin:1.3em 0 .4em; }
.md p, .md li { max-width:72ch; }
.md a { color:var(--accent-a); }
.md table { border-collapse:collapse; font-size:13px; display:block; overflow-x:auto; }
.md th, .md td { border:1px solid var(--grid); padding:5px 10px; text-align:left; }
.md th { background:var(--wash); }
.md code { background:var(--wash); border-radius:5px; padding:1px 5px; font-size:12.5px; }
.md pre { background:var(--wash); border-radius:9px; padding:12px 14px; overflow-x:auto; }
.md blockquote { border-left:3px solid var(--grid); margin:0; padding:2px 14px; color:var(--ink-2); }
#system { max-width:1180px; margin:0 auto; padding:14px 24px 60px; }
.docwrap { background:var(--surface); border:1px solid var(--grid); border-radius:14px;
  padding:18px 22px; margin-bottom:16px; }
.docwrap .mermaid { display:flex; justify-content:center; overflow-x:auto; padding:8px 0; }
.docnav { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px; }
.docnav button { border:1px solid var(--grid); background:var(--surface); color:var(--ink-2);
  border-radius:999px; padding:4px 13px; cursor:pointer; font:inherit; font-size:12.5px; }
.docnav button.on { background:var(--ink); color:var(--page); border-color:var(--ink); }
.empty { border:1.5px dashed var(--grid); border-radius:14px; padding:38px 26px;
  text-align:center; color:var(--muted); }
.empty b { display:block; color:var(--ink-2); font-size:15px; margin-bottom:6px; }
@media (prefers-reduced-motion: reduce) { .card { transition:none; } }
</style>
<header>
  <nav class="tabs">
    <button class="tab" id="tab-src">证据卡</button>
    <button class="tab on" id="tab-ideas">想法卡</button>
    <button class="tab" id="tab-system">系统图</button>
  </nav>
  <h1 id="pagetitle"></h1>
</header>
<div class="controls" id="controls-ideas">
  <input id="q-ideas" type="search" placeholder="搜索标题或摘要…" aria-label="搜索想法卡">
  <button class="theme" id="theme">◐ 主题</button>
</div>
<main id="grid-ideas"></main>
<div class="controls" id="controls-src" style="display:none">
  <input id="q-src" type="search" placeholder="搜索标题或摘要…" aria-label="搜索证据卡">
</div>
<main id="grid-src" style="display:none"></main>
<section id="system" style="display:none"></section>
<dialog id="dlg"><div class="dlg">
  <aside class="rail" id="rail"></aside>
  <section class="content" id="content"></section>
</div></dialog>
<script>/*__MARKED__*/</script>
<script>/*__PURIFY__*/</script>
<script>/*__MERMAID__*/</script>
<script>
const DATA = /*__DATA__*/null;
const byId = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));
const ideaNodes = DATA.nodes.filter(n => n.layer === "ideas");
const srcNodes = DATA.nodes.filter(n => n.layer === "sources");
const outE = {}, inE = {};
DATA.edges.forEach(e => {
  (outE[e.from] = outE[e.from] || []).push(e.to);
  (inE[e.to] = inE[e.to] || []).push(e.from);
});
const rel = (id, layer, dir) => [...new Set(dir[id] || [])]
  .map(i => byId[i]).filter(n => n && n.layer === layer);
const both = (id, layer) => [...new Set([...rel(id, layer, outE), ...rel(id, layer, inE)])];

const el = (tag, cls, text) => { const n = document.createElement(tag);
  if (cls) n.className = cls; if (text !== undefined) n.textContent = text; return n; };

function makeGallery(nodes, controlsEl, gridEl, qInput, showType) {
  const tagCounts = {};
  nodes.forEach(n => (n.tags || []).forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1));
  const tagList = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
  let active = "", q = "";
  const allChip = el("button", "chip on", "全部 " + nodes.length);
  controlsEl.prepend(allChip);
  const chips = [[allChip, ""]];
  tagList.forEach(t => {
    const c = el("button", "chip", "#" + t + " " + tagCounts[t]);
    controlsEl.insertBefore(c, qInput);
    chips.push([c, t]);
  });
  const cards = nodes.map(n => {
    const card = el("article", "card");
    card.tabIndex = 0; card.setAttribute("role", "button");
    const head = el("div", "head");
    const badge = (showType && DATA.subtypeZh[n.subtype] ? DATA.subtypeZh[n.subtype] + " " : "")
      + (n.tags || []).map(t => "#" + t).join(" ");
    head.append(el("span", "t", n.title.replace(/^\[[^\]]*\]\s*/, "")),
                el("span", "badge", badge.trim() || "—"));
    card.append(head, el("p", "sum", n.summary));
    const open = () => openCard(n.id);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
    gridEl.append(card);
    return { n, card };
  });
  function paint() {
    cards.forEach(({ n, card }) => {
      const show = (!active || (n.tags || []).includes(active)) &&
        (!q || (n.title + " " + n.summary + " " + (n.tags || []).join(" "))
          .toLowerCase().includes(q));
      card.style.display = show ? "" : "none";
    });
  }
  chips.forEach(([c, t]) => c.addEventListener("click", () => {
    active = t; chips.forEach(([o]) => o.classList.remove("on"));
    c.classList.add("on"); paint();
  }));
  qInput.addEventListener("input", e => { q = e.target.value.trim().toLowerCase(); paint(); });
}
makeGallery(ideaNodes, document.getElementById("controls-ideas"),
  document.getElementById("grid-ideas"), document.getElementById("q-ideas"), false);
makeGallery(srcNodes, document.getElementById("controls-src"),
  document.getElementById("grid-src"), document.getElementById("q-src"), true);

const dlg = document.getElementById("dlg");
const rail = document.getElementById("rail");
const content = document.getElementById("content");
const STAGES = [
  ["sources", "来源", "材料说了什么", "--accent-a"],
  ["ideas", "想法", "我据此主张什么", "--accent-b"],
];
const EMPTY = { sources: "未链接来源", ideas: "尚未提炼想法" };

function renderMarkdown(container, text, resolveTarget) {
  container.innerHTML = DOMPurify.sanitize(marked.parse(text));
  container.querySelectorAll("a").forEach(a => {
    const href = a.getAttribute("href") || "";
    if (/^https?:/.test(href)) { a.target = "_blank"; a.rel = "noopener"; return; }
    const target = resolveTarget(href);
    if (target) {
      a.href = "#";
      a.addEventListener("click", e => { e.preventDefault(); target(); });
    } else { a.removeAttribute("href"); a.style.opacity = .6; }
  });
}

function resolveRel(fromId, href) {
  if (!/\.md(#|$)/.test(href)) return null;
  const parts = fromId.split("/").slice(0, -1);
  href.split("#")[0].split("/").forEach(seg => {
    if (seg === "..") parts.pop(); else if (seg !== ".") parts.push(seg);
  });
  return parts.join("/");
}

const openTarget = fromId => href => {
  const target = resolveRel(fromId, href);
  if (target && byId[target]) return () => openCard(target);
  if (target && DATA.output[target]) return () => openDoc(target);
  return null;
};

function openCard(id) {
  const n = byId[id]; if (!n) return;
  rail.textContent = "";
  rail.append(el("h3", "", "证据链"), el("p", "hint", "这张卡在 source/idea 两层的位置与链路"));
  const stages = { sources: [], ideas: [] };
  stages[n.layer] = [n];
  if (n.layer !== "sources") stages.sources = both(n.id, "sources");
  if (n.layer !== "ideas") stages.ideas = both(n.id, "ideas");
  STAGES.forEach(([key, label, desc, cvar]) => {
    const wrap = el("div", "stage" + (stages[key].length ? " filled" : "")
      + (n.layer === key ? " self" : ""));
    wrap.style.setProperty("--sc", "var(" + cvar + ")");
    wrap.append(el("span", "mark"),
                el("div", "sname", label + (n.layer === key ? " · 本卡" : "")),
                el("div", "sdesc", desc));
    if (stages[key].length) stages[key].forEach(m => {
      const a = el("a", "node", m.title.replace(/^\[[^\]]*\]\s*/, ""));
      a.href = "#";
      if (m.id === n.id) { a.style.borderColor = "var(--sc)"; a.style.fontWeight = "650"; }
      a.addEventListener("click", e => { e.preventDefault(); if (m.id !== n.id) openCard(m.id); });
      wrap.append(a);
    });
    else wrap.append(el("div", "none", EMPTY[key]));
    rail.append(wrap);
  });
  content.textContent = "";
  const top = el("div", "top");
  top.append(el("span", "badge",
    n.layer + ((n.tags || []).length ? " · " + n.tags.map(t => "#" + t).join(" ") : "")));
  const close = el("button", "", "✕ 关闭");
  close.addEventListener("click", () => dlg.close());
  top.append(close);
  const md = el("div", "md");
  renderMarkdown(md, n.body, openTarget(n.id));
  content.append(top, md);
  content.scrollTop = 0; rail.scrollTop = 0;
  if (!dlg.open) dlg.showModal();
}

function openDoc(path) {
  const text = DATA.output[path]; if (text === undefined) return;
  rail.textContent = "";
  rail.append(el("h3", "", "output 文档"), el("p", "hint", "装配产物 · 点击切换"));
  Object.keys(DATA.output).forEach(p => {
    const wrap = el("div", "stage filled");
    wrap.style.setProperty("--sc", "var(--accent-c)");
    const a = el("a", "node", p.replace(/^output\//, ""));
    a.href = "#";
    if (p === path) { a.style.fontWeight = "650"; a.style.borderColor = "var(--accent-c)"; }
    a.addEventListener("click", e => { e.preventDefault(); openDoc(p); });
    wrap.append(el("span", "mark"), a);
    rail.append(wrap);
  });
  content.textContent = "";
  const top = el("div", "top");
  top.append(el("span", "badge", path));
  const close = el("button", "", "✕ 关闭");
  close.addEventListener("click", () => dlg.close());
  top.append(close);
  const md = el("div", "md");
  renderMarkdown(md, text.replace(/```mermaid[\s\S]*?```/g, ""), openTarget(path));
  content.append(top, md);
  content.scrollTop = 0; rail.scrollTop = 0;
  if (!dlg.open) dlg.showModal();
}

const systemEl = document.getElementById("system");
let systemBuilt = false;
function buildSystem() {
  if (systemBuilt) return; systemBuilt = true;
  const docs = Object.keys(DATA.output);
  if (!docs.length) {
    const seat = el("div", "empty");
    seat.append(el("b", "", "output 还没有生成——这个位置为它留着"),
      el("span", "", "装配由你启动：想法积累到位后，说一声「装配 output」即可。生成后，两边任意改动都会自动同步到另一边。"));
    systemEl.append(seat);
    return;
  }
  const spine = docs.includes("output/system.md") ? "output/system.md" : docs[0];
  const nav = el("div", "docnav");
  systemEl.append(nav);
  const holder = el("div", "");
  systemEl.append(holder);
  function show(path) {
    nav.querySelectorAll("button").forEach(b =>
      b.classList.toggle("on", b.dataset.path === path));
    holder.textContent = "";
    const parts = DATA.output[path].split(/```mermaid\n([\s\S]*?)```/);
    parts.forEach((part, i) => {
      if (!part.trim()) return;
      const wrap = el("div", "docwrap");
      if (i % 2) {
        if (window.mermaid) {
          const pre = el("pre", "mermaid", part);
          wrap.append(pre);
        } else {
          const pre = el("pre", "", part);
          wrap.append(pre);
        }
      } else {
        const md = el("div", "md");
        renderMarkdown(md, part, openTarget(path));
        wrap.append(md);
      }
      holder.append(wrap);
    });
    if (window.mermaid) {
      mermaid.initialize({ startOnLoad: false, securityLevel: "loose",
        theme: document.documentElement.dataset.theme === "dark"
          || (!document.documentElement.dataset.theme
              && matchMedia("(prefers-color-scheme: dark)").matches)
          ? "dark" : "neutral" });
      mermaid.run({ nodes: holder.querySelectorAll(".mermaid") }).then(() => {
        holder.querySelectorAll(".mermaid a").forEach(a => {
          const href = a.getAttribute("href") || a.getAttribute("xlink:href") || "";
          const target = resolveRel(path, href);
          a.addEventListener("click", e => {
            e.preventDefault();
            if (target && DATA.output[target]) openDoc(target);
            else if (target && byId[target]) openCard(target);
          });
        });
      });
    }
  }
  docs.forEach(p => {
    const b = el("button", "", p.replace(/^output\//, ""));
    b.dataset.path = p;
    b.addEventListener("click", () => show(p));
    nav.append(b);
  });
  show(spine);
}

dlg.addEventListener("click", e => { if (e.target === dlg) dlg.close(); });
document.getElementById("theme").addEventListener("click", () => {
  const r = document.documentElement;
  const dark = r.dataset.theme ? r.dataset.theme === "dark"
    : matchMedia("(prefers-color-scheme: dark)").matches;
  r.dataset.theme = dark ? "light" : "dark";
});

const PANES = {
  ideas: ["grid-ideas", "controls-ideas"],
  src: ["grid-src", "controls-src"],
  system: ["system"],
};
const TITLES = {
  ideas: ['想法卡', '只有人能创建 · 存在/归档二态 · 点卡看证据链'],
  src: ['证据卡', 'tag 分组横跨类型 · 点卡查看全文'],
  system: ['系统图', '真身在 output/ · 点图块与链接看细节'],
};
function switchTab(which) {
  Object.entries(PANES).forEach(([k, ids]) => ids.forEach(id => {
    document.getElementById(id).style.display = k === which ? "" : "none";
  }));
  ["ideas", "src", "system"].forEach(k =>
    document.getElementById("tab-" + k).classList.toggle("on", k === which));
  const t = document.getElementById("pagetitle");
  t.textContent = "";
  t.append(TITLES[which][0], Object.assign(el("span", "sub", TITLES[which][1])));
  if (which === "system") buildSystem();
}
["ideas", "src", "system"].forEach(k =>
  document.getElementById("tab-" + k).addEventListener("click", () => switchTab(k)));
switchTab("ideas");
</script>
