<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>loom card</title>
<style>
:root {
  --surface: #fcfcfb; --page: #f9f9f7;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --ring: rgba(11,11,11,0.10);
  --c-sources: #2a78d6; --c-synthesis: #1baf7a; --c-ideas: #eda100;
  --c-design: #008300; --c-decisions: #4a3aa7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface: #1a1a19; --page: #0d0d0d;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --ring: rgba(255,255,255,0.10);
    --c-sources: #3987e5; --c-synthesis: #199e70; --c-ideas: #c98500;
    --c-design: #008300; --c-decisions: #9085e9;
  }
}
:root[data-theme="light"] {
  --surface: #fcfcfb; --page: #f9f9f7;
  --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
  --grid: #e1e0d9; --ring: rgba(11,11,11,0.10);
  --c-sources: #2a78d6; --c-synthesis: #1baf7a; --c-ideas: #eda100;
  --c-design: #008300; --c-decisions: #4a3aa7;
}
:root[data-theme="dark"] {
  --surface: #1a1a19; --page: #0d0d0d;
  --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
  --grid: #2c2c2a; --ring: rgba(255,255,255,0.10);
  --c-sources: #3987e5; --c-synthesis: #199e70; --c-ideas: #c98500;
  --c-design: #008300; --c-decisions: #9085e9;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--page); color: var(--ink);
  font: 15px/1.65 system-ui, -apple-system, "Segoe UI", sans-serif;
}
a { color: inherit; }
.sitenav {
  max-width: 880px; margin: 0 auto; padding: 14px 24px 0;
  display: flex; gap: 4px; align-items: center;
}
.sitenav .brand { font-weight: 700; margin-right: 10px; }
.sitenav a {
  text-decoration: none; color: var(--ink-2); padding: 5px 11px; border-radius: 999px;
  border: 1px solid transparent;
}
.sitenav a.on { background: var(--surface); border-color: var(--grid); color: var(--ink); }
.sitenav .spacer { flex: 1; }
.sitenav button { background: none; border: none; color: var(--muted); cursor: pointer; font: inherit; }
main { max-width: 880px; margin: 0 auto; padding: 10px 24px 48px; }
.meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 18px 0 6px; }
.badge {
  font-size: 11px; color: var(--ink-2); border: 1px solid var(--grid);
  border-radius: 999px; padding: 1px 8px; white-space: nowrap;
}
.badge.layer { color: #fff; border: none; background: var(--layer-color); }
.meta .raw { margin-left: auto; font-size: 12px; color: var(--muted); }
article {
  background: var(--surface); border: 1px solid var(--grid); border-radius: 14px;
  padding: 10px 34px 26px;
}
article h1 { font-size: 24px; line-height: 1.3; }
article h1, article h2, article h3 { margin-top: 1.3em; }
article h2 { font-size: 19px; border-bottom: 1px solid var(--grid); padding-bottom: 4px; }
article h3 { font-size: 16px; }
article a { color: var(--c-sources); text-decoration: none; }
article a:hover { text-decoration: underline; }
article code {
  background: var(--page); border: 1px solid var(--grid); border-radius: 5px;
  padding: 1px 5px; font-size: 0.88em;
}
article pre {
  background: var(--page); border: 1px solid var(--grid); border-radius: 10px;
  padding: 13px 16px; overflow-x: auto;
}
article pre code { background: none; border: none; padding: 0; }
article blockquote {
  margin: 1em 0; padding: 2px 16px; border-left: 3px solid var(--grid); color: var(--ink-2);
}
article table { border-collapse: collapse; display: block; overflow-x: auto; }
article th, article td { border: 1px solid var(--grid); padding: 6px 11px; }
article th { background: var(--page); }
article img { max-width: 100%; }
article hr { border: none; border-top: 1px solid var(--grid); }
.rel-row { display: flex; gap: 6px; align-items: baseline; flex-wrap: wrap; margin-top: 12px; }
.rel-row .rel-label { color: var(--muted); font-size: 11.5px; min-width: 74px; }
a.badge { text-decoration: none; }
a.badge:hover { border-color: var(--ink-2); }
.dirlist h2 { font-size: 15px; margin: 22px 0 8px; color: var(--ink-2); }
.dirlist a { display: block; padding: 4px 0; text-decoration: none; }
.dirlist a:hover { text-decoration: underline; }
footer { max-width: 880px; margin: 0 auto; padding: 0 24px 32px; color: var(--muted); font-size: 12px; }
</style>
</head>

<script>
const DATA = {"nodes": [{"id": "design/architecture.md", "layer": "design", "subtype": "", "title": "代码架构：autoharness 作为单个 Claude Code plugin", "status": "", "summary": "最终形态是一个可经 marketplace 安装的 Claude Code plugin。三条铁律定全局：代码只一份——住 plugin、装到 `~/.claude/plugins/cache/`，host-agnostic、跨仓共用，绝不按层复制；执行只从 plugin 的 hook 全局层发起——官方单 dispatcher 模式，凡 pipeline 的执行步都收进这一个大模块；只有数据/状态分 global/repo——落宿主对应目录。config 单点，更新/维护逻辑 write-once、层只作入参。各步行为边界见 spine 与 per-m", "body": "# 代码架构：autoharness 作为单个 Claude Code plugin\n\n最终形态是**一个可经 marketplace 安装的 Claude Code plugin**。三条铁律定全局：**代码只一份**——住 plugin、装到 `~/.claude/plugins/cache/`，host-agnostic、跨仓共用，绝不按层复制；**执行只从 plugin 的 hook 全局层发起**——官方单 dispatcher 模式，凡 pipeline 的执行步都收进这一个大模块；**只有数据/状态分 global/repo**——落宿主对应目录。config 单点，更新/维护逻辑 write-once、层只作入参。各步行为边界见 [spine](spine.md) 与 per-module 文档，本文只定**代码怎么摆**。\n\n## 文件树（plugin = 代码唯一家）\n\n```\nautoharness/                         # plugin 根（装到 ~/.claude/plugins/cache/autoharness）\n├── .claude-plugin/\n│   └── plugin.json                  # 清单：名称 / 版本 / 组件登记\n├── hooks/\n│   └── hooks.json                   # 把所有事件 → 单一 dispatcher（${CLAUDE_PLUGIN_ROOT}）\n├── agents/\n│   └── reflector.md                 # REF 运行载体；tools 收窄到 Read / Grep / Glob / stage_skill\n├── .mcp.json                        # 登记 stage_skill MCP（reflector 的写专用面）\n└── src/autoharness/                 # ★ 代码唯一家（单份、跨层共用，layer 只作入参）\n    ├── config.py                    # ★ 全部旋钮单点：节奏 / 成熟阈值 / 上限(分层) / 红线集 / format spec 指针\n    ├── hook/                        # ★ 唯一执行层：hook 操作 + 被其驱动的 pipeline 步，全在此一个大模块\n    │   ├── dispatch.py              #     单入口：按事件名路由（hooks.json 只指它）\n    │   ├── on_stop.py               #     CAP 触发：递归 guard + 计数闸\n    │   ├── on_session_end.py        #     CAP flush 余量\n    │   ├── on_session_start.py      #     MNG 惰性重算 + 孤儿 / .tmp GC\n    │   ├── on_skill_call.py         #     MNG 分子 +1（PreToolUse(Skill) 埋点）\n    │   ├── capture.py               #     CAP 步：指针索引 + egress 脱敏 + tail-N 物化\n    │   ├── spawn.py                 #     确定性拼装 reflector 输入(episode 窗 + 描述索引 + format_spec) → detached spawn → 返回接 promoter\n    │   └── promoter.py              #     校验·存储步：内存成型 → 内存校验 → 原子落盘\n    ├── stage_skill/\n    │   └── server.py                #   MCP server：emit-intent，schema 强制结构 + LED 字段\n    └── lib/                         # ★ write-once 维护原语（hook 层与 stage_skill 共用同一份）\n        ├── layer.py                 #   由 layer 入参解析 global / repo 落盘位（层显形处之一：路径）\n        ├── atomic.py                #   POSIX 原子写原语（temp 同目录 + os.replace）：skill_store / sidecar / counters 复用\n        ├── skill_store.py           #   skill CRUD：原子写 + 两层 find + 应用 delta + 归档（delete/MNG 共用）\n        ├── sidecar.py               #   sidecar 读写：created_by / 计数 / verification（单一实现）\n        ├── ledger.py                #   LED append-only\n        ├── intent_queue.py          #   per-run intent 队列：append(stage_skill)/ drain(promoter)/ 启动 sweep 孤儿（持久策略见 validate-store 待解，先最小）\n        ├── counters.py              #   CAP 会话计数 + MNG 分子 / 分母（单一实现、按层）\n        ├── lifecycle.py             #   MNG：率 + 缓刑 + 容量竞争\n        ├── validate.py              #   确定性 linter 六类（含自产标签）\n        ├── skills_guard.py          #   安全正则扫描\n        ├── redact.py                #   egress 红线集消费者\n        ├── redaction_rules.toml     #   secret/PII 规则集数据：CAP egress 与 LED 共用单一来源（config 指向、redact 消费）\n        └── format_spec.md           #   authoring / lint 单一契约（REF 按它写、linter 按它验）\n```\n\n## 运行时数据（唯一分层的东西，plugin 不持有）\n\n代码以外的一切落宿主，按 storage 类型分两层；状态区 git-ignored，**绝不入 live `skills/` 或 intent 队列以外的盘**。\n\n```\n~/.claude/                           # global 层\n├── skills/\u003csymbol>/                 #   live 符号(global) + 每符号 sidecar（LED / created_by / 计数）\n├── skills/.archive/\u003csymbol>/        #   归档(global)：MNG 移出 live、不删除、可复活（sidecar 随迁）\n└── autoharness/                     #   global 请求计数器（跨仓共写）\n./.claude/                           # repo 层（git-ignored）\n├── skills/\u003csymbol>/                 #   live 符号(project) + sidecar\n├── skills/.archive/\u003csymbol>/        #   归档(project)：同上\n└── autoharness/                     #   CAP 会话计数器 + repo 请求计数器 + per-run intent 队列 + 孤儿 .tmp\n```\n\n## 四条结构轴\n\n- **代码单份 vs 数据分层**：`skill_store` / `sidecar` / `counters` / `lifecycle` 全是一份实现，global 与 repo 走**同一函数**，只把 `layer` 入参喂给 `layer.py` 算落盘位——消灭\"两套维护逻辑\"。**代码逻辑层无关；层只在两处显形：`layer.py` 解析路径、`config` 持分层旋钮值（成熟阈值 / 上限两层各一）**。\n- **执行只在 hook 全局层**：`hook/` 是唯一一个大执行模块，`dispatch` 单入口、每事件一个 `on_*` 文件（CAP 与 MNG 的 handler 都挂这里，**不另起 hook 注册**）、各执行步一个文件（`capture` 属 CAP、`spawn` 是 **REF 的启动载体**、`promoter` 属校验·存储）。`hooks.json` 只指 `dispatch`，决不在别处自起执行。`stage_skill` 因是 reflector 调用的独立 MCP 进程而单列，不属此模块。\n- **config 单点**：`config.py` 是所有旋钮的唯一家——触发节奏、成熟阈值、容量上限（两层各一）、红线集与 format spec 的指针。红线集（CAP egress 与 LED 共用）、format spec（REF authoring 与 #416 linter 共用）各自是**单一来源**，由 config 指向、两处消费。\n- **维护 write-once、层作入参**：凡\"增 / 删 / 改 / 归档 / 计数 / 退役\"的逻辑只在 `lib/` 写一次；promoter 的落盘、MNG 的淘汰、CAP 的计数都复用它，按 `layer` 参数化，不复制。\n\n## spine 模块落位\n\n| 模块 | 代码落位 | per-module |\n|---|---|---|\n| CAP 捕获 | `hook/{on_stop,on_session_end,capture}` + `lib/{counters,redact}` | [cap](cap.md) |\n| REF 反思 | `agents/reflector.md`（定义） | [ref](ref.md) · [reflector-subagent](reflector-subagent.md) |\n| stage_skill | `stage_skill/server.py` + 复用 `lib/{skill_store,validate,intent_queue}` | [stage-skill](stage-skill.md) |\n| 校验·存储 | `hook/promoter.py` + `lib/{skill_store,validate,skills_guard,ledger,sidecar,intent_queue}` | [validate-store](validate-store.md) |\n| MNG 生命周期 | `hook/on_session_start.py` + `lib/{lifecycle,counters,sidecar}` | [mng](mng.md) |\n| LED 账本 | `lib/{ledger,sidecar}` | （per-module 待补） |\n\n## 决策\n\n- 代码不按层 fork：`layer` 是 `lib/` 的入参、不是代码分叉点；global / repo 共用同一套维护原语。\n- 执行全收进 `hook/` 一个大模块（`dispatch` 单入口 + 子文件）；`stage_skill` 因独立 MCP 进程单列，是唯一例外。\n- `config.py` 单文件持全部旋钮（含分层上限 / 阈值）；红线集与 format spec 由 config 指向各自单一来源，多处只消费。\n- 数据按 storage 分 global / repo 落宿主对应目录；状态区 git-ignored，不入 live skills。\n- `format_spec` **不静态嵌 `agents/reflector.md`**，由 spawn 运行时注入 reflector 输入（与 episode 窗 / 描述索引同路）——单一来源只一份、不与 #416 linter 漂移（见 [reflector-subagent](reflector-subagent.md) 的「spawn 拼装」）。\n- src 锁 Python（与 `tools/` `experiments/` 一致），通过 plugin 分发、不污染宿主项目。\n- **测试只住仓库根 `tests/`**：按 `tests/test_\u003cmodule>.py` 镜像 `src/autoharness/` 各模块，**不放进 plugin 树、不随 plugin 分发**（`pytest.ini` 的 `testpaths=tests` 物理封死收集范围）。依赖活宿主的用例 `@pytest.mark.live` 标记、CI 排除；执行顺序与三层测试策略见 [roadmap](../../plans/roadmap.md)。\n- 投递走**自建 marketplace**（一个含 `marketplace.json` 的 GitHub repo，用户 `/plugin marketplace add` 即装，无审核）；不追官方策展 marketplace。瓶颈不在上架，在\"装后能跑 + 可信\"。\n- **backstop 与 stage_skill 退 plugin 顶层**（[E6](../../../experiments/E6_platform_contracts/results.md) S1：plugin agent 的 `hooks`/`mcpServers` frontmatter 被忽略）：reflector 写 backstop = 顶层 `hooks.json` 的 PreToolUse 按 `agent_type` 匹配 deny；stage_skill = 顶层 `.mcp.json`（会话可见，安全——模型只 propose、land 无工具面）。\n- **每回合分母 +1 在 `Stop` 经 dispatch**（S6：Stop 每回合一次、非每 API 请求）：dispatch 收 Stop 时给两层请求计数器各 +1（MNG 率分母），再走 CAP 触发；SubagentStop（reflector 完成，S4）不计。\n\n## 待解 / 动手前实测\n\n- **首次运行初始化**（marketplace 已定自建，见决策）：plugin 装好后组件（`agents/` `hooks/` `.mcp.json`）随 plugin 就位、**不另拷**（`reflector.md` 是 plugin 内组件，不进用户 `~/.claude/agents/`）；两层数据区（`~/.claude/skills`、`./.claude/autoharness` 等）首写时惰性建即可，是否要显式 init 脚本待定。`hooks.json` 用 `${CLAUDE_PLUGIN_ROOT}` 自定位是 plugin 机制、非安装动作。\n- **`hook/` 与 `lib/` 的进程边界**：每个 hook fire 是独立短进程，`lib/` 的计数 / 落盘必即时持久（内存留不住），与 promoter 的 durable intent 队列对齐。\n\n---\n\nprovenance：装配自 [spine](spine.md) 的管道职责切分；零侵入 / 最小权限 / 只动自产约束见 [additive-over-native-skill](../ideas/additive-over-native-skill.md)；分层落盘见 [precipitate-storage-layer](../ideas/precipitate-storage-layer.md)。plugin / hooks.json / agent / MCP 的官方结构见 Claude Code plugins 文档（源卡待建）。"}, {"id": "design/cap.md", "layer": "design", "subtype": "", "title": "模块设计：CAP 捕获（哑管 + 脱敏出口 + 触发）", "status": "", "summary": "spine 的 CAP 格，学习管道经 hook 观察的捕获入口（MNG 的计数 / curation handler 另挂同一 dispatcher，非另起注册）。它不采集内容、不裁决，只做三件事：把宿主 log 当采集源按指针引用、在 egress 过脱敏红线、在 episode 边界触发 REF。裁决（抽模式 / 去重 / 改建删）全是 ref 的。", "body": "# 模块设计：CAP 捕获（哑管 + 脱敏出口 + 触发）\n\nspine 的 CAP 格，**学习管道经 hook 观察的捕获入口**（MNG 的计数 / curation handler 另挂同一 dispatcher，非另起注册）。它不采集内容、不裁决，只做三件事：把宿主 log 当采集源**按指针引用**、在 egress 过**脱敏红线**、在 episode 边界**触发 REF**。裁决（抽模式 / 去重 / 改建删）全是 [ref](ref.md) 的。\n\n## 不自存：宿主 log 即采集源\n\n宿主（Claude Code）本就把整段 transcript（用户输入 + agent 输出 + tool I/O）落 session log，hook 入参直接给 `transcript_path`。CAP 再抄一份内容即重复（违反单一权威源 / DRY），故 **CAP 零内容拷贝**：只维护「指针 + 计数」的薄索引，喂 REF 的近窗在触发那刻从宿主 log 现算（`tail` 最近 N exchange）。tool I/O 已在 transcript 里，无需另设 `Pre/PostToolUse` hook。\n\n> host-agnostic 的真义：transcript 格式与 hook 名都是 Claude Code 特有，\"host-agnostic\" 指**跨项目 / 跨仓**通用，非跨 agent 框架。CAP 内部绑宿主 hook + log，对外只暴露「给我近 N exchange 窗口」一条契约。\n\n## 脱敏红线在 egress（不在入口存储）\n\n读用户原话使 PII / 密钥概率远高于只读 tool I/O（[trace-based-pattern-extraction](../ideas/trace-based-pattern-extraction.md)），故脱敏是硬要求。但 CAP 不自存 —— 红线因此钉在 **CAP 的出口**，非某份存储副本：宿主 raw log 保持 raw（不是我们的、不碰），凡**从 CAP 越界往外**的东西（喂 REF 的近窗切片、**物化成证据 `references/\u003cslice>.md` 的切片**，见 [validate-store](validate-store.md)）一律过红线。脱敏发生在「物化给下游那一刻」——证据切片即在此刻脱敏后落成 skill 的 references 文件（路径系统按内容/序号生成、模型不命名），[LED](validate-store.md) 指向它而非内嵌字符串。红线规则集（secret-scan + PII）是 CAP 与 LED 共用的**单一来源**（config 一类，待建）。\n\n## 触发：Stop hook + 计数闸\n\n唯一能拿到「每次响应结束」的信号是 **`Stop` hook**。但 Stop = 每轮、episode = 一个跨多轮的任务，故不每个 Stop 都 spawn。触发逻辑全程确定性、不调 LLM：\n\n1. `CLAUDE_CODE_CHILD_SESSION` 有值 → 早退（递归 guard：reflector 自己的 Stop 不得再触发反思，并阻止计数）。\n2. 计数器 +1；未满 `reflect_every_n`（config，默认 10）→ 退出。\n3. 满 → detached 后台作业里 spawn reflector（不堵主 loop），计数器清零。\n\n**`SessionEnd` flush**：会话结束时计数 > 0 即把余量反思掉，否则不满阈值的尾巴永远丢；当前计数值正好告诉 REF 喂几个。spawn 机制 / 递归 guard 的载体见 [reflector-subagent](reflector-subagent.md)，本步只定**何时**触发与**交什么**。\n\n**交接物 = 脱敏后物化的 tail-N 窗口 + 前情 digest**：触发那刻 CAP 从宿主 log 取最近 N exchange（N = `reflect_every_n`，故「每 N 轮触发」与「喂最近 N 轮」是同一个数、对齐零重叠）、过 egress 红线、把脱敏后的窗口物化给 reflector 读（reflector 是 spawn 的独立进程，跨进程走磁盘），用完即弃。REF 拿到的从不是 raw transcript。窗口之前另附**水位线以前 ~N 轮（config）的确定性 digest**（只留 user/assistant 文本切片 + 工具名、不带 tool output、不调 LLM、逐条 fail-safe 跳坏行、同过 egress 红线）——补\"episode 开头在窗外\"的上下文，只作背景、不作证据源（见 [ref](ref.md)）。\n\n语义上的「任务真做完」边界（task-done / token 预算）未定，v0 以「攒够 N」近似；切多切少不致命 —— compare-first + 下一窗兜底。\n\n## 计数：per-session 计数器\n\n**触发节奏 == 喂窗大小**（同为 `reflect_every_n`）：每满即触发、清零、REF 喂 tail-N，两边界重合 → 零重叠，无需另设 watermark 封下界。计数器本身即边界。\n\n**每个 Stop = +1，不扫 transcript**：Stop 一轮 fire 一次，hook 触发本身即增量 —— 读小 int → +1 → 写 → 比 N，O(1)。不从 transcript 长度现算：`.jsonl` 行数要扫整文件（越扫越大）且 tool 行灌水（行数 ≠ 轮数），那个小 int 文件本身就是 O(1) 的「现成轮数」。transcript 只在触发那刻读一次（取 tail-N 窗口），非每轮。\n\n- **session 级、一 session 一个**：计数单位就是 session-id —— transcript 一 session 一份，跨 session 共用无意义。repo 不是第二根轴；一 session 只属一 repo，文件落该仓 `.claude/` 只是「住在哪」，非「按 repo 聚合」。\n- **落盘位置**：repo 的 `.claude/` 内 CAP 自有 state 区（git-ignored、纯叠加），**绝不入 live `.claude/skills` 或 staging**。每个 Stop 是独立进程，整数必落盘（进程内存留不住）。\n- **生死随 session**：`SessionEnd` flush 后自删；崩溃 session 的孤儿惰性 GC（`SessionStart` 扫，留待解）。\n\n**与 LED 的 per-符号 watermark 拆分**：CAP 这个是「会归零的会话计数器」，管触发 + 喂窗；[LED](validate-store.md) 那个是 per-符号 provenance（已反思到哪），Commit 那刻记。二者零重叠 —— 一个没产出任何符号的 session 也得有 CAP 计数（否则空转重反思），故不能并进 LED。\n\n## 决策\n\n- 零内容拷贝、按指针引宿主 log（避免重复存储、守单一权威源）。\n- 脱敏钉 egress、非入口存储（\"不自存\" 与 \"入口脱敏\" 的唯一自洽解）。\n- 触发 = `Stop` + 递归 guard + 计数闸 + `SessionEnd` flush，全确定性、不调 LLM。\n- 触发节奏 == 喂窗大小 → 计数器一物双用，消掉独立 watermark。\n- 计数 session 级、落盘于 repo 内 CAP state 区（不入 live / staging）；与 LED 的 per-符号 watermark 分开。\n\n## 待解\n\n- **episode 边界信号**：task-done / token 预算 —— 未定（与 [ref](ref.md) 共享），v0 用计数近似。\n- **session-id → transcript 路径**的发现：实测确认 hook 入参足够定位；并确认 compaction 下 tail-N 取到的仍是原始轮次（而非已压缩摘要），否则喂窗保真受损。（计数不依赖 transcript 长度，故 compaction 不影响计数，只影响取窗。）\n- **触发到读取的 race**：满 N 到 detached reflector 真读 transcript 之间又来 1~2 轮，`tail-N` 漏最老 1~2；v0 容忍，精确化留 spawn 时带 transcript 上界。\n\nprovenance：[trace-based-pattern-extraction](../ideas/trace-based-pattern-extraction.md)（捕获口取对话回合 + 脱敏更硬）、[additive-over-native-skill](../ideas/additive-over-native-skill.md)（零侵入：只经 hook、不碰原生加载链）；触发载体见 [reflector-subagent](reflector-subagent.md)，触发形态对照 [ECC](../sources/github/affaan-m-ecc.md)（`Pre/PostToolUse` 抓 + `nohup` daemon 触发）。"}, {"id": "design/mng.md", "layer": "design", "subtype": "", "title": "模块设计：MNG 生命周期（调用率排序 + 缓刑护新 + 只有容量竞争淘汰）", "status": "", "summary": "spine 的 MNG 格。决定每个自产符号活多久。确定性,惰性判定（`SessionStart` 现算）、只归档不删除、按 provenance 圈成员。判据是调用率而非墙钟时间;缓刑保护新符号;容量上限只在成熟池内按率竞争淘汰。上游 provenance 见 adherence-driven-curate,机制对照 Hermes curator（我们以率取代其时间状态机,理由见下）。", "body": "# 模块设计：MNG 生命周期（调用率排序 + 缓刑护新 + 只有容量竞争淘汰）\n\nspine 的 MNG 格。决定每个**自产符号**活多久。**确定性**,惰性判定（`SessionStart` 现算）、只归档不删除、按 provenance 圈成员。判据是**调用率**而非墙钟时间;缓刑保护新符号;容量上限只在成熟池内按率竞争淘汰。上游 provenance 见 [adherence-driven-curate](../ideas/adherence-driven-curate.md),机制对照 [Hermes](../sources/github/nousresearch-hermes-agent.md) curator（我们以率取代其时间状态机,理由见下）。\n\n## 成员资格（按 provenance，两层各圈一份）\n\n只管带「机器自产」标记的符号（[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)）；用户手写 / 外来 / 原生 skill 默认在池外，守 [additive-over-native-skill](../ideas/additive-over-native-skill.md)。自产标记由 [validate-store](validate-store.md) 的 Commit 盖在 sidecar。宿主两层 skill 树（project 限本仓、global 跨项目）各圈一份成员集，分别判定。\n\n## 活跃度 = 调用率（取代时间）\n\n存活依据是**调用率** `rate = 被调次数 / 请求数`，不是墙钟。Claude Code 非常驻：墙钟在 agent 关着时照走、会冤枉「没机会被用」的符号；请求数只在真有交互时增长，是**机会相对**的度量、对临时宿主免疫。这正接 [dynamic-validation-lifecycle](../ideas/dynamic-validation-lifecycle.md) 的随用随验（时间是弱代理，率直接量有用度）。三层强度中 v1 吃到率，遵守度仍留后。\n\n- **分子 = 被调次数**：在 **`PreToolUse(Skill)` handler** 那刻 +1（该 handler 与 CAP 的 handler 同挂 plugin 单一 dispatcher、**不另起 hook 注册**），计入被调符号自己的 sidecar、**不分层**（符号身份即决定其 sidecar 落哪层）。零侵入下不拥有宿主 loader、抄不了 Hermes 的 callsite 计数，改在 hook 面埋点；纯观察、不拦截、不改召回链路。\n- **分母 = 创建以来的 API 请求数**（每个 turn 一次，**非人类对话次数**）：**repo 符号**用本 repo 的请求数，**global 符号**用全局所有请求数（它处处加载、机会即全部请求）。CAP 每回合给对应层的请求计数器 +1；符号 sidecar 记**创建锚**（创建时的层请求计数），分母 = 当前层计数 − 锚。\n\n计数随 sidecar 走层，promote / archive 的 `mv \u003c符号目录>` 把分子原子带走（不抄 Hermes 单一共享计数文件：单文件每次 mv 还得另改它，而成员封顶后逐符号读 sidecar 排序的代价可忽略）。**与 LED 分工**：LED（append-only）记增删改的理由 / 证据，计数（可变）只记数。\n\n## 缓刑护新：样本不够不淘汰、不占上限\n\n率在小样本下是噪声（`1/1` 与 `8/100` 不可比），刚建的符号尤其会被冤。故设缓刑：\n\n- **分母未过成熟阈值（config）= 缓刑态**：照常 live、照常被召回，但**①不计入上限 ②不参与淘汰**。\n- 分母过阈值 → **毕业**入成熟池，带可比的真率。**毕业本身不判死**：率≈0 只让它在池内垫底，死不死全看容量压力（曾有\"毕业即审\"当场归档 rate≈0 者，2026-07-06 删——它是无视容量的固定死刑线，违反下节\"最没用且有容量压力\"原则，且分母含无关请求、率≈0 常只是\"没遇到对口任务\"；首个自产 skill 即被它 10 秒冤杀）。\n\n## 退役 = 成熟池内按率竞争（容量触发）\n\n- **上限只管成熟池**（分母过阈值者）；成熟数超上限（config）→ 按率升序归档最低者，回到上限内为止。\n- 淘汰竞争只在样本都达标的成熟符号间发生 → 率可比、新老皆公平：新符号只在拿够机会后以真率与同辈比，**绝不「刚建就被上限挤掉」**。\n- **无固定阈值 θ、自调**：被淘汰当且仅当「你最没用 **且** 有容量压力」——这是唯一死法，无任何独立于容量的死刑线。\n- 状态 **probation → active（成熟）→ archived**：成熟度只管「能否被淘汰 / 算不算上限」，**不影响召回**（缓刑与成熟都 live）。**archived = 把符号目录移出 live 树** → 原生召回扫不到 → 不再注入；靠移目录、非靠状态位，可逆（移回即复活）。\n\n## 触发：全骑 session hook，零 daemon\n\n**MNG 不另起 hook 注册**——它的 handler 与 CAP 的同挂 plugin 单一 dispatcher（守 spine 零侵入不变量）。非常驻宿主无后台 sweep，故全部骑 session 生命周期：分子在 **`PreToolUse(Skill)` handler** +1、分母由**每回合** handler 给对应层请求计数器 +1；**重算率 + 淘汰**在 **`SessionStart` handler** 惰性现算（跑在本会话召回之前，对「到上次会话结束为止」的全部账现算）。**每会话一次、不节流**：判定是确定性便宜活（读 ≤N 个 sidecar 比一下），无须 Hermes LLM curator 那套 idle / 间隔节流。**dormancy 不积压**：关机不动分母，回来不会突然清一批。\n\n## 两层差异\n\n- **分子同构**：层无关，存进被调符号 sidecar。\n- **分母分层**：repo = 本 repo 请求数；global = 全局请求数（全局请求计数器由每个装了 autoharness 的 repo 的 CAP 共同 +1）。\n- **上限分层**：各层各设成熟阈值与容量上限（config，**两个旋钮独立可调、不写死**）；global 爆炸半径大 → 更保守。\n- **判定读累积水位**：失活判定不读「本 session 看到什么」，只读 sidecar + 层计数器跨 session / 跨 repo 累积量，故任意 repo 的 `SessionStart` 触发都得同一结论。\n\n## 决策\n\n- 只管自产符号（provenance 圈成员），两层各圈一份、分别判定。\n- 判据 = 调用率（取代墙钟时间）：非常驻宿主下墙钟冤枉「没机会被用」者，请求数是机会相对度量。\n- 分子 = hook 埋点的被调次数，存被调符号 sidecar、层无关；分母 = 创建以来 API 请求数（repo 本层 / global 全局），sidecar 记创建锚。\n- 缓刑护新：分母未过成熟阈值则 live 但不淘汰、不占上限；创建锚由 promoter 落盘时读当时层计数写入（锚不真，缓刑即虚设）。\n- 退役 = 成熟池内超上限按率竞争归档最低者，**是唯一死法**（毕业即审已删，见上）；无固定 θ、自调；状态 probation→active→archived，archived 靠移目录出召回。\n- **MNG 不另起 hook 注册**：handler（`PreToolUse(Skill)` 计分子、`SessionStart` 重算淘汰）挂 plugin 单一 dispatcher、与 CAP 的 handler 并列；零 daemon、每会话一次不节流、dormancy 不积压。\n- 成熟阈值与容量上限均 config、两旋钮独立、分层各设、不写死。\n\n## 待解 / 动手前实测\n\n- **调用捕获实测**（率分子成立的前提）：① learned skill（描述召回的）被用是否走 `Skill` 工具、触发 `PreToolUse(Skill)` handler；② 事件 payload 是否带解析后的符号身份（对得上符号）。点一个 learned skill、看 hook payload 即可验。\n- **API 请求计数口径**：分母锚在「每 turn 一次的 API 请求」——确认 CAP 的 per-turn 触发与 API 请求一一对应（一个 turn 多次模型调用 / 重试是否各算一次），定义清「一次请求」。\n- **global 率的「在场≫相关」偏置**：global 符号处处加载但只在部分 repo 相关（Python skill 在 Rust repo 永不被调），全局分母含无关请求会压低其率。v1 接受宽分母（global 量少、上限竞争兜底）；「分母只算曾用过它的 repo」留后。\n- **global 并发写锁**：全局请求计数器 + global sidecar 被多 repo 的 hook 跨进程并发写；多 repo 的 `SessionStart` 并发归档同一 global 符号 → per-symbol + 全局计数器跨进程锁（与 [validate-store](validate-store.md) Commit 的 live 单写者锁合一把）。\n- **global 覆盖盲区**：分子分母都只数装了 autoharness hook 的 repo；没装的 repo 调了 / 跑了都不计——per-repo 安装的固有 gap（Hermes 无，因它本身即 agent、永远在场）。\n- **累计 vs 滚动窗口**：累计（自创建）最省；环境漂移下「曾有用、近来没用」需滚动窗口（近若干请求内的率）才能下沉，留后。\n- **绝对底线规则（留后，先不实现）**：除「毕业审率≈0」外，可加一条**独立于容量**的硬底线——分母过 X **且**分子 \u003c Y（均 config、分层）即归档，逮「给够机会仍基本没用、但还没触发容量竞争」者。是现有毕业审的推广（把率≈0 的隐含 Y=0 放成可调 Y）；落点同在 `lifecycle` + `config`，无需新埋点 / 新状态——为它专搭规则引擎属过度设计，不做。\n- **成熟阈值 / 上限标定**：config 默认值待经验标定（`experiments/`）。\n- **`references/` 证据切片的保留 / 淘汰**（folder-skill 落地后新增）：promoter 每次 land 物化一条 `references/evidence-\u003chash>.md`（内容寻址幂等，同证据不重复），但跨 land 仍无界增长，违「stays clean」。归 MNG 管（随符号归档整夹带走已兜底一半；live 符号内的切片淘汰策略——随 LED 滚动 / 留最近 N——待定）。见 [validate-store](validate-store.md) 待解同条。\n\nprovenance：[adherence-driven-curate](../ideas/adherence-driven-curate.md)（生命周期骨架 + 容量 consolidation + 遵守度留后）、[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)（自产圈成员）、[skill-recall-low-degrades-with-n](../ideas/skill-recall-low-degrades-with-n.md)（容量封顶护召回）、[record-scenarios-for-eval](../ideas/record-scenarios-for-eval.md)（sidecar 计数 / LED 分工）、[dynamic-validation-lifecycle](../ideas/dynamic-validation-lifecycle.md)（率取代时间的随用随验、遵守度留后）；机制对照 [Hermes](../sources/github/nousresearch-hermes-agent.md)（`active→stale→archived` 时间状态机 + last_used 计数 + capacity consolidation；我们以率 + 缓刑 + 容量竞争取代其墙钟判据，时间冤枉非常驻宿主）。"}, {"id": "design/ref.md", "layer": "design", "subtype": "", "title": "模块设计：REF 反思（compare-first）", "status": "", "summary": "spine 的 REF 格。把一个 episode 的痕迹蒸馏成对齐现有库的改动。核心取向：compare-first——先看现有 skill、再决定改 / 并 / 新建 / 删，直接产出终态改动，不产真空\"雏形\"。运行载体见 reflector-subagent；下游交接见 validate-store。", "body": "# 模块设计：REF 反思（compare-first）\n\nspine 的 REF 格。把一个 episode 的痕迹蒸馏成**对齐现有库的改动**。核心取向：**compare-first**——先看现有 skill、再决定改 / 并 / 新建 / 删，**直接产出终态改动**，不产真空\"雏形\"。运行载体见 [reflector-subagent](reflector-subagent.md)；下游交接见 [validate-store](validate-store.md)。\n\n## 输入构造（喂什么、喂多少）\n\n- **注入 = 最近 ~10 轮对话（exchange，config 可调），不是完整 context**。autoharness 是外挂层、拿不到宿主请求的逐字节前缀，replay 必冷——故不背全量、不照搬 Hermes 的\"全量 + 暖缓存\"，只喂最近这一窗。\n- **喂窗下界由 CAP 的会话计数封**：触发节奏 == 喂窗大小（见 [cap](cap.md)），每满即触发 / 清零 / 喂 tail-N，故窗口只覆盖上次触发后的新 exchange、**prior episode 天然不再喂**，去重只剩\"新教训 vs 现有库\"一次。（[LED](validate-store.md) 另记 per-符号 watermark 作 provenance，与此触发计数**不同物**。）\n- **更早的上下文默认以 digest 喂**（2026-07-06 由 opt-in 提成默认）：原始窗之前再附**前 ~N 轮（config）的确定性 digest**——只留 user/assistant 文本（每条截前若干字）+ 工具名，**完全不带 tool output**、不调 LLM（仿 Hermes `_digest_history`）。digest 只作背景，**evidence 仍必须取自原始窗**。这取代了曾定的 carry-forward 方案（要 reflector 自判 episode 闭合 + 跨次持久化残窗，有状态且重；digest 无状态、每次从 transcript 现算）。\n- 痕迹保真口取**对话回合**（用户输入 + agent 输出），非只 tool I/O；入口先过脱敏红线。\n\n## compare-first 比对（为什么不产雏形）\n\n先生成完整草稿再比对是反的：会在真空里造出**形状错**的 skill（本该并进 umbrella 却造了独立条目），再扔掉重做。比对必须**前置且与生成融合**：\n\n1. 读现有 skill 的**描述索引**（便宜、就是注入上下文那份 name+desc；**取 global + project 两层并集**，防重造另一层已有的）→ 锁定可能重叠的少数候选；\n2. 只对候选做按需细看 → 判定 **改 X / 并进 umbrella / 新建 Y / 删**；\n3. **直接产出对齐后的终态改动**：对 X 的 patch，或新 skill 的完整体，或退役决策。\n\n**偏好序是引导、不是闸**（仿 Hermes 宽进）：生成端不设硬性拒收——无\"不可捕获\"负面清单、不封 intent 数、create 不要求先证明两层皆无覆盖（比对仍前置，拿不准时宁建勿弃）；每个可沉淀的教训各发一条 intent。质量收敛全在下游：promoter 挡格式 / 路径 / 完整性，**MNG 按率淘汰没用的**（[mng](mng.md)）——多产的代价是可逆归档，漏捕的代价是永久丢教训。**dedup 是 LLM 判断，v1 只在 REF 这一处**：compare-first 偏好序即去重主防，残余交 MNG 动态兜底；**v1 不设上线前独立 inspector**（跨 skill 重复 / 漏更新的第二意见 = author≠inspector，留 [validate-store](validate-store.md) 待解），确定性侧也不搭 hash / 相似度引擎。随 N 增长靠描述索引 + 渐进披露不爆——\"描述卫生\"是 compare-first 的前提（[skill-recall-low-degrades-with-n](../ideas/skill-recall-low-degrades-with-n.md)）。\n\n## 输出（交接契约）\n\nREF **不写任何 skill 树、不碰 live、不写 staging**——它经 [stage_skill](stage-skill.md) 把每个改动**发成 intent**，交给 [validate-store](validate-store.md) 的 promoter：\n\n- **intent** = **修改内容 + 元数据**：create / overwrite 带**完整 body**、patch 带 **delta**（`old_string→new_string`）、delete 无内容；元数据 `{name, reason, evidence}`，create 多带 `level`。\n- **动作 / 层不另声明**：动作由 promoter 的存在性检查现算、层由 promoter 按两层定位解析（create 的 `level` 是唯一例外，由 REF 在 intent 声明）。\n- **LED 随 intent 自带**：`reason / evidence` 是 stage_skill 必填参 → intent 必带 LED；promoter pass 才 append 进真 LED、reject 丢。\n- **能力子文件（folder-skill）**：REF 判定一个 skill 需脚本 / 模板 / 参考文档时，可在 intent 内一并提议这些子文件（`相对路径 → 内容`，路径过死闸，见 [stage_skill](stage-skill.md)）；**证据 references 切片不由 REF 产**——CAP 确定性物化（见 [cap](cap.md)）。\n\n成型最终全文、读 live、内存校验、原子落盘——**全是 promoter 的事**（见 [validate-store](validate-store.md)）。跨进程交接走**文件系统**：intent append 进 per-run 队列（reflector 是 spawn 出的独立进程，唯一可靠通道是磁盘）。\n\n## 放哪层（global / project，仅 create 决策）\n\n宿主有两层 skill 树：**project**（限本仓）与 **global**（跨项目）。放哪由 REF 在 create 时判，轴是**「这教训关于本 repo，还是关于用户 / 通用技术」**：repo 特定（代码 / 路径 / 栈 / 约定）→ project；用户偏好（风格 / 语气 / 工作流）或通用技术 → global；拿不准 → **project（保守默认）**。**global 爆炸半径 = 每个项目都加载，故门槛高**，repo-agnostic 兜底闸在 [validate-store](validate-store.md)。\n\nupdate / delete **不决策**：目标层由 promoter 按两层并集定位现有 skill 解析（在哪层就改哪层），原地写回——故 `level` 仅 create 在 intent 声明。\n\n## 决策\n\n- compare-first、不产雏形（省一次生成 + 避免错形状）。\n- **生成端宽进、不设防**（仿 Hermes）：偏好序 patch > update > create 只作引导，无负面清单、无 intent 数上限；质量收敛交 promoter（格式）+ MNG（率淘汰）。\n- episode 切片 + 确定性 digest + watermark（外挂无暖缓存 → 喂得少才省；旧内容不重看）。\n- 反思的产物只是 **intent**（不落盘），由确定性 promoter 成型 / 校验 / 落盘定生死（见 [validate-store](validate-store.md)）。\n- **LED 随 intent 自带**（`reason / evidence` 是 stage_skill 必填参）；promoter pass 才 append、reject 丢——产出 ≠ 入账。\n- **放哪层仅 create 决策**：repo 特定 → project、用户偏好 / 通用 → global、默认 project、global 严；update / delete 的层由 promoter 解析。\n\n## 待解\n\n- **episode 边界信号**：turn 结束 / 任务完成 / token 预算 —— 未定。\n- 跨 episode 的教训（一条 lesson 横跨多个 episode）：watermark 切片下如何不丢——按需带前几轮，机制待定。\n\nprovenance：[episode-boundary-reflection](../ideas/episode-boundary-reflection.md)（粒度 / 时机 / digest）、[trace-based-pattern-extraction](../ideas/trace-based-pattern-extraction.md)（捕获口）、[skill-recall-low-degrades-with-n](../ideas/skill-recall-low-degrades-with-n.md)（描述索引使 compare-first scale）；compare-first 偏好序与 digest 源出 [Hermes](../sources/github/nousresearch-hermes-agent.md)。"}, {"id": "design/reflector-subagent.md", "layer": "design", "subtype": "", "title": "模块设计：reflector 子代理（REF 的运行载体）", "status": "", "summary": "REF 这步不在主会话里跑，由一个注册的 Claude Code subagent + hook spawn 承载。本文定它的定义、文件编辑范围限制、触发与递归 guard。", "body": "# 模块设计：reflector 子代理（REF 的运行载体）\n\n[REF](ref.md) 这步**不在主会话里跑**，由一个注册的 Claude Code **subagent** + **hook spawn** 承载。本文定它的定义、**文件编辑范围限制**、触发与递归 guard。\n\n## 为什么 subagent + spawn\n\n- 我们是外挂层、不占宿主 agent loop，**只能 spawn**。`claude -p --agent \u003cname>` 直接**以该 subagent 身份**跑：subagent 的正文**整个替换**默认 system prompt（同 `--system-prompt`），带它的工具限制 + 模型，**无主 agent 那一跳**。\n- subagent 是**可版本化的一等产物**（随 plugin 作 `\u003cplugin>/agents/` 组件分发，见 [architecture](architecture.md)）——干净、native、装一次到位。\n- 对比裸 `claude -p \"\u003cprompt>\"`：subagent 把 review/authoring 提示 + 工具限制 + 模型**注册一次**，比每次拼 flag 干净；也比让主模型在 turn 内调 Agent 工具更可控（那是概率触发、且在关键路径上）。\n\n## 定义要点\n\n- **便宜模型**（如 haiku）：reflection 不需主模型。\n- **最小权限工具**：**读**用内建 `Read` / `Grep` / `Glob`（`Read` 读已知路径、`Grep` 搜内容、`Glob` 枚举两层 skill 树 / 候选 `references/`——compare-first 细看现有 skill 用；episode 与描述索引靠注入、不靠工具取）；**改动**只走自产的 **[stage_skill](stage-skill.md)**（发 intent、append per-run 队列、**不碰任何 skill 树**），**去掉通用 Write/Edit**，**不给 Bash / 网络**。subagent 默认继承宿主全部工具，故必须**显式收窄**（deny-by-default、least privilege，[additive-over-native-skill](../ideas/additive-over-native-skill.md)）。执行类（跑命令验证）留到 dry-run 阶段再按需加。\n- **正文** = compare-first 的 review + authoring 提示（仿 Hermes `_SKILL_REVIEW_PROMPT`；宽进、生成端不设防，偏好序见 [ref](ref.md)）。**格式与创建要求 = 一份单独维护的权威 spec**（必填 frontmatter / 命名 / 结构 / references 约定 / 放哪层），**不靠\"读现有 skill 当样例\"推断**——冷启动可能没有、现有（含 native）格式可能不合本 spec。这份 spec **同时喂 REF（按它写）与 [validate-store](validate-store.md) 的 #416 linter（按它验）**，是同一契约的两面、单一来源（config 一类）、保持同步——但**它不静态嵌进本 agent 正文**（那会成第二份拷贝、与 linter 漂移），而是由 spawn 在拼装时**运行时注入** reflector 输入（见下「spawn 拼装」）。现有 skill 只供 compare-first（去重 / 放哪层），**不当格式源**。\n\n## spawn 拼装与交接\n\n主会话 hook 在 episode 边界触发后，由 spawn 步（`hook/spawn.py`）**确定性**拼装 reflector 的输入，跨进程经磁盘交接（reflector 是独立子会话、碰不到主会话内存）：\n\n- **三件套**：CAP 物化的脱敏 episode 窗（[cap](cap.md) 的交接物）+ 现有两层 live skill 的**描述索引**（每符号 `name`+`description`，compare-first 去重 / 放哪层的唯一依据，跳归档）+ 单一来源 `format_spec`（authoring 契约，与 #416 linter 同源）。三者**靠注入、不靠工具取**，故 reflector 的读工具只用于 compare-first 细看候选正文。\n- **身份注入**：spawn 置递归 guard 信号（`CLAUDE_CODE_CHILD_SESSION`）+ 把本 run 的 intent 队列坐标（run_id / repo 根）经**环境**传给子会话，[stage_skill](stage-skill.md) 据此 append 回正确队列。\n- **接力**：spawn 出的子会话以 reflector 身份跑完（只可能 append intent），spawn 返回后接 [validate-store](validate-store.md) 的 promoter——读队列、校验、原子落盘。author 与 land 自此彻底分进程。\n\n## 文件编辑范围限制（钉死写范围）\n\nreflector **不写任何 skill 树**，禁碰 live（两层 `~/.claude/skills` + `./.claude/skills`）与非自产符号。纵深：\n\n1. **主（结构）**：reflector **没有通用 Write/Edit**，唯一写工具 [stage_skill](stage-skill.md) **只 append intent 队列、不碰 skill 树**——\"动到 live / 用户 skill\"在此**结构上不可能**；连 staging 文件都不写（成型 / 落盘全在 promoter）。\n2. **backstop（防御纵深）**：**plugin 顶层 `hooks/hooks.json` 的 PreToolUse hook**按 reflector 的 `agent_type` 匹配，对其 `Write`/`Edit` 调用 deny（exit 2 / stdout JSON `permissionDecision`）——防 tool 有 bug 或意外写路径。**不放 agent frontmatter**：plugin-shipped agent 的 `hooks`/`mcpServers` 字段被宿主出于安全忽略（[E6](../../../experiments/E6_platform_contracts/results.md) S1），故 backstop 退到顶层、按 `agent_type` 精确匹配（S3 确认子代理自身工具调用触发 PreToolUse 且 payload 带 `agent_type`）。把 [lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)（只动自产）+ [additive-over-native-skill](../ideas/additive-over-native-skill.md)（不碰原生 / 用户 skill）+ 安全铁律落在**写入 chokepoint**。\n\n> 分工：reflector 只发 intent、进不了 live；live 的写由 [validate-store](validate-store.md) 的 promoter 独占（admission：内存校验 → 原子落盘），按 `created_by:agent` 收口。\n\n## 触发与递归 guard\n\n- **触发**：主会话 hook（episode 边界，如 Stop）在 **detached 后台作业**里 spawn reflector（仿 ECC `nohup` daemon，不堵关键路径），spawn 返回后接 [validate-store](validate-store.md) 的 promoter。\n- **递归 guard**：spawn 出的子会话会再触发 hooks；用 `CLAUDE_CODE_CHILD_SESSION`（Claude Code 自设、子会话才有）在反思触发 hook 里现判——有值即 exit，防\"反思套反思\"。\n\n## 平台契约（[E6](../../../experiments/E6_platform_contracts/results.md) 已闭）\n\n- **S1**：plugin-shipped agent 的 `hooks`/`mcpServers` frontmatter 被忽略 → backstop 退顶层 `hooks.json`、stage_skill 退顶层 `.mcp.json`。\n- **S3**：子代理自身工具调用触发 PreToolUse，payload 带 `agent_id`/`agent_type`；deny = exit 2（stderr）或 exit 0 + stdout JSON `permissionDecision: deny`。\n- **S4**：省略 `tools` 全继承（故仍显式写最小集）；plugin agent 解析为 `plugin:reflector`；**SubagentStop 与 Stop 分立**——reflector 自身 Stop 自动转 SubagentStop，故 CAP 只数主 Stop、reflector 完成不灌计数（与 `CLAUDE_CODE_CHILD_SESSION` 递归 guard 双保险）。\n- **安装位**：`agents/reflector.md` 作 plugin 内组件随装就位，**不拷进用户 `~/.claude/agents/`**。\n\n残留留 live spike（行为质量，非平台能力）：reflector compare-first 真改优于建、最小权限不越界、backstop 运行时真 deny 一次 `Write`（归 `experiments/`、Phase 5 live）。\n\nprovenance：[additive-over-native-skill](../ideas/additive-over-native-skill.md)（零侵入 + 最小权限）、[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)（只动自产）、[episode-boundary-reflection](../ideas/episode-boundary-reflection.md)（REF 内容）；运行形态对照 [Hermes](../sources/github/nousresearch-hermes-agent.md)（进程内 fork）、[ECC](../sources/github/affaan-m-ecc.md)（spawn `claude -p` haiku 自写 + daemon 触发）。"}, {"id": "design/spine.md", "layer": "design", "subtype": "", "title": "系统架构：autoharness workflow v0", "status": "", "summary": "autoharness 在 agent 的真实运行中积累经验、并就地验证经验：经验不靠一次离线 eval 拿快照分，而是靠在后续交互里持续被遵守、奏效挣得存活，被矛盾 / 失效则退役。", "body": "# 系统架构：autoharness workflow v0\n\nautoharness 在 agent 的真实运行中积累经验、并就地验证经验：经验不靠一次离线 eval 拿快照分，而是靠在后续交互里持续被遵守、奏效挣得存活，被矛盾 / 失效则退役。\n\n实现上，它在宿主 agent 之外**纯叠加**地运行：CAP 经 hooks 观察会话，REF **compare-first** 地把 episode 蒸馏成对齐现有库的改动、经 stage_skill 发成 **intent**（不落盘），**确定性 promoter（校验·存储）**内存成型 + 内存校验、过了才**原子落盘**进宿主 skill 目录（`.claude/skills`）走正常 description 召回；对原生 skill 加载链路零侵入。MNG 决定符号活多久，LED 记每次增删改的理由与证据。\n\n```\n┌──────────────── 宿主 agent（host-agnostic）— autoharness 纯叠加、零侵入 ────────────────┐\n│      会话运行   ·   原生 skill 加载（.claude/skills；name+desc → description 概率召回）   │\n└───┬──────────────────────────────────────────────────────────────────────▲────────────┘\n    │ CAP 观察：hooks（管道入口）                         符号即原生 skill · 宿主正常召回 │\n    ▼                                                                          │\n┌─────────┐   ┌─────────────────────┐   ┌──────────────────────────────┐\n│ CAP 捕获│──►│ REF 反思             │──►│ 校验·存储 promoter（admission）│──────────┘\n│ (hooks) │   │ compare-first        │   │ 内存成型 create=body /         │\n│         │   │ 经 stage_skill 发     │   │   patch=live+delta             │\n│         │   │ intent(body|delta +   │   │ 内存校验 guard+#416+LED+完整   │\n│         │   │ reason/evidence,不落盘)│   │ pass→temp+原子rename→live      │\n│         │   └─────────────────────┘   │ reject→不落盘                  │\n│         │                             │ +created_by + append LED       │\n└────┬────┘                             └────────┬───────────────┬───────┘\n     │ trace                           退役/失活 │  append intent │\n     ▼ 指针入宿主 log（脱敏）                     ▼  的 LED        ▼\n  [宿主 log]                              ┌──────────┐    ┌──────────┐\n                                          │ MNG 生命 │    │ LED 账本 │\n                                          │ 周期     │    │ (sidecar)│\n                                          └──────────┘    └──────────┘\n```\n\n每格的行为边界 / 接口契约见 per-module 文档：[cap](cap.md) · [ref](ref.md) · [validate-store](validate-store.md) · [reflector-subagent](reflector-subagent.md)（REF 的运行载体）。\n\n## 组件职责\n\n- **CAP 捕获** — **学习管道经 hook 观察的捕获入口**（MNG 的计数 / curation handler 另挂同一 dispatcher）：host-agnostic hook 抓每个对话回合（用户输入 + agent 输出 + tool I/O），只搬运不裁决；入口过脱敏红线；原始 trace 不自存，按指针引宿主 log；触发 = `Stop` + 递归 guard + 计数闸 + `SessionEnd` flush，per-session 计数器。详见 [cap](cap.md)。\n- **REF 反思** — **注入最近 ~10 轮对话（config 可调，非完整 context）**，在 episode 边界 **compare-first**：先读现有 skill 的描述索引（**global+project 两层并集**）、锁定重叠候选，再决定**改 / 并 / 新建 / 删**，**经 stage_skill 发成 intent**（不落盘）：body（create / overwrite）或 delta（patch）+ `reason / evidence`（自带 LED）。**create 还判落 project / global 层**（默认 project、global 严）；动作 / 层由 promoter 现算或解析、模型不另声明（create 的 `level` 例外）。不产真空\"雏形\"。详见 [ref](ref.md)，运行载体见 [reflector-subagent](reflector-subagent.md)。\n- **校验·存储** — **admission 模型、live 唯一确定性写者**：读 intent → **内存成型**（create / overwrite=body；patch=读 live + 应用 delta；delete=移除）→ **内存校验**（确定性 linter 六类，不调 LLM：`skills_guard` 安全 + #416 结构 + LED 有 + 内容完整 + global repo-agnostic + **自产标签**（modify 目标须 `created_by:agent` 否则 reject））→ **pass：hardcode 盖 `created_by`（create）+ 写 temp 同目录 + `os.replace` 原子 rename 进对应层**（create→intent 的 `level`、update→promoter 定位层）+ sidecar 含标签 + append intent 自带 LED；**reject：什么都没写、不打标**。**validate-before-ANY-write**（校验前任何盘都不落，无 staging tree / 无版本史）；去重不在闸：REF compare-first + MNG。详见 [validate-store](validate-store.md)。\n- **MNG 生命周期** — 确定性，按 provenance 两层各圈成员、只归档不删除、惰性 `SessionStart` 现算。判据 = **调用率**（被调次数 / 创建以来 API 请求数，分子在 `PreToolUse(Skill)` handler 计、分母按每回合请求计；repo 用本层、global 用全局）而非墙钟（非常驻宿主下时间冤枉「没机会被用」者）。**缓刑护新**（样本未达成熟阈值不淘汰、不占上限）+ **容量竞争**（成熟池超上限按率归档最低者）；状态 probation→active→archived（archived 移目录出召回）。**MNG 的 handler**（`PreToolUse(Skill)` 计分子、`SessionStart` 重算淘汰）挂 plugin 单一 dispatcher、不另起注册；config 旋钮分层、遵守度留后；退役补记 LED。详见 [mng](mng.md)。\n- **LED 账本** — 每符号 sidecar 的 append-only 账本。条目**随 intent 自带**（stage_skill 必填 `reason / evidence`），**promoter pass 那刻**才 append 进真 LED（reject 不入账）；MNG 退役亦补记。记动作 + 理由 + 证据（脱敏切片 + 宿主 log 指针）+ **watermark**（已反思到哪）；不进 skill 体以护召回。\n\n## 全局不变量\n\n- **纯叠加、零侵入原生**：增强只经 **plugin 单一 hook dispatcher**（CAP 与 MNG 的 handler 都挂其下、不另起 hook 注册）+ 写 skill 目录；hook 只观察 + 惰性 curate，**不改宿主 skill 注册 / 读取链路**。\n- **REF 不自审（author ≠ validator）**：生成与过闸分离——过闸是确定性 linter + `skills_guard`（独立于作者），不是 REF；质量 / 去重的独立验证交 MNG 动态兜底，v1 不设上线前第二个模型。\n- **精确 / 安全 → 确定性，判断 → LLM**：安全（`skills_guard`）/ 提交 / 撞名走确定性；重复 / 正确 / 价值 / 漏更新交 LLM。\n- **validate-before-ANY-write**：校验通过前**任何盘都不落**；模型只经 stage_skill 发 intent，promoter 内存成型 + 内存校验、pass 才 temp + 原子 rename（强于 Hermes write-first，无 staging tree）。\n- **模型只 propose、land 确定性 promoter 独占**：reflector 只有 `Read/Grep/Glob/stage_skill`、无 validate/commit 工具 → 结构上 land 不了、跳不过闸；promoter 由编排（CAP hook → spawn → promoter）无条件调，崩则 durable 队列补处理、fail-safe。\n\n> 各模块行为与本地理由见 per-module（[ref](ref.md) · [validate-store](validate-store.md) · [reflector-subagent](reflector-subagent.md) · [mng](mng.md)）；被比较过的取舍（write-first / draft-first / 用不用 git…）归 [decisions/](../decisions/index.md)。\n\n## 待解\n\n- **动态验证（遵守度）—— 本项目论点的未建核心**：符号应靠遵守度随用随验挣存活；机制未建。当前以 MNG 的调用率 + 容量竞争兜底，遵守度留后（详见 [mng](mng.md)）。\n\n> 各模块自身的待解见对应 per-module 文档（dry-run / episode 边界 / `--agent` 继承…）；离线\"兜底重放\"地位未定，留 [decisions/](../decisions/index.md)。\n\n---\n\nprovenance（idea ↔ 元素**多对多**，非一一对应；下面只标主要所凭）：\n\n- **横切**：[dynamic-validation-lifecycle](../ideas/dynamic-validation-lifecycle.md)（理念，贯穿）、[additive-over-native-skill](../ideas/additive-over-native-skill.md)（零侵入 + 最小权限，约束 REF/校验·存储/MNG）、[skill-recall-low-degrades-with-n](../ideas/skill-recall-low-degrades-with-n.md)（召回，驱动描述卫生 + 去重 + MNG 删冗余）、[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)（成员资格 + 自产标注）、[record-scenarios-for-eval](../ideas/record-scenarios-for-eval.md)（LED + watermark）。\n- **各元素主要所凭**：CAP←[trace-based-pattern-extraction](../ideas/trace-based-pattern-extraction.md)；REF←[episode-boundary-reflection](../ideas/episode-boundary-reflection.md)；校验·存储←skill-recall · [precipitate-storage-layer](../ideas/precipitate-storage-layer.md)（`.claude/skills`）· [adherence-driven-curate](../ideas/adherence-driven-curate.md)（consolidation）；MNG←[adherence-driven-curate](../ideas/adherence-driven-curate.md)。（[hook-forced-injection](../ideas/hook-forced-injection.md) 的「强制注入」**未采纳**——forward path 选原生 skill，hooks 只观察 / 计数 / curate、不强制注入。）\n\n设计元素是 idea 的**装配**，按管道职责切分；每格的行为边界 / 接口契约 / 验收落在其单独的 per-module 文档；idea 只是上游素材，不等于设计。"}, {"id": "design/stage-skill.md", "layer": "design", "subtype": "", "title": "模块设计：stage_skill（reflector 的提案工具，emit-intent）", "status": "", "summary": "reflector 的唯一写入面——一个 subagent-scoped 的 MCP 工具。但它不写 skill 树、不碰 live、也不写 staging：只把一次 skill 改动结构化地发成 intent、append 进 per-run intent 队列。成型 / 校验 / 落盘全在确定性 promoter（admission 模型）。读用宿主内建 `Read` / `Grep` / `Glob`；改动只此一途、去掉通用 Write/Edit。", "body": "# 模块设计：stage_skill（reflector 的提案工具，emit-intent）\n\n[reflector](reflector-subagent.md) 的**唯一写入面**——一个 **subagent-scoped 的 MCP 工具**。但它**不写 skill 树、不碰 live、也不写 staging**：只把一次 skill 改动**结构化地发成 intent**、append 进 per-run intent 队列。成型 / 校验 / 落盘全在确定性 [promoter](validate-store.md)（admission 模型）。读用宿主内建 `Read` / `Grep` / `Glob`；改动只此一途、**去掉通用 Write/Edit**。\n\n## 为什么是 tool，不是通用 Write/Edit\n\n- **input schema 在源头约束结构**：`{action, name, level, body | delta, reason, evidence}` 的必填 / 类型 / enum 让模型**填不齐 / 填歪就调不了**——结构性返工从源头消失，而非事后被 linter 拒、整轮浪费。可在入参即跑 Hermes 校验（frontmatter / size）给**当场反馈**。\n- **LED 字段入参即保证**：`reason / evidence` 是必填参 → intent 必带 LED，[promoter](validate-store.md) 的\"LED 有没有\"几乎不可能被违反。\n- **更紧的 least-privilege**：没有通用 Write/Edit，改动**只能**走它；**它只 append intent 队列、不碰任何 skill 树** → 模型结构上 land 不了，path-guard 降为 backstop。\n\n它是**提案**的护栏，**不是闸、也不是写**——闸与落盘是 promoter 的（模型碰不到）。**tool 前置「结构」，promoter 兜「成型 + 内容 + 安全 + 落盘」。**\n\n## intent 带什么\n\nintent = **修改内容 + 元数据**，随 action 变：\n\n| action | 修改内容 | 元数据 |\n|---|---|---|\n| `create` | **完整 body** | `name`、`level`（必填）、`reason`、`evidence` |\n| `update`（整篇覆盖） | **完整 body** | `name`、`reason`、`evidence` |\n| `patch`（小改首选） | **delta**（`old_string→new_string`，不带全文） | `name`、`reason`、`evidence` |\n| `delete` | 无 | `name`、`reason`、`evidence` |\n\n- **patch 只带 delta**：一行小改不必搬全文，promoter 用 `live + delta` 重建（\"读 live\"落在 promoter 应用 delta 那一刻）。\n- **create / overwrite 带全文**：无 base 可依。\n- **能力子文件（folder-skill）**：create / update 可附带**能力子文件**（`scripts/` `templates/` `assets/` / 人撰 `references/*.md`）的 `相对路径 → 内容`，随主 intent 一同交 promoter 落。**路径由 agent 选、但过死闸**：相对、限本 skill 文件夹、限白名单类别、名字过 `_validate_file_path`（无 `..` / 绝对路径 / 断 symlink），deny-by-default。**证据 `references/` 切片不经本工具**——由 CAP 确定性物化、模型不命名（见 [cap](cap.md) / [validate-store](validate-store.md)）。\n- intent **自带 LED**（`reason / evidence`）→ append 语义（详见 [validate-store](validate-store.md) 的 LED 节）。\n\n成型为「最终全文」、读 live、原子落盘——**全是 promoter 的事**、不在本工具。\n\n## global vs project（层）\n\n- **create**：`level: global|project` 是**入参**、**默认 project**；global 高门槛（promoter 的 repo-agnostic 闸 + prompt 强调）。\n- **update / delete**：模型只给 `name`，**层由 promoter 按两层并集定位现有 skill 解析**（扩 Hermes `_find_skill` 到两层，**同名跨两层 → 报错消歧**）；tool 可在入参做一次存在性检查给当场反馈。\n\n## 复用 Hermes（相对 `skill_manager_tool.py`）\n\n- **复用校验函数**（`_validate_frontmatter` / `_validate_content_size` / `_validate_file_path`）：**入参即时反馈**用一份、promoter linter 防御纵深再用一份（tool 是模型面，确定性侧别全信它）。\n- **复用 `_find_skill`**（扩两层）：promoter 解析 update / delete 的层用，tool 入参存在性检查也可用。\n- **不复用写 / 应用 / 回滚**：`_atomic_write_text`、patch 应用、write-first 回滚、`created_by` ContextVar、`_pinned_guard`——这些是 **promoter / Commit / MNG** 的事。tool 本身**不落任何盘**（除 append intent 队列）。\n\n## 边界（与 promoter 分工）\n\nschema 只保证**结构**（字段齐 / 类型 / level 合法）。**内容 / 交叉引用 / 安全 / 成型 / 落盘**它表达不了——引用文件存在、引用 tool 存在、占位符、global repo-agnostic、`skills_guard`、patch 成型、原子 rename——**全在 [validate-store](validate-store.md) 的 promoter**。\n\n## 待解 / 动手前实测\n\n- **MCP 工具能否 scope 到单个 subagent**（只 reflector 可见、正常会话不可见）：实测确认。\n- 入参校验失败时，模型在 subagent 会话内**当场改**的闭环是否顺（vs 整轮重来）：实测。\n- intent 队列的格式 / 持久性（崩溃补处理 vs 丢这轮）：与 [validate-store](validate-store.md) 待解同。\n- **MCP 进程绑定缓 Phase 7**：`server.py` 现交付确定性工具处理器（schema 强制 + 即时反馈 + 只 append），暴露 `TOOL_SCHEMA`（广告面）与 `stage()`（强制权威）；stdio JSON-RPC 进程外壳与 `.mcp.json` 注册随打包落地——零依赖铁律禁引 `mcp` SDK、wire 形态又依上面 MCP-scope spike 的结论。\n\nprovenance：骨架 [Hermes](../sources/github/nousresearch-hermes-agent.md)（`skill_manager_tool` 的校验 + `_find_skill`）；校验项接 #416；least-privilege / 只写自产 [additive-over-native-skill](../ideas/additive-over-native-skill.md)；层选择见 [ref](ref.md) 的「放哪层」，成型 / 内容 / 安全 / 落盘见 [validate-store](validate-store.md)。"}, {"id": "design/validate-store.md", "layer": "design", "subtype": "", "title": "模块设计：校验·存储（确定性 promoter，admission 模型）", "status": "", "summary": "spine 的 校验·存储 格。它是宿主 skill 树的唯一确定性写者：读 reflector 经 stage_skill 发来的 intent（提案），内存里成型最终全文、内存里校验，过了才原子落盘。模型只 propose、碰不到盘——land 与校验全在这。仿 K8s validating admission（校验 in-flight 对象、allow 才 persist）+ POSIX atomic-write（temp 同目录 + 原子 rename）。", "body": "# 模块设计：校验·存储（确定性 promoter，admission 模型）\n\nspine 的 校验·存储 格。它是宿主 skill 树的**唯一确定性写者**：读 reflector 经 [stage_skill](stage-skill.md) 发来的 **intent**（提案），**内存里成型最终全文、内存里校验，过了才原子落盘**。模型只 propose、碰不到盘——land 与校验全在这。仿 **K8s validating admission**（校验 in-flight 对象、allow 才 persist）+ **POSIX atomic-write**（temp 同目录 + 原子 rename）。\n\n## validate-before-ANY-write（admission 模型，强于 Hermes write-first）\n\nHermes `skill_manage` 是 **write-first**：先 `_atomic_write_text` 落盘、再（默认 no-op）扫描、出事回写——坏内容先碰盘。我们反过来、且更彻底：**校验通过前任何盘都不落**。\n\n```\nreflector ──stage_skill──► intent（不落盘）\n   promoter：\n     ① 成型最终全文（内存）：create/overwrite=full body；patch=读 live+应用 delta；delete=标记移除\n     ② 校验（内存）：linter 六类（见下），此刻同握 old=live + new=成型结果\n     ③ pass → hardcode 盖 `created_by`（create 对象）→ 写 temp（live 同目录 `.SKILL.md.tmp`）+ fsync + os.replace 原子改名 + sidecar（含标签）→ live\n        reject → 什么都没写、不打标\n```\n\n- **谁读 live**：promoter，**且只在 patch**（应用 delta 必须有 base）；create / overwrite / delete 不读。**没有\"先把 live 抓进暂存区再改\"这一步**——它本不该存在。\n- **唯一落盘 = pass 后的 temp + 原子 rename**：temp 必须同目录才能原子改名，且 `.tmp` 不是 `SKILL.md`、live-detect 忽略。原子 = live 永不半态。\n- 旧不变量 validate-before-**live**-write 升级为 validate-before-**ANY**-write：连暂存那次盘也不落。\n\n## 没有 staging tree\n\n整棵镜像 skill 树（per-run 子目录 / 逐 skill 拷贝 / 清理 / 孤儿）**不存在**。要清的只剩两样、都轻：\n\n- **per-run intent 文件**（stage_skill append 的小队列）：promoter 处理完即删。\n- **孤儿 `.SKILL.md.tmp`**：只在\"写 temp 与 rename 之间崩溃\"才留，启动按前缀 sweep（atomic-write 卫生）。\n\n## skill = 文件夹（SKILL.md + 子文件），references 兼作证据切片\n\n参考 Hermes（skill 即文件夹：`SKILL.md` + `references/` `scripts/` `templates/` `assets/`，curator 的 review fork 用 file 工具直接产）。本项目**同形、不同产法**：模型只发 intent、promoter 唯一写，子文件也由 promoter 落、不给模型 file 工具。子文件分两类、来源不同：\n\n- **能力子文件**（`scripts/` `templates/` `assets/` 及人撰 `references/*.md`）：**REF 在 intent 里提议**（含相对路径），随 SKILL.md 一同过校验、一同落盘。路径过死闸——相对、限**本 skill 文件夹内**、限**白名单类别目录**、名字过 `_SAFE_NAME`（无 `..` / 绝对路径 / 断 symlink），deny-by-default（复用 [stage_skill](stage-skill.md) 的 `_validate_file_path`）。\n- **证据 references（聊天切片）**：**确定性物化、模型不产不命名**（否则可伪造 provenance）。每条 LED 证据 = 一个 `references/\u003cslice>.md`（CAP egress 脱敏后落，路径按内容/序号系统生成，见 [cap](cap.md)），LED 条目**指向该文件**而非内嵌字符串——证据不丢、不撑大账本，沉淀成 skill 自己的引用语料供 SKILL.md 按需引（渐进披露）。\n\n**原子性（单文件 → 文件夹）**：召回面只 `SKILL.md`，故仍以**它的原子 rename 作提交点**——子文件各自先原子落（每个 `.\u003cname>.tmp` + `os.replace`；证据切片 additive、按内容命名幂等），**SKILL.md 末尾翻转**，读者永不见 SKILL.md 指向未落的子文件；子文件 `.tmp` 与 `.SKILL.md.tmp` 一并按前缀 sweep。严格整夹原子（whole-folder）需 temp 目录 + 目录级 rename，更重，留[待解](#待解)。\n\n## Validate（一道确定性 linter，跑在内存成型结果上，不调 LLM）\n\n逐 intent 跑，产 verdict `{pass / reject + findings}`，**全确定性**（快、精确、不可注入）。查六类：\n\n- **安全**：`skills_guard`（见下）。\n- **结构（#416）**：frontmatter 可解析 + 必填（name / description）；SKILL.md **引用的子文件必须随 intent 携带或已 live**（promoter 落齐才算\"存在\"），且每个子文件路径过路径安全闸（限本 skill 文件夹 / 白名单类别 / 名字安全）；`.py` 过语法解析；无断 symlink。\n- **LED 有没有**：intent 必带 LED（`reason / evidence` 是 stage_skill 必填参），缺 / 空即 reject——每次 land 都在账上有据。\n- **内容完整**：无 `TODO` / 占位符 / 空节。\n- **global 更严（repo-agnostic）**：`level=global` 含 **repo-local 标识**（绝对路径 / 本仓名 / repo 专有 id）→ 降 project 或 reject。global 爆炸半径 = 每项目都加载，从严；project 不设。\n- **自产标签（只动自产）**：`update / patch / delete` 的目标 live skill **必带 `created_by:agent`**（hardcode 读 sidecar），无标签即 reject——不碰用户 / 原生 / 外来 skill（[additive-over-native-skill](../ideas/additive-over-native-skill.md) / [lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)）。`create` 无目标、豁免此**查**；它的**打标**不在校验里——而在**六类全 pass 之后**才 hardcode 盖（写随 land，见下），**未过校验绝不打标**。\n\naction（create / update）由\"live 对应物在不在\"现算（存在性检查），**不设撞名检查**；`level`：create 在 intent 声明、update / delete 由 promoter 按两层定位现有 skill 解析；`delete` 由 intent 显式。\n\n**去重不在这道闸**：靠 REF compare-first（作者读描述索引定改>建）+ MNG 动态兜底，**不设上线前独立判断**（见[待解](#待解)），确定性侧也**不搭** hash / 相似度引擎。\n\n## Commit / 原子发布（pass 才发生）\n\n- **create / update** → （**pass 后**）hardcode 盖 `created_by:agent`（create）→ **子文件（能力子文件 + 证据 references 切片）各自先原子落、`SKILL.md` 末尾翻转作提交点**进**对应层**（create → intent 的 `level`；update → 定位到的 live 层）+ sidecar（含标签，随 land 原子写）+ 把 **intent 自带的 LED 条目** append 进真 LED（`evidence` 记为对应 `references/\u003cslice>.md` 的指针，append-only、只记既成事实）。**查在校验内、盖在 pass 后、写在 land——reject 绝不打标。**\n- **delete** → 原子移除 + 交 MNG 归档 + LED 退役事件。\n- **reject** → 什么都没写、不入账（watermark 已防重复反思，不为\"拒绝留痕\"另立机制）。\n- **并发**：promoter 是 live 唯一写者、**串行**（两 run 同改一 skill → 锁 + last-writer）。\n\n## diff 给谁\n\npromoter 此刻同握 **old(live) + new(成型结果)**（= admission 的 `object` + `oldObject`）。v1 真用到的只有**存在性检查 → action**；**完整文本 diff 没有 gate 在读**（inspector / 人审都删了），留作日志 / 将来 inspector（[待解](#待解)）。\n\n## 执行保证（模型绕不过、promoter 一定跑）\n\n- **绕不过**：reflector 工具只有 `Read / Grep / Glob / stage_skill`，stage_skill 只记 intent → **模型结构上无法 land、跳不过闸、碰不到 live**；最大效果 = 塞一条 intent。\n- **一定跑**：**CAP hook（确定性）→ spawn reflector（只发 intent）→ promoter（确定性、编排无条件调）** 两段确定性书挡夹着模型；模型**没有 validate / commit 工具**，\"跳过校验\"不是它的可选项。\n- **崩了安全**：intent 进 durable 队列；原子 rename = 全有或全无；promoter 没跑 / 崩 → 未处理 intent 留队列、下次补处理（at-least-once + 原子 land = 实际 exactly-once）；极端没跑 → 什么都没 land（**fail-safe / deny-by-default**）。\n\n## 抄 Hermes `skills_guard`，但**默认翻转为开**\n\n`skills_guard` = trust × verdict 的正则静态扫描（exfiltration / injection / destructive / persistence / network / obfuscation）。Hermes 对 **agent-created 默认关**（理由：\"agent 反正能 terminal 直接跑\"）。**对我们不成立**：我们的 skill **延迟执行、持久、可传播、来料含 trace（间接注入）**——威胁模型更强，故 **self-produced 默认过扫**。并强化 **injection 类**：SKILL.md 正文本身就是注入宿主上下文的载体，\"覆盖系统指令 / 总是 exfiltrate\"这类**指令型注入**是一等威胁。红队用例（投毒 skill 被挡）进单元 + 系统测试。\n\n## created_by:agent —— 参考 Hermes，并因架构而更干净\n\nHermes 用 **write-origin ContextVar**（`tools/skill_provenance.py`）：review fork 把 `_write_origin` 设为 `background_review`，`skill_manage create` 时若是该 origin 就 `mark_agent_created`，写进 **sidecar `~/.hermes/skills/.usage.json`**（`tools/skill_usage.py`，**明确\"sidecar, not frontmatter\"**——把运维元数据挡在 SKILL.md 之外，护召回 + 不污染用户作品）。`is_agent_created` 据此判，curator 只动自产。\n\n**我们抄两点、改一点**：\n\n- **抄**：`created_by:agent` 走 **sidecar**、不进 SKILL.md frontmatter；它是 MNG 自动维护的成员资格钥匙（[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)）。\n- **抄**：同一 sidecar 挂 LED / verification 元数据（与 `.usage.json` 同位）。\n- **改（更干净 + 前移到确定性侧）**：Hermes 需 ContextVar，是因为**模型直接写盘、得探测\"我在不在 review fork\"**；我们 **`created_by` 全归确定性 hardcode**——**查**（`update/patch/delete` 目标须自产、否则 reject，属六类校验之一）+ **盖**（**六类全 pass 后**才给 `create` 成型对象强制打标，未过不盖），无需 origin 探测（promoter 是 live 唯一写者、只从 intent 成型，本就知是自产）。**物理写随 land 原子落**（sidecar 与 SKILL.md 一同，保一致；**不在校验阶段写盘**，守\"校验无落盘副作用\"）。**标签真相归确定性闸**：过闸落地即 `create` 必带标、`modify` 目标必自产。\n\n## 决策\n\n- **promoter = admission**：内存成型 → 内存校验 → pass 才原子落盘（**validate-before-ANY-write**）。仿 K8s validating admission + atomic-write。\n- **模型只发 intent、碰不到盘**；land 与校验在确定性 promoter，模型**无工具可跳**——执行保证靠\"确定性书挡 + 能力受限 + durable 队列 + fail-safe\"。\n- **唯一落盘 = temp 同目录 + `os.replace` 原子 rename**；live 永不半态；**无 staging tree、无版本史**。\n- **谁读 live = promoter 且只 patch 时**（应用 delta 需 base）；create / overwrite / delete 不读。\n- **linter 六类**（安全 `skills_guard` + #416 结构 + LED 有 + 内容完整 + global repo-agnostic + **自产标签**），跑在内存成型结果上，**全确定性、不调 LLM**。\n- **去重不在闸**：REF compare-first + MNG 动态；合理性靠随用随验（[dynamic-validation-lifecycle](../ideas/dynamic-validation-lifecycle.md)）。\n- **format 单一来源契约**：必填 / 结构 / references 约定 = 单独维护的 spec，**authoring（reflector 正文）与 #416 linter 同源**。\n- **action 存在性现算**（不设撞名）；**`level`**：create 在 intent 声明、update / delete promoter 解析；`delete` 由 intent 显式。\n- **LED 在 intent 自带**（stage_skill 必填 `reason / evidence`），pass 才 append 真 LED（append-only），reject 不入账。\n- created_by 走 sidecar；**确定性 hardcode 查 / 盖**（modify 目标须自产否则 reject、属六类之一；create **过六类校验后才**打标、未过不盖），不用 origin 探测；物理写随 land 原子落、保 sidecar 与 SKILL.md 一致。\n- skills_guard self-produced 默认开（威胁模型强于 Hermes）。\n\n## 待解\n\n- **独立判断层（跨 skill 重复 / 漏更新）**：v1 删去——去重只靠 REF compare-first + MNG。将来可加一个独立 cheap LLM（吃 diff + LED + 全库描述索引）补 REF 的库级盲点（author ≠ inspector，#25833③ 的最小实现）；fancpp 的两个确定性正则（引用 **tool** 存在 / 负向断言 #6051）是更轻的候选，可先于 LLM 收。\n- **文本 diff 的消费者**：v1 无 gate 读（只用存在性→action）；留日志 / 将来 inspector。\n- **intent 队列是否持久**：要崩溃补处理就留、处理完删；不要更轻（崩了 fail-safe 丢这轮学习）——取舍待定。\n- **dry-run 复现性**（#25833①）：留后，需计算 sandbox。**一致性 / success_rate**（#25833②）：归 MNG，留后。\n- **并发同改一 skill 的锁粒度**：待定。\n- **folder-skill 整夹原子粒度**：v1 取\"子文件先落 + `SKILL.md` 末尾翻转作提交点\"（召回面单文件原子）；严格 whole-folder 原子需 temp 目录 + 目录级 rename，更重，待定。\n- **证据 references 的保留 / 淘汰**：每次 create/update 落一条切片 → `references/` 无界增长、违「stays clean」，需随 MNG 管或留最近 N，策略待定。\n\nprovenance：[skill-recall-low-degrades-with-n](../ideas/skill-recall-low-degrades-with-n.md)（去重 / 描述卫生）、[precipitate-storage-layer](../ideas/precipitate-storage-layer.md)（`.claude/skills`）、[adherence-driven-curate](../ideas/adherence-driven-curate.md)（consolidation 改/建/删）、[record-scenarios-for-eval](../ideas/record-scenarios-for-eval.md)（LED）、[lifecycle-by-provenance](../ideas/lifecycle-by-provenance.md)（created_by 成员资格）；机制对照 [Hermes](../sources/github/nousresearch-hermes-agent.md)（write-first / skills_guard / write-origin sidecar / #416 lint / #25833 挂起 / **folder-skill 形态：SKILL.md + references/scripts/templates/assets**）、[ECC](../sources/github/affaan-m-ecc.md)（乐观写入、无门）；新机制对照 **K8s validating admission**（校验 in-flight、allow 才 persist）+ **POSIX atomic-write**（temp 同目录 + 原子 rename）——源卡待建。"}, {"id": "ideas/additive-over-native-skill.md", "layer": "ideas", "subtype": "", "title": "不影响原生 skill 本来的功能：增强纯叠加、对原生零侵入", "status": "候选", "summary": "主张：autoharness 对宿主的一切增强（hook 观察 / 强制注入 / 独立存储）必须是纯叠加，不改变原生 skill 本来的功能与使用体验——skill 的新增、读取、description 概率触发等既有路径维持原样，不被替换、拦截、降级。「走 hook 强制注入」是在原生之外另开一条确定性通道，而非接管或绕改 skill 加载本身；两条通道并存，用户对原有流程的感知不变。", "body": "# 不影响原生 skill 本来的功能：增强纯叠加、对原生零侵入\n\n> user 提出的产品边界，status 候选，待 user 升 `采纳` 或改 `否决`。\n\n**主张**：autoharness 对宿主的一切增强（hook 观察 / 强制注入 / 独立存储）必须是**纯叠加**，**不改变原生 skill 本来的功能与使用体验**——skill 的新增、读取、description 概率触发等既有路径维持原样，不被替换、拦截、降级。「走 hook 强制注入」是在原生之外**另开一条确定性通道**，而非接管或绕改 skill 加载本身；两条通道并存，用户对原有流程的感知不变。\n\n自产 skill 落 **global / project 两层皆可**——那是「放哪」的问题，与本卡「不碰 native」**正交**：两层里的 native / 用户 skill 一律不动，叠加只新增自产符号。\n\n**这条边界只管「不破坏原生固有功能」，与「维护」分开**：去重 / 退役 / 纠偏是生命周期组件（[滚动 curate](adherence-driven-curate.md)）的职责，不在本卡。本卡是一条**非功能约束**——我们的叠加零侵入原生；至于要不要回头维护原生 skill，是 [按 provenance 划生命周期成员](lifecycle-by-provenance.md) 的显式授权路径另说。它也是 [hook 强制注入](hook-forced-injection.md) 能被采纳的**前提**：可靠性的提升不得以牺牲原生功能 / 体验为代价。\n\n## 论据 / 出处\n\n[ECC](../sources/github/affaan-m-ecc.md) 的增强全程经由 SessionStart / UserPromptSubmit 等 hook 与独立的 instinct 存储实现，从不 patch 宿主内部、不改其 skill 加载器——即「在原生之外叠加」在工程上现成可行的实证。据此，叠加只在「原生留白处」加通道（hook 注入、独立存储），绝不重写原生 skill 的注册与读取链路。\n\n## 关联\n\n是 [hook 强制注入](hook-forced-injection.md) 的采纳前提（非功能约束）；与 [按 provenance 划生命周期成员](lifecycle-by-provenance.md) 划清边界——本卡管「默认不碰原生功能」，那条管「opt-in 维护原生 skill 时怎么安全地碰」（显式授权 + 可回滚 + 验证窗口）。"}, {"id": "ideas/adherence-driven-curate.md", "layer": "ideas", "subtype": "", "title": "经验生命周期管理：Hermes 式时间状态机为骨架，遵守度定生死留后", "status": "候选", "summary": "主张：符号沉淀后进入一条永不终止的生命周期——上浮、下沉、退役。骨架先用能跑的时间状态机；用遵守度定生死的那一层留后（见下）。", "body": "# 经验生命周期管理：Hermes 式时间状态机为骨架，遵守度定生死留后\n\n> 以 [Hermes](../sources/github/nousresearch-hermes-agent.md) curator 已落地机制为骨架；[ECC](../sources/github/affaan-m-ecc.md)「按遵守度定生死」的理念**留后**。user 认可，status 候选，待复核。\n\n**主张**：符号沉淀后进入一条**永不终止的生命周期**——上浮、下沉、退役。骨架先用能跑的**时间状态机**；**用遵守度定生死的那一层留后**（见下）。\n\n## 骨架（确定）\n\n机制与触发时机拆开——机制可借 Hermes，时机不可照搬：\n\n- **机制**：确定性失活状态机 `active → stale → archived`，再被用到即 reactivate；**只归档、不删除**（可逆）；成员资格按 [provenance 划线](lifecycle-by-provenance.md)；重组（合并近义 / umbrella）作可选的更贵一档，**默认不开**。\n- **反思时校验（consolidation）**：每次在 [episode 边界反思](episode-boundary-reflection.md) 时，把新候选与已有 skill 校验，据此**更新已有 / 新建 / 删除**（Hermes `skill_manage`：add/replace/remove）——符号增删改的主入口，与失活状态机正交（一个管「和已有比怎么并」，一个管「没人用就退」）。\n- **触发**：不照搬 Hermes 的常驻 daemon（Claude Code 等是临时进程，会话间无常驻、墙钟 sweep 无执行者）。改为**失活走惰性判定**（在 `SessionStart` / 注入那刻按时间戳现算 stale / 退役）、**去重走准入事件驱动**（新符号入场才比）。\n\n**两轴正交**：「存活」轴管「用得好不好、活多久」，与「准入」轴（结构化冲突 / 重复 / 包含，管能不能进）分开。本卡的「矛盾」专指**符号 vs 实际行为**（说一套做一套），不是符号之间的冲突。\n\n## 留后（留窗口，现在不做）\n\n**用遵守度定生死**——把存活依据从**纯时间**升级为**被遵守 / 被矛盾**（被矛盾→下沉、被遵守 / 复现→上浮、跨项目复现→升 global、跌破阈值→事实性退役）。现在不做，因为：① 依赖已留后的使用日志 + 遵守度监控（见 [record-scenarios-for-eval](record-scenarios-for-eval.md)）；② ECC 设计了却从未实现，autoharness 也不一定好做。[dynamic-validation-lifecycle](dynamic-validation-lifecycle.md) 视它为**最终核心**，本卡 v1 先搁置。\n\n## 论据 / 出处\n\n- **骨架**来自 [Hermes](../sources/github/nousresearch-hermes-agent.md) curator（读源码核实）：确定性 `active→stale→archived`、never-delete-only-archive、pin 豁免、按记录 / 渠道圈范围、umbrella 合并默认关——目前唯一**实际在跑**的生命周期实现。\n- **理念（留后）**来自 [ECC](../sources/github/affaan-m-ecc.md)：`observer.md` 写明遵守度标量动态，但代码审计证实**全是死规格**（无回读改写、活跃符号永不过期）——故是认可方向、未证可行。\n\n## 待解 / 边界\n\n- **失活刻度**：v1 用墙钟天；「使用相对」（几次会话未被用）更准，但需使用日志（已留后）。\n- **会话边界覆盖盲区**：惰性 + `SessionStart` 触发意味着长期不开会话就不跑；是否需下次开会话补算积压、补算会否一次退役过多，待定。\n\n## 关联\n\n成员资格见 [按 provenance 划生命周期](lifecycle-by-provenance.md)；留后的遵守度轴接 [dynamic-validation-lifecycle](dynamic-validation-lifecycle.md)，其信号供料需 [从对话回合捕获](trace-based-pattern-extraction.md) / 使用日志（[record-scenarios-for-eval](record-scenarios-for-eval.md)，留后）。「退役 = 不再注入」依赖 [hook 强制注入](hook-forced-injection.md)。装配进 [design/](../design/index.md) 的 Manage 段。"}, {"id": "ideas/dynamic-validation-lifecycle.md", "layer": "ideas", "subtype": "", "title": "核心理念：在运行中积累并验证经验，而非定期收集 eval 跑进化", "status": "候选", "summary": "主张：经验的积累与验证都应在真实工作流里就地、随交互发生（in-the-loop），而非「定期攒一个 eval 集 → 离线跑一轮进化 / 裁决」。理由是环境随每次交互漂移：基于历史 trace 建的 eval 会过期——昨天验证成立的依据，今天的环境已不复存在。所以验证不是一次离线 replay 拿到的快照分，而是随后续真实运行就地累积；历史依据本身随环境衰减、退役，不是永久 golden。", "body": "# 核心理念：在运行中积累并验证经验，而非定期收集 eval 跑进化\n\n> user 倡导为核心理念（thesis 级）。status 候选，待复核。\n\n**主张**：经验的积累**与验证**都应在**真实工作流里就地、随交互发生**（in-the-loop），而非「定期攒一个 eval 集 → 离线跑一轮进化 / 裁决」。理由是环境**随每次交互漂移**：基于历史 trace 建的 eval 会过期——昨天验证成立的依据，今天的环境已不复存在。所以验证不是一次离线 replay 拿到的快照分，而是随后续真实运行**就地累积**；历史依据本身随环境衰减、退役，不是永久 golden。\n\n## 落点：验证内生于沉淀回路，不另起裁决子系统\n\n本理念**不**新增一套独立验证机制，而是让验证落在已有回路上：\n\n- **就地验证（现行）**：每次在 episode 边界反思时，把新蒸馏的候选与**已有 skill 校验**，据此**更新 / 新建 / 删除**（[episode 边界反思](episode-boundary-reflection.md) 的 Hermes consolidation）；加上 [滚动 curate](adherence-driven-curate.md) 的确定性失活状态机（长期不被用 → stale → 退役）。机制与时机归这两张卡，本卡只立理念。\n- **遵守度动态验证（留后）**：把存活依据从「时间 / 使用」升级为「被遵守 / 被矛盾」（说一套做一套即一次矛盾），是更强的随用随验；但依赖留后的使用日志 + 遵守度监控，[滚动 curate](adherence-driven-curate.md) 已将其标为留后。\n- **离线 replay（兜底）**：[离线评测验证](../synthesis/offline-validation.md) 从裁决轴降为**高风险时才动用**的兜底，不再是常规轴。\n\n## 论据 / 出处\n\n环境漂移使历史 eval 失效，是 [离线 replay 子类②](../synthesis/offline-validation.md) 在自评偏差（[SkillLens](../sources/papers/skilllens.md) 把上限按在 ≈46.4%）之外的**第二重隐患**——靶子本身在移动。定位上，这把 autoharness 与 [SkillOpt](../sources/papers/skillopt.md) / offline-eval 那种「周期收集 eval → 进化」家族**划开**。\n\n## 待解 / 边界\n\n- **重开决策**：把 [离线 replay](../synthesis/offline-validation.md) 从已采纳的「裁决轴」降为兜底，须开 [决策工作表](../decisions/index.md)（驱动力：环境漂移下的有效性 / 成本 / 自评偏差 / 安全兜底）。\n- **信号强度**：时间 / 使用是弱存活信号；遵守度（留后）更强但「照做了」≠「做对了」，高风险动作仍可能需兜底 replay。\n\n## 关联\n\n机制归 [episode 边界反思](episode-boundary-reflection.md)（反思时校验 → 更新 / 新建 / 删除）与 [滚动 curate](adherence-driven-curate.md)（失活状态机 + 遵守度留后）；重排 [离线评测验证](../synthesis/offline-validation.md) 的地位（裁决轴 → 兜底）；给 [record-scenarios-for-eval](record-scenarios-for-eval.md) 的记录赋予「滚动过期」语义。是 DEFINITION 级理念，装配进 [design/](../design/index.md) 脊柱与定位。"}, {"id": "ideas/episode-boundary-reflection.md", "layer": "ideas", "subtype": "", "title": "按轮次在 episode 边界自动反思、整段蒸馏 skill——优于 ECC 逐调用从 hook 抓执行碎片", "status": "候选", "summary": "主张:经验沉淀的触发与粒度,应以一个完整任务轨迹(episode)为单位、在自然边界(一轮任务收尾)上整段反思一次,而不是像 ECC 那样在每次 PreToolUse/PostToolUse 上抓单条 tool I/O 碎片、再让后台 observer 从一个滚动 tail 里凑模式。Hermes 的 `_iters_since_skill` 计数器——累计 tool 迭代,默认满 10,在 turn 收尾触发后台 fork replay 整条刚跑完的 transcript 再 `skill_manage`——正是这种\"整段、按边界\"的反思,它在四点上优", "body": "# 按轮次在 episode 边界自动反思、整段蒸馏 skill——优于 ECC 逐调用从 hook 抓执行碎片\n\n**主张**:经验沉淀的**触发与粒度**,应以一个完整任务轨迹(episode)为单位、在自然边界(一轮任务收尾)上整段反思一次,而不是像 [ECC](../sources/github/affaan-m-ecc.md) 那样在每次 PreToolUse/PostToolUse 上抓单条 tool I/O 碎片、再让后台 observer 从一个滚动 tail 里凑模式。[Hermes](../sources/github/nousresearch-hermes-agent.md) 的 `_iters_since_skill` 计数器——累计 tool 迭代,默认满 10,在 turn 收尾触发后台 fork **replay 整条刚跑完的 transcript** 再 `skill_manage`——正是这种\"整段、按边界\"的反思,它在四点上优于 ECC 的逐调用抓流:\n\n1. **反思单位 = 完整 episode,而非截断的滚动窗口。** Hermes 反思一段语义完整、以 turn 收尾为界的轨迹;ECC 的 observer 读 `tail -n 500`,边界随 500 行任意切开,且 audit 实证 >500 obs/run 即成盲区。\n2. **语义完整 = 含用户意图与最终结果,而非只有 tool I/O。** Hermes replay 的 transcript 带着\"为什么(用户请求)\"和\"结果(最终答案)\";ECC 的 hook **刻意不抓 user prompt**,只能从 re-edit/revert **反推**\"用户纠正\"——这正是 [从对话回合捕获](trace-based-pattern-extraction.md) 指出的缺口,而整段 replay 天然补上。\n3. **连贯且便宜 = 同上下文 replay、命中 warm prefix cache,而非另起一次冷调用。** Hermes 的 fork 在原 turn 的暖缓存上整段重放(同 model、字节级前缀对齐、5 分钟 TTL 内);ECC 是对截断 tail 的一次 Haiku gestalt,无算法、不可复现。\n4. **触发信号 = 工作量构成的 episode 边界(10 迭代≈\"一个复杂任务\"),而非无差别逐调用 + 计数/冷却批处理(每 20 obs / 60s)。**\n\n**与 ECC 路线不是二选一,而是分层。** ECC 的 hook 抓取作为**数据搬运**仍有独到处——host-agnostic、不需占有 agent loop、对未\"收尾\"的会话也 100% 捕获(见 [从 trace 提模式](trace-based-pattern-extraction.md))。本卡主张的是**反思的粒度与时机**,与\"用什么管道搬数据\"正交:理想落地是把 Hermes 的反思粒度嫁接到 ECC 的捕获管道上。\n\n## 论据 / 出处\n\n源自 [Hermes-Agent](../sources/github/nousresearch-hermes-agent.md) 的 nudge-计数器机制(本会话读源码核实:`_iters_since_skill` 在主对话循环累加、turn 收尾满阈值即 `_spawn_background_review` fork 重放 transcript);对照 [ECC](../sources/github/affaan-m-ecc.md) 的 PreTool/PostTool hook 抓取 + 滚动 tail observer(2026-06-24 全源审计)。两者同属 [从 trace 沉淀经验](../synthesis/trace-to-experience.md) 方向的采集/触发前端,却选了不同的**反思单位**——这就是本卡判优的轴。\n\n## 待解 / 边界\n\n- **autoharness 多半不占有 agent loop**(它塑造 artifact、host 施加),拿不到 Hermes 那种\"在循环里维护计数器 + fork 重放\"的位置。落地形态应是:**用 ECC 式 hook 捕获作传输,但按 session/turn 把碎片归并、在 episode 边界整段反思**,而非照搬计数器。\n- \"10 迭代\"是 Hermes 的工作量代理,不必是最优边界;autoharness 的 episode 边界按什么定(turn 结束 / 任务完成信号 / token 预算),待证据。\n\n## 关联\n\n承接 [从 trace 沉淀经验](../synthesis/trace-to-experience.md);与 [从 trace 提模式(借 ECC 捕获前端)](trace-based-pattern-extraction.md)(管道,正交)、[从对话回合捕获](trace-based-pattern-extraction.md)(被整段 replay 天然满足)交叉牵制。将装配进 [design/](../design/index.md) 的 Intake 段。"}, {"id": "ideas/hook-forced-injection.md", "layer": "ideas", "subtype": "", "title": "要可靠生效的规则，走 hook 强制注入，别靠 skill 的概率触发", "status": "候选", "summary": "主张：规则的「载体」是决定其执行可靠度的一等变量。当一条规则必须每次生效时，应做成 hook 强制注入（`SessionStart` / `UserPromptSubmit`，其 stdout 即被当作注入上下文，确定性 100%），而非依赖 skill 的 description 概率触发（由模型判断相关性，约 50–80%）。由此autoharness多出一维职责：按「要求的可靠度」为每条规则选/修载体（hook 强制注入 / 常驻上下文 / description-skill），并标出「本该常驻却被写成概率 skill」的载体错配。", "body": "# 要可靠生效的规则，走 hook 强制注入，别靠 skill 的概率触发\n\n> 源于 ECC 实测机制，status 候选，待 user 升 `采纳` 或改 `否决`。\n\n**主张**：规则的「载体」是决定其执行可靠度的一等变量。当一条规则**必须每次生效**时，应做成 **hook 强制注入**（`SessionStart` / `UserPromptSubmit`，其 stdout 即被当作注入上下文，确定性 **100%**），而非依赖 skill 的 **description 概率触发**（由模型判断相关性，约 **50–80%**）。由此autoharness多出一维职责：按「要求的可靠度」为每条规则**选/修载体**（hook 强制注入 / 常驻上下文 / description-skill），并标出「本该常驻却被写成概率 skill」的载体错配。\n\n## 论据 / 出处\n\n[ECC](../sources/github/affaan-m-ecc.md) 实测此分层：观察与注入都走 hook —— `SessionStart`/`UserPromptSubmit` 把 project-scoped instinct 注入上下文（字符封顶 `ECC_SESSION_START_MAX_CHARS`≈8000，可关、可调档），**100% fire**；维护者明言「skills 概率触发 ~50–80%，hooks 100%」，故把高可靠规则全部路由到 hook 注入的 instinct，只把「偶尔相关」留给 description-skill。注入目的是**用（forward path）**而非优化——但「被遵守 / 被无视」会产出 adherence 证据，回喂观察 hook 做 curate（confidence decay）。\n\n未定细节：项目内是 top-N-by-confidence 还是全量到封顶、`UserPromptSubmit` 是否按当前 prompt 再筛 —— 需读 ECC `scripts/hooks/`。\n\n## 关联\n\n采纳前提是 [不影响原生 skill 功能](additive-over-native-skill.md)——hook 通道必须在原生之外另开，零侵入 skill 的新增与读取。尚未装配进设计（候选去向：autoharness的「载体选择 / vehicle-fit 检查」设计元素）。其上层延伸——在 hook 里跑 SkillDAG 式图召回、force-inject 依赖完整 bundle，让「边」在运行时变现而非仅供维护——为另一条待提 idea。"}, {"id": "ideas/lifecycle-by-provenance.md", "layer": "ideas", "subtype": "", "title": "按 provenance 划生命周期成员；默认机器自产入池、其余 opt-in（含「只维护」模式）", "status": "候选", "summary": "主张：生命周期（失活 / 淘汰 / 自动沉降）的成员资格按 provenance 默认划线——", "body": "# 按 provenance 划生命周期成员；默认机器自产入池、其余 opt-in（含「只维护」模式）\n\n> 合并原「维护脱离自积累」一卡。status 候选，待复核。\n\n**主张**：生命周期（失活 / 淘汰 / 自动沉降）的**成员资格按 provenance 默认划线**——\n\n- **默认入池 = 机器自学的经验**（本系统自产符号）：用得好上浮、被矛盾下沉、长期没用自动退役。\n- **默认在池外 = 其他来源**（用户手写、外部下载、Hub 装、原生 skill）：不被自动沉降，守住 [不影响原生 skill 功能](additive-over-native-skill.md)。\n- **可显式 opt-in**：把指定的其他来源符号纳入生命周期，享受自动沉降。正向加入，非默认卷入。\n\n划线的轴是**系统内生的所有权标记（机器自产 vs 外来）**，非外部清单或文件位置。**权限 = 所有权标记 + 默认保守**：只有带「机器自产」标记者默认进自动维护；即便入池，默认只失活 / 可逆归档，不默认改写 / 合并（fail-safe、deny-by-default）。唯一硬要求是引擎能判定「是否自产」；承载形式（内联标记 vs 单独登记表）未定。\n\n## 「只维护」模式：维护可脱离自积累单独成立\n\n生命周期机制对符号**来源不可知**——管机器自产，同样能管用户手写的原生 skill。于是「**自积累**（自动生成新符号）」与「**维护**（去重 / 退役 / 纠偏已有符号）」**可解耦交付**。存在一类用户：不想要自动生成，却苦于手写 skill 越攒越多、互相打架、过期——给他们「**只维护、不生成**」模式，是更低门槛入口，也扩大可服务人群（对商业 / 谨慎用户尤其友好：无新增行为 = 低风险、易合规，是 audit / gate / rollback 治理卖点的轻量入口）。\n\n落地形态（opt-in 未来档，暂不纳首版）：能判定「是否自产」即够、不需独立池子；对外来 skill 的任何失活 / 改写必须**可回滚**；改动生效前留**用户验证窗口**（仅留接口位，机制待设计）；默认只失活 / 归类。\n\n## 论据 / 出处\n\n[Hermes](../sources/github/nousresearch-hermes-agent.md) 代码实证正反两面：它**也**只对 `skill_manage create` 的自产物跑失活（30/90 天），其余默认豁免——方向对；但其保护轴是**外部渠道清单（bundled/hub）+ 手动 `pin`**，且明说「manually authored skills are not inferred from filesystem location」，对「即兴 `/learn`、手动 clone」有识别盲区。教训：(1) 默认按 provenance 分池对；(2) 所有权不能只靠外部清单 / 人手 pin——autoharness 改做**系统内生标记 + 显式 opt-in 加入**。[滚动 curate](adherence-driven-curate.md) 借的 Hermes curator 骨架作用于「一个符号集合」、不要求集合是机器生成的——这正是「只维护」模式可独立成立的机制依据。\n\n## 待解 / 边界\n\n- provenance 判定的**承载形式未定**（内联标记 vs 登记表）。\n- opt-in 的**粒度与可逆性**（逐符号 / 按目录 / 按来源；能否对称 opt-out）。\n- 更强动作（改写 / 合并）对外来符号的阈值与收紧程度。\n- 「只维护」与「维护 + 自积累」是两个 SKU 还是一个开关，待定。\n- 与 [不影响原生 skill 功能](additive-over-native-skill.md) 的张力：维护原生 skill 必然要改写 / 退役它——化解靠显式授权 + 可回滚 + 验证窗口（其中用户验证机制仍待设计）。\n\n## 关联\n\n是 [滚动 curate](adherence-driven-curate.md) 的成员资格规则（谁进这条流）；受 [不影响原生 skill 功能](additive-over-native-skill.md) 约束（默认不碰外来）。装配进 [design/](../design/index.md) 的 MNG（兼产品定位）。"}, {"id": "ideas/precipitate-storage-layer.md", "layer": "ideas", "subtype": "", "title": "经验自动沉淀后存在哪一层——倾向 B（新增为 skill，参考 Hermes），独立 instinct 层留作苗圃", "status": "候选", "summary": "倾向 B：沉淀物固化为原生 skill，复用注册/读取链路，且便于在用户间传播分享。两条遗留张力转由别处消化，不在本卡内重证：", "body": "# 经验自动沉淀后存在哪一层——倾向 B（新增为 skill，参考 Hermes），独立 instinct 层留作苗圃\n\n> 原为开放问题。user 取向：**选 B，沉淀物长成原生 skill**（参考 [Hermes](../sources/github/nousresearch-hermes-agent.md)），新增驱动力 = **可传播**（skill 是天然可分发单元，独立 instinct 私有层不便传播）。status 升 候选；正式坍缩成 ADR 待开。\n\n## 取向（user）\n\n倾向 **B**：沉淀物固化为原生 skill，复用注册/读取链路，且**便于在用户间传播分享**。两条遗留张力转由别处消化，不在本卡内重证：\n\n- 「B 是否仍算纯叠加」（[不影响原生 skill 功能](additive-over-native-skill.md) 的边界）：维护已有 skill 必然要改写/退役，授权与回滚契约由 [按 provenance 划生命周期成员](lifecycle-by-provenance.md) 处理。\n- 「原生 skill 机制能否承载 curate 退役」：保留**混合解**作落地路径——沉淀先入独立 instinct 层做 curate（苗圃），存活到阈值再「毕业」固化为可分发 skill（成品架）。\n\n**问题**（原始陈述，保留）：autoharness把 trace 蒸馏出的经验固化为符号后，这些符号的**存储形态**该是什么？两条候选：\n\n- **A — 独立一层（instinct-like）**：另开一类 rule.md / instinct 存储，与原生 skill 平级、彼此隔离；autoharness全权管它的增删改与注入，不经过 skill 注册链路。\n- **B — 新增为 skill**：沉淀产物直接长成原生 skill（SKILL.md），复用既有的注册、读取、description 概率触发路径，不另立存储。\n\n两条的真正分歧在**「谁来管生死、走哪条召回通道」**：A 把沉淀物关进autoharness私有、确定性注入的格子；B 把它交还原生机制、随概率触发浮沉。这不是命名之争——它决定了 curate、注入可靠度、与原生体验侵入度三者怎么摊。\n\n## 论据 / 出处\n\n来料同源、产物形态却分裂：[从 trace 沉淀经验](../synthesis/trace-to-experience.md) 的「沉淀产物」列已记下三系——[ECC](../sources/github/affaan-m-ecc.md) 落 **instinct**（独立存储，选 A）、[Hermes-Agent](../sources/github/nousresearch-hermes-agent.md) 任务后**自造 skill**（选 B）、[OpenClaw](../sources/github/openclaw.md) 落 **MEMORY.md**（第三形态）。生产系统并未对齐，说明这是真分歧而非已解问题。\n\n两条候选各自被别的卡牵制，尚不能独立判定：\n\n- 选 A 与 [hook 强制注入](hook-forced-injection.md) 天然契合——独立层正好挂确定性注入通道；且 [滚动 curate](adherence-driven-curate.md) 的「事实性死亡 = 不再注入」需要autoharness能直接退役一个符号，独立层给得起这个开关，原生 skill 的注册链路则不一定。\n- 选 B 复用原生触发，但 [不影响原生 skill 功能](additive-over-native-skill.md) 划下的边界要求零侵入——若沉淀物混进原生 skill 池并被autoharness增删改，是否仍算「纯叠加」存疑。\n\n注意与 [hook 强制注入](hook-forced-injection.md) 的分工：那条卡问的是**「一条规则按可靠度选哪个注入载体」**（hook / 常驻 / description-skill），是 forward path 的路由；本卡问的是**沉淀物本身存成什么、归哪一层、谁管它的生死**，是存储与治理。载体选择可以横跨任一存储形态，二者正交。\n\n## 待解 / 什么证据会定生死\n\n- 选 B 时，原生 skill 机制能否承载滚动 curate 的 confidence 衰减与「事实性死亡」？还是必须退回独立层才管得动退役？\n- 选 A 时，独立层如何不重复 skill 的能力（bundle / 依赖 / 渐进披露），避免造第二套 skill 系统？需读 ECC instinct 存储与 Hermes skill 自造两端的实现再判。\n- 是否存在**混合解**：沉淀先入独立 instinct 层做 curate，存活到阈值的再「毕业」固化为原生 skill——把 A 当苗圃、B 当成品架。\n\n## 关联\n\n直接源于 [从 trace 沉淀经验](../synthesis/trace-to-experience.md) 的「沉淀产物」分歧。与 [hook 强制注入](hook-forced-injection.md)（载体路由，正交）、[滚动 curate](adherence-driven-curate.md)（治理需求，约束选型）、[不影响原生 skill 功能](additive-over-native-skill.md)（侵入度边界，约束选 B）三者交叉牵制。定生死前不装配进 [design/](../design/index.md)；坍缩时应开一张 [决策工作表](../decisions/index.md)（驱动力：curate 治理力 / 注入可靠度 / 原生零侵入 / 不造第二套 skill 系统）。"}, {"id": "ideas/record-scenarios-for-eval.md", "layer": "ideas", "subtype": "", "title": "符号随附记录：v1 只做决策账本，使用·监控·验证留后", "status": "候选", "summary": "主张：符号（skill / 经验）的生平随符号就地记录，既作审计与回滚轨，也作日后 eval 的料。但 v1 只做决策账本；一切要\"判好坏\"的环节（使用日志、遵守度监控、验证）一律留后。", "body": "# 符号随附记录：v1 只做决策账本，使用·监控·验证留后\n\n> user 逐步收口。status 候选，待复核。\n\n**主张**：符号（skill / 经验）的生平**随符号就地记录**，既作审计与回滚轨，也作日后 eval 的料。但 **v1 只做决策账本**；一切要\"判好坏\"的环节（使用日志、遵守度监控、验证）一律留后。\n\n## 决策账本（v1 唯一要做的）\n\n每个符号一本 append-only 账本，**创建 / 更新 / 退役**都是其上一条事件，同一套要素：**发生时刻、事件类型、为什么（触发或诊断）、改动了什么、证据**。\n\n- **证据两件套**：一份**脱敏蒸馏切片**（durable 但残）+ 一个**指向宿主 log 的指针**（全但易断）。\n- **创建证据当场物化**：创建低频且必须 durable，故立即把切片脱敏落盘、不靠指针（宿主 log 会轮转）；并标「不可自验」——生成某符号的 trace 不得验证它自己。\n- **v1 无裁决**：没有\"判收不收\"这一步，反思提出一条即记一条，故账本不含 gate / outcome 要素。\n\n## 存储与来料（已定）\n\n- **trace 不自存**：完整上下文读宿主 log（如 Claude logs）按引用；留存不归我们管，要紧的就立刻物化脱敏。\n- **账本随符号、不进 skill 体**：放符号旁 sidecar（按符号 id），不混入被注入的 skill 正文（护召回）；可随 skill 打包传播。\n- **SkillHone 只借结构、不涉场景**：借其「诊断→改动→证据→结果」决策史骨架；其证据系 eval probe（我们延后）、且**根本不记场景**——创建 / 调用场景是 autoharness 自有，源出 ECC 抓取 / [从对话回合捕获](trace-based-pattern-extraction.md) / [离线评测验证](../synthesis/offline-validation.md) 子类②。\n\n## 留后（只留窗口，现在不做）\n\n- **使用日志**：每次调用的场景 + 指针 + 遵守度代理。\n- **遵守度监控 / 动态验证**：见 [dynamic-validation-lifecycle](dynamic-validation-lifecycle.md)。\n- **验证（replay / 打分）**，及「只记录 → 开始验证」的触发阈值。\n- **裁决要素（gate / outcome）**：将来若恢复准入再加。\n\n## 论据 / 出处\n\n- [SkillHone](../sources/papers/skillhone.md)：决策史骨架的范式（持久记 diagnoses / revisions / evidence / outcomes + rejected）；但其证据系 eval probe、且**不记场景**，故只借结构。\n- [从 trace 提模式](trace-based-pattern-extraction.md)：创建所凭的「复现场景」即正例种子。\n- 留后的使用 / 验证须守 [离线评测验证](../synthesis/offline-validation.md) 子类② 的红线：生成某候选的 trace 不得验证它。\n\n## 关联\n\n上游承 [从 trace 提模式](trace-based-pattern-extraction.md)、[episode 边界反思](episode-boundary-reflection.md)；成员资格随 [按 provenance 划生命周期](lifecycle-by-provenance.md)；留后部分接 [dynamic-validation-lifecycle](dynamic-validation-lifecycle.md) 与 [滚动 curate](adherence-driven-curate.md) 的遵守度判定。将装配进 [design/](../design/index.md) 的 Intake/Manage 段。"}, {"id": "ideas/skill-recall-low-degrades-with-n.md", "layer": "ideas", "subtype": "", "title": "skill 的召回率本就不高,且随 skill 数量增长而进一步恶化", "status": "候选", "summary": "主张:一个 skill「存在」远不等于它「被读、被用」。把使用拆成三段(① desc 注入 100% → ② 召回/触发 概率性 → ③ 执行 概率性,见 skill 的召回率与执行率)后,真正决定「被用」的 ② 召回率本就不高:唯一的直接实测里,即便显式提示该用某 skill,调用率也只有 ~70%;ECC 自述的 `~50–80%` 落在同一量级。更要紧的是这条曲线随 skill 总数 N 单调下行——N 越大,召回越差,原因是结构性的:", "body": "# skill 的召回率本就不高,且随 skill 数量增长而进一步恶化\n\n**主张**:一个 skill「存在」远不等于它「被读、被用」。把使用拆成三段(① desc 注入 100% → ② 召回/触发 概率性 → ③ 执行 概率性,见 [skill 的召回率与执行率](../synthesis/skill-recall-execution.md))后,真正决定「被用」的 **② 召回率本就不高**:唯一的直接实测里,即便**显式提示**该用某 skill,调用率也只有 **~70%**;ECC 自述的 `~50–80%` 落在同一量级。更要紧的是**这条曲线随 skill 总数 N 单调下行**——N 越大,召回越差,原因是结构性的:\n\n1. **同质/冗余描述相撞,路由无从分辨。** 大样本实证里 40,285 个 skill 存在 intent 级的冗余同质([Agent-Skills-data](../sources/papers/agent-skills-data.md));描述彼此难分,模型在「该调哪个」上就崩。\n2. **描述缺失直接判死。** 55,315 个 skill 中 **26.4% 根本没有 routing 描述**([SkillReducer](../sources/papers/skillreducer.md))——这部分结构性不可召回,N 里掺得越多,可召回比例越低。\n3. **选择本身是已被证伪的难点。** 8 个模型在 tool selection 上「难以正确选」([MetaTool](../sources/papers/metatool.md));候选集越大,选错概率越高。\n\n所以「skill 多多益善」是错觉:**加一个边际 skill,既摊薄注入预算、又往候选池里多塞一个会被混淆的对象,把存量 skill 的召回也一起拖低**。召回不是随 N 持平,而是随 N 退化。\n\n**对 autoharness 的意义。** autoharness的价值不在「攒得多」,而在**压低 N 的同时治理 N**:① 描述卫生设为准入前置闸(无描述/同质描述不予收),② 结构化去重与消歧是召回刚需而非可选优化。「少而精」对召回是正收益,「多而全」是负收益——这给 [滚动 curate](adherence-driven-curate.md) 的「定生死」提供了方向:删冗余 skill 不只是省空间,是直接抬升存量召回。\n\n## 论据 / 出处\n\n蒸馏自方向卡 [skill 的召回率与执行率](../synthesis/skill-recall-execution.md) 的对齐结论:② 的量级锚点来自实践 eval(显式提示下 ~70%,[来源](https://thenuancedperspective.substack.com/p/agent-skills-work-but-the-research))与 [ECC](../sources/github/affaan-m-ecc.md) 自述(~50–80%,无测量);随 N 退化的三条成因分别坐实于 [Agent-Skills-data](../sources/papers/agent-skills-data.md)(同质冗余)、[SkillReducer](../sources/papers/skillreducer.md)(26.4% 无描述)、[MetaTool](../sources/papers/metatool.md)(selection 难)。直接量「Claude Code skill 触发召回率」的同行评审工作≈没有——量级须由 `experiments/` 自测复现后才敢正式引证。\n\n## 待解 / 边界\n\n- **数字暂不可引。** ~70% / ~50–80% 是单点实测与自述,作量级锚点;退化曲线的斜率(N 每增一个,召回掉多少)更是无人量过。须 `experiments/` 自测 description 触发率随 N 变化,才能从「传说」变证据。\n- **「越多越差」是趋势而非绝对**:良好治理(描述彼此正交、零冗余)能拉平曲线;命题精确表述应是「未经治理时,召回随 N 退化」,治理正是 autoharness 要做的事。\n\n## 关联\n\n蒸馏自 [skill 的召回率与执行率](../synthesis/skill-recall-execution.md);为结构化去重/消歧(=召回杠杆)与 [滚动 curate](adherence-driven-curate.md)(删冗余=抬召回)提供动机轴;与 [hook 强制注入](hook-forced-injection.md)(对 must-always 规则绕开 ② 的另一条路)互补。将装配进 [design/](../design/index.md) 的 Admission/Curate 段。"}, {"id": "ideas/trace-based-pattern-extraction.md", "layer": "ideas", "subtype": "", "title": "候选来料：从对话回合捕获，而非只从 tool 执行反推", "status": "候选", "summary": "主张：候选符号不依赖标注 benchmark，直接从 agent 的运行痕迹里长出来——hook 抓取，攒到一定量后让便宜模型扫近窗，把重复出现的模式（用户纠正、错误→修复、固定工作流、工具偏好）蒸馏成候选；信号天然带「这事真发生过且重复」，省人工打标。但抓取口要取对话回合（用户输入 + agent 输出），而非只盯 tool 执行 I/O：意图、纠正、决策本就在用户原话与 agent 回应里明文存在；tool trace 只是意图的下游投影，从重编辑 / 回退反推「用户纠正了什么」有损且不可复现。读上游保真更高。", "body": "# 候选来料：从对话回合捕获，而非只从 tool 执行反推\n\n> 借 [ECC](../sources/github/affaan-m-ecc.md) 抓取前端 + user 对抓取口的修正。合并原「直接读 prompt」一卡。status 候选，待复核。\n\n**主张**：候选符号**不依赖标注 benchmark**，直接从 agent 的运行痕迹里长出来——hook 抓取，攒到一定量后让便宜模型扫近窗，把**重复出现的模式**（用户纠正、错误→修复、固定工作流、工具偏好）蒸馏成候选；信号天然带「这事真发生过且重复」，省人工打标。但**抓取口要取对话回合（用户输入 + agent 输出），而非只盯 tool 执行 I/O**：意图、纠正、决策本就在用户原话与 agent 回应里**明文存在**；tool trace 只是意图的下游投影，从重编辑 / 回退反推「用户纠正了什么」有损且不可复现。读上游保真更高。\n\n## 论据 / 出处\n\n[ECC](../sources/github/affaan-m-ecc.md) 代码级审计证实其「学习」前端：`Pre/PostToolUse` hook 抓 tool I/O → 单次 Haiku 扫近窗 → 写出 3+ 次复现的模式。便宜、无标注、走套餐即可跑通——**抓取 + 一次性生成**这个前端值得借。\n\n**但只借前端，并修一处硬伤**：ECC 只看 tool trace、**读不到用户原话**（纠正全靠从重编辑 / 回退反推），窗口截断成盲区，「模式 / 重复」全交模型 gestalt、无算法、不可复现。把抓取口从「tool 执行」上移到「对话回合」即消除反推这层。**代价**：用户原话含 PII / 密钥的概率远高于 tool I/O（ECC 已对 tool 输出 secret-scrub），故这条路**对入口脱敏要求更硬**——读 prompt 必先过红线过滤（CLAUDE.md 安全条款）。tool trace 仍保留「实际发生了什么」的执行地真，二者**互补**（prompt 给意图、trace 给落地），非单取其一。\n\n所以痕迹只能当**候选来料**，不能当准入裁决。\n\n## 关联\n\n是准入裁决的上游来源（捕获供料 → 把关）；提取出的「固定工作流」即潜在**顺序边**。捕获的对话回合交 [episode 边界反思](episode-boundary-reflection.md) 整段蒸馏；更高保真的「被遵守 / 被矛盾」对照也回馈 [滚动 curate](adherence-driven-curate.md)。装配进 [design/](../design/index.md) 的 CAP。"}, {"id": "sources/blogs/claude-code-skills.md", "layer": "sources", "subtype": "blogs", "title": "[博客] Lessons from Building Claude Code: How We Use Skills", "status": "", "summary": "Thariq Shihipar (Anthropic) — claude.com blog · 2026-06.", "body": "# [博客] Lessons from Building Claude Code: How We Use Skills\n\n**Thariq Shihipar (Anthropic)** — [claude.com blog](https://claude.com/blog/lessons-from-building-claude-code-how-we-use-skills) · 2026-06.\n\nPractitioner counterpart to the academic cluster. Skills are **folders** (instructions + scripts + assets + data), not \"just markdown\"; the best serve a single clear purpose — broad ones \"straddle several and confuse the agent.\"\n\nNine internal skill categories: library/API reference, **product verification** (most measurable quality impact), data fetching/analysis, business-process automation, scaffolding/templates, code quality/review, CI/CD, runbooks, infra operations.\n\nDesign lessons that transfer to harness/skill authoring:\n- Don't state the obvious — target what pushes the model off its default behavior.\n- The **Gotchas section is the highest-signal content** in any skill.\n- File system + progressive disclosure: SKILL.md points to other files read on demand.\n- The description is a **trigger spec for the model**, not a human summary.\n- Most strong skills \"began as a few lines and a single gotcha,\" then grew from real edge cases.\n\n**Relevance to autoharness:** ground truth on what a maintained skill/harness document looks like in production, and on iterative, failure-driven refinement — the loop autoharness automates. Pairs with [anthropics/skills](../github/anthropics-skills.md)."}, {"id": "sources/blogs/henrypan-1k-harness-experiments.md", "layer": "sources", "subtype": "blogs", "title": "[博客] What 1k Harness Experiments Taught Me About Self-Improving Agents", "status": "", "summary": "Henry Pan — henrypan.com · 2026-05-25.", "body": "# [博客] What 1k Harness Experiments Taught Me About Self-Improving Agents\n\n**Henry Pan** — [henrypan.com](https://www.henrypan.com/blog/2026-05-25-self-improvement-harness/) · 2026-05-25.\n\nThe closest empirical write-up on the bootstrap theme — lessons from ~1,000 harness experiments on self-improving agents (not a repo; a practitioner log).\n\n**Relevance to autoharness:** a rare large-N empirical reference on what actually moves the needle in harness self-improvement — worth mining for failure modes before re-deriving them. Surfaced via last30days alongside [Recursi](../github/recursi.md) and [sia](../github/hexo-ai-sia.md)."}, {"id": "sources/blogs/karpathy-llm-wiki.md", "layer": "sources", "subtype": "blogs", "title": "[博客] llm-wiki — Andrej Karpathy", "status": "", "summary": "gist.github.com/karpathy/442a6bf555914893e9891c11519de94f · 2026-04-03. An \"idea file\" (5k+★/forks on one md), not a product — meant to be pasted into Claude Code / Codex / OpenCode so the agent co-builds the specifics.", "body": "# [博客] llm-wiki — Andrej Karpathy\n\n[gist.github.com/karpathy/442a6bf555914893e9891c11519de94f](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f) · 2026-04-03. An \"idea file\" (5k+★/forks on one md), not a product — meant to be pasted into Claude Code / Codex / OpenCode so the agent co-builds the specifics.\n\n**The thesis (compiler analogy):** raw sources = source code, the wiki = the compiled binary. *\"Obsidian is the IDE. The LLM is the programmer. The wiki is the codebase.\"* Compile knowledge once into structured interlinked markdown and read the compiled output; don't RAG-rederive per query. Explicitly *\"avoids the need for embedding-based RAG infrastructure\"* at moderate scale.\n\n**Three layers:** `raw/` (immutable sources — re-compilable ground truth) · the **wiki/** (LLM-owned markdown: entity / concept / summary / comparison pages + `index.md` + append-only `log.md`) · the **schema** (`CLAUDE.md`/`AGENTS.md` — turns a generic agent into a disciplined maintainer). **Three operations:** ingest · query · lint.\n\n**Structure = GRAPH, not tree.** Pages are many-to-many `[[wikilinks]]` (Memex / associative trails; Obsidian graph view shows hubs vs orphans). Pages sit in category dirs, but the model is associative, not a folder hierarchy.\n\n**Ingest = synthesize, not append.** A new source: read → discuss takeaways → write a summary page → **update index** → **update relevant entity & concept pages across the wiki** → append to `log.md`. One source *\"might touch 10–15 wiki pages\"*; it revises summaries, flags contradictions, strengthens cross-links.\n\n**Index & growth — the unsolved part.** `index.md` is *\"a catalog of everything in the wiki — each page listed with a link, a one-line summary,\"* organized by category (entities/concepts/sources), updated every ingest. **Every page is eligible — there is no top-layer-only rule.** Karpathy does **not** address index-explosion: no dedup/merge rule, no page-count cap, no append-vs-new-page rule. His only growth answers: (a) category organization, (b)
