`lint` (catch orphans, contradictions, stale claims, gaps), (c) **at larger scale, offload to external search (qmd: on-device BM25/vector + LLM re-rank)** rather than manage the index. Stated sweet spot: *\"~100 sources, ~hundreds of pages.\"*\n\n**Relevance to autoharness.** The source thesis behind the file-based memory wave (OpenHuman, Hermes session-search): *maintain a structured, human-inspectable text store; compile once, don't re-derive* — our spine's structural-first / no-oracle / human-adoption stance, stated upstream. Two sharp contrasts that define our wedge:\n- **Graph vs typed DAG:** Karpathy's links are untyped associative `[[ ]]`; ours are **typed** (dependency / conflict / duplicate), which is what lets retrieval return a dependency-complete bounded set and lets the manager reason about conflict/dup structurally.\n- **Index-explosion is exactly the gap we fill.** Karpathy has no admission gate and punts growth to lint + external search. Our **gated admission** (dedup check + conflict check + recurrence gate; addition is last-resort) and **maintain-not-grow** are the structural answer he lacks — direct positioning for [synthesis/](../../synthesis/index.md). Note also: [OpenHuman](../github/tinyhumansai-openhuman.md) re-shaped the *graph* into a hierarchical *summary tree* — the ecosystem is already diverging on structure."}, {"id": "sources/blogs/learning-beyond-gradients.md", "layer": "sources", "subtype": "blogs", "title": "[博客] Learning Beyond Gradients (Heuristic Learning)", "status": "", "summary": "Jiayi Weng — referenced via the symbolic-learning essay; no stable URL captured.", "body": "# [博客] Learning Beyond Gradients (Heuristic Learning)\n\n**Jiayi Weng** — referenced via the [symbolic-learning essay](symbolic-learning-renaissance.md); no stable URL captured.\n\nArgues for moving the RL loop **from weight-space to software-space** — learning code / policy / state-detectors / tests / memory instead of weights (\"Heuristic Learning\").\n\n**Relevance to autoharness:** the clearest statement of the mechanism autoharness implements — optimize the software artifacts around a frozen model, not the model. One of the three works the symbolic-learning thesis is built on."}, {"id": "sources/blogs/symbolic-learning-renaissance.md", "layer": "sources", "subtype": "blogs", "title": "[博客] 符号学习在 Agent 时代的文艺复兴？ (The Symbolic-Learning Renaissance in the Agent Era)", "status": "", "summary": "Eddy (Zhihu) — zhuanlan.zhihu.com/p/2044779283978139242 · login-walled (content supplied by user). The framing essay that ties this whole corpus together.", "body": "# [博客] 符号学习在 Agent 时代的文艺复兴？ (The Symbolic-Learning Renaissance in the Agent Era)\n\n**Eddy (Zhihu)** — [zhuanlan.zhihu.com/p/2044779283978139242](https://zhuanlan.zhihu.com/p/2044779283978139242) · login-walled (content supplied by user). The framing essay that ties this whole corpus together.\n\n**Thesis:** [AutoHarness](../papers/autoharness-lou.md) + [SkillOpt](../papers/skillopt.md) + Heuristic Learning (+ community skills/memory work) all point at a return of *symbolic learning* — not old expert systems, but **symbols as trainable external state**.\n\nCompression lens (the load-bearing idea):\n- A symbol = a discrete, reusable, composable, **grounded** handle that compresses action-relevant invariants. Good compression = intelligence (MDL / Kolmogorov / Solomonoff lineage).\n- A trajectory summarized into a skill / a piece of code / a test **is** symbolic learning.\n- Deep learning: `experience → gradient → weights`. This line: `experience → reflection/search/edit → symbolic artifact`.\n\nWhy old symbolic AI failed: not because symbols were wrong, but **maintenance cost** (grounding, open world, rule-base tech debt). The bet now: **coding agents change the maintenance-cost curve** of symbolic systems.\n\nThree representative works it names: **Heuristic Learning** ([Jiayi Weng blog](learning-beyond-gradients.md)), **AutoHarness** (symbol layer as action boundary), **SkillOpt** (\"gradient descent in symbol space\": rollout = forward, reflection = backward, held-out gate = validation).\n\n**Relevance to autoharness:** the thesis statement for the project. **Caveat it raises (the autoharness wedge):** the symbol layer is not free — skills bloat, harnesses overfit, memory pollutes decisions, agents game the verifier. The scarce capability is **auto abstract / dedup / compress / refactor / verify / delete** — maintaining the symbol ecosystem, not just growing it (the maintain-not-grow invariant)."}, {"id": "sources/github/affaan-m-ecc.md", "layer": "sources", "subtype": "github", "title": "[GitHub] affaan-m/ECC", "status": "", "summary": "github.com/affaan-m/ECC (~212k★) · curated skill pack with an opt-in learning loop.", "body": "# [GitHub] affaan-m/ECC\n\n[github.com/affaan-m/ECC](https://github.com/affaan-m/ECC) (~212k★) · curated skill pack **with** an opt-in learning loop.\n\nThe key counter-example to \"optimizers can't be popular.\" Mostly a curated pack, but ships a real loop: **Instincts (Continuous Learning v2)** — hooks auto-extract patterns into confidence-scored \"instincts\"; `/evolve` clusters them into skills (work → extract → score → promote). Plus `/skill-create` from git history, SessionStart/End memory hooks. (v1 used a Stop-hook to observe; v2 moved observation to PreToolUse/PostToolUse for 100% capture.)\n\n## Skill / experience accumulation flow (verified 2026-06-23)\n\nThe full loop, two-tier (cheap always-on **instincts** → promoted **skills**), with a clean split between the **use/forward** path and the **improve/reverse** path:\n\n1. **Observe (capture).** `observe.sh` on **PreToolUse / PostToolUse** hooks + a background **Haiku observer** analysing in parallel. Hook-driven = **100% deterministic capture** (the stated reason for moving off v1's skill/Stop-hook observation, which \"fires ~50–80% of the time\"). Project detected via `~/.claude/homunculus/projects.json`.\n2. **Distil → stage (optimistic write, no gate).** Patterns become **atomic instincts** written to a **staging store outside `.claude/`**: `CLV2_HOMUNCULUS_DIR` (default `~/.local/share/ecc-homunculus`); per-project at `~/.claude/homunculus/projects/\u003cid>/instincts/personal/`. Each instinct: **Action + Evidence** (no Examples); **confidence** = Haiku-stamped per-window frequency band (0.5/0.7/0.85), **write-once**; **domain tag** (code-style/testing/git/debugging/workflow/file-patterns); **scope** project|global.\n3. **Curate — *documented, not implemented*.** Code audit (2026-06-24): **no rolling curate exists.** confidence is **write-once**; the decay-if-contradicted spec lives only in the orphan `agents/observer.md` (zero code references) — see autopsy. Only real post-generation move is **manual, deterministic scope-promotion**. No structural conflict scan, and no working scalar curate either.\n4. **Use / inject (forward path).** **SessionStart only** (`session-start.js`; **UserPromptSubmit is NOT registered**), **char-capped** (`ECC_SESSION_START_MAX_CHARS` default 8000; `…_CONTEXT=off` disables). Pure JS, no model: filter **confidence ≥ 0.7** → sort conf-desc, project>global, **id-alphabetical** → **top 6**. No per-prompt relevance retrieval; the \"adherence evidence\" step 3 supposedly consumes is **never measured**. (Resolves the prior open question: top-6-by-confidence with a 0.7 floor, then 8000-char cap.)\n5. **Evolve → promote (gated entry to the live skill layer).** `/evolve` clusters high-confidence instincts into **skills/commands** at `$ECC_AGENT_DATA_HOME/skills/learned/` (default root `~/.claude`). `/skill-create` also mints skills from git history. `/instinct-import` · `/instinct-export` move instincts in/out.\n6. **Skill-layer maintenance (periodic, manual — the \"A\" route).** `/skill-stocktake` audits skills (overlap / staleness / usage → **Keep/Improve/Update/Retire/Merge**, destructive needs confirm; Quick re-checks only changed via `results.json`+mtime). `rules-distill` lifts cross-skill principles (in 2+ skills) into **rules**, human-approved. Philosophy: **\"deterministic collection + LLM judgment\"** and **\"What, not How\"**.\n7. **Skill use.** Promoted skills then ride **native description-relevance triggering (~50–80%)** — which is *why* must-always-apply behaviour is deliberately kept as **hook-injected instincts (100%)**, not skills.\n\n**Two reliability tiers (the load-bearing design choice):** instinct→hook = **100%** deterministic; skill→description = **50–80%** model-judged. ECC routes high-reliability rules to hooks and reserves the skill path for \"occasionally relevant.\"\n\n```\nPreTool/PostTool hooks ─► instincts (staging: ~/.local/share/ecc-homunculus, conf+domain+scope)\n   observe                    │  (NO decay/curate in code — write-once) · manual project→global\n                              ├─► USE: SessionStart-only inject (conf≥0.7, top-6, ≤8000 chars; pure JS)\n                              └─► /evolve ─► skills/learned/ ─► description-trigger (~50–80%)\n                                            skill-stocktake · rules-distill (periodic, human-approved)\n```\n\n## Code-level autopsy (verified 2026-06-24 — full source read of ECC@main)\n\nRead the actual scripts, not docs (`observe.sh`, `agents/observer-loop.sh`, `scripts/hooks/session-start.js`, `continuous-learning-v2/scripts/instinct-cli.py`, `agents/observer.md`, `hooks/hooks.json`). **The running system is far thinner than the docs claim.** Whole loop = **capture → one Haiku `--print` call → inject**; everything past generation (rank / curate / evict) is absent, unscientific, or manual.\n\n- **Capture** (`observe.sh`, Pre+PostToolUse `*`): each tool call → 2 JSONL records (tool_start/tool_complete) — tool + input + output (truncated 5000, **secret-scrubbed**), session, project. **Not the user prompt** → \"user correction\" patterns are *inferred from the tool trace* (re-edits/reverts), never read.\n- **Observer** = `observer-loop.sh`, a **`nohup` shell daemon**, **off by default** (`observer.enabled=false`), lazy-started + lock-guarded by observe.sh, one per project, **idle-exits 30 min**. On SIGUSR1 (every 20 obs) / 60s cooldown / ANALYZING guard → `tail -n 500` of observations.jsonl → **one** call: `… claude --model haiku --print --allowedTools \"Read,Write\" -p \"\u003cinline prompt>\"`. **走套餐 confirmed**: Haiku via the `claude` CLI reuses Claude Code auth (subscription if logged in), not a separate API key.\n- **Generation = one inline prompt, no algorithm.** The whole \"learning\" is that prompt: find 3+-occurrence patterns (user-corrections / error-resolutions / repeated-workflows / tool-preferences), Write `\u003cid>.md`, `confidence by frequency 3-5=0.5/6-10=0.7/11+=0.85`, \"if similar exists update\", \"global if universal\", \"never include code snippets\". **No code defines pattern / same / duplicate / conflict** — all Haiku gestalt over the 500-line tail; **non-deterministic, non-reproducible**. \"Frequency\" is **per-window** (observations archived after each run; **>500 between runs = unanalyzed blind spot**).\n- **Injection** (`session-start.js`): **pure JS, no model, SessionStart only** (UserPromptSubmit not registered). filter **conf ≥ 0.7** → sort conf-desc, project>global, **id-alphabetical** → **top 6** → `Active instincts:\\n- [scope conf%] \u003cAction line>` as additionalContext, bundle capped 8000. Coarse 2-bucket sort (0.5 is below the floor; injected = only 0.7/0.85) + alphabetical tie-break ⇒ \"confidence ranking\" carries **no merit signal**.\n- **No post-creation evolution.** Exhaustive grep (all .js/.py/.sh): **zero code reads-then-rewrites a confidence value.** confidence is **write-once** (and even mis-stamped — the shipped example is 0.7 for \"5 instances\", which the prompt's own rule calls 0.5). decay/boost (`+0.05`/confirm, `-0.1`/contradict, `-0.02`/week staleness) lives ONLY in `agents/observer.md`, which **nothing loads** (grep: 0 refs) and which **disagrees** with the runtime prompt. Only non-generation moves: deterministic manual scope-promotion (`promote`, 2+ projects & avg≥0.8) and Haiku overwrite-on-regenerate.\n- **No eviction of active instincts.** Three 30-day TTLs exist, **none touch active instincts**: `prune` → `instincts/pending/` only (auto-gen lands in `personal/`); observe.sh purges `observations-*.jsonl`; session-start.js purges `*-session.tmp`. No decay → no death-by-threshold; the 0.7 inject floor only **dormants** low-conf instincts (kept on disk forever). orphan observer.md specs a `-0.02/week` staleness decay — **designed, not implemented**. **Net: active instincts only grow — never expire, never retire.** (`skill-evolution/health.js` computes success-rate-7d/30d + failure_trend, but it's **read-only reporting** for human skill-stocktake — skill layer, not instincts; mutates nothing.)\n\n**Corrections to this card's 2026-06-23 doc-based claims** (ECC's own docs oversell the loop): anatomy is **Action+Evidence** (no Examples); inject is **SessionStart only** (not +UserPromptSubmit); \"rolling curate / decay\" is **not implemented** (orphan-spec); confidence is a per-window prompt instruction, not a computed lifetime score; \"adherence evidence\" is **never measured**.\n\n**What autoharness can actually borrow (narrowed by this audit):** only **hook capture of tool I/O · one-shot Haiku generation · hook injection**. ECC entirely lacks — so autoharness must build — (1) scientific ranking/priority from real usage signal, (2) relevance-aware retrieval (vs SessionStart top-6), (3) real eviction (structural dedup/conflict/subsume **+ staleness retire**), (4) a true **non-regressing rolling curate**. This is the wedge, now code-confirmed.\n\n**Mapping to autoharness:** the **reverse/improve** half (distil · curate · evolve · stocktake · rules-distill) is our territory (Intake + Manage); the **forward/use** half (inject/trigger) is host-native — we shape artifacts, the host applies. Borrow: \"deterministic collection + LLM judgment\", incremental re-scan (changed-only), the Keep/Improve/Update/Retire/Merge verdict set, staging-outside-`.claude` + gated promotion, and the **vehicle-by-reliability** rule (skill vs hook vs always-loaded). Don't inherit: ECC has **no structural dedup/conflict gate** (overlap only, periodic, manual) — that gated, conflict-aware admission is our wedge.\n\n**Relevance to autoharness:** the category wins when packaged as \"install-and-it-works content pack + an optional learning loop hidden inside,\" not as a research framework. ECC owns the **distribution** corner; [SkillOpt-Sleep](microsoft-skillopt-sleep.md) owns engineering, [RHO](../papers/rho.md) owns validation method — nobody has all three."}, {"id": "sources/github/aiming-lab-autoharness.md", "layer": "sources", "subtype": "github", "title": "[GitHub] aiming-lab/AutoHarness", "status": "", "summary": "github.com/aiming-lab/AutoHarness (~311★) · name collision #1 — NOT the Lou et al. paper.", "body": "# [GitHub] aiming-lab/AutoHarness\n\n[github.com/aiming-lab/AutoHarness](https://github.com/aiming-lab/AutoHarness) (~311★) · **name collision #1** — NOT the [Lou et al. paper](../papers/autoharness-lou.md).\n\nAn agent **governance** framework (Parse → Risk Classify → Permission → Sanitize → Audit). Carries a dubious disclaimer about Claude Code source leaked via npm 2026-03-31 — **treat cautiously**.\n\n**Relevance to autoharness:** the first of three ~300★ repos named \"AutoHarness\", all different things. This project's name collides head-on; the wedge must distinguish from governance frameworks in one sentence. See [synthesis/](../../synthesis/index.md) and the other collisions ([parikhakshat](parikhakshat-autoharness.md), [kayba](kayba-ai-autoharness.md))."}, {"id": "sources/github/all-hands-openhands.md", "layer": "sources", "subtype": "github", "title": "[GitHub] All-Hands-AI/OpenHands", "status": "", "summary": "github.com/All-Hands-AI/OpenHands · open-source coding agent.", "body": "# [GitHub] All-Hands-AI/OpenHands\n\n[github.com/All-Hands-AI/OpenHands](https://github.com/All-Hands-AI/OpenHands) · open-source coding agent.\n\nThe thinnest of the memory-equipped agents: automatic context compression, a skills directory, and `AGENTS.md` repo memory. **No documented auto-update or experience-learning loop.**\n\n**Recall is pure-file / keyword — no vector retrieval.** Microagents/skills (`.openhands/microagents/` → v1 `skills/`) are selected by **literal keyword substring match** (`match_trigger`: `keyword.lower() in message`); trigger-less repo skills are always-injected, triggered ones disclosed by name then injected on match (+ an LLM-invoked `invoke_skill` path). History is handled by **condensers** (recency-drop / LLM-summarization) — never embeddings. A `chromadb`+`llama_index` `LongTermMemory` existed in v0 but was **dead, opt-in code with zero call-sites**, and is **entirely removed in the v1 SDK** (0 hits for embed/vector/chroma/faiss). *evidence:* `software-agent-sdk` `skills/trigger.py`, `skills/skill.py`, `context/condenser/`.\n\n**Relevance to autoharness:** the baseline — a widely-used agent that has the *substrate* (skills dir, repo memory) but no learning loop on top. Exactly the gap autoharness fills."}, {"id": "sources/github/anthropics-skills.md", "layer": "sources", "subtype": "github", "title": "[GitHub] anthropics/skills", "status": "", "summary": "github.com/anthropics/skills (~149k★) · the official Agent Skills repo.", "body": "# [GitHub] anthropics/skills\n\n[github.com/anthropics/skills](https://github.com/anthropics/skills) (~149k★) · the official Agent Skills repo.\n\nAnthropic's first-party Agent Skills collection.\n\n**Relevance to autoharness:** the canonical reference for skill structure/format autoharness reads and writes; the official-marketplace shelf that drives distribution (see [synthesis/](../../synthesis/index.md)). Pairs with the [Claude Code skills blog](../blogs/claude-code-skills.md) on what a maintained skill looks like."}, {"id": "sources/github/hesreallyhim-awesome-claude-code.md", "layer": "sources", "subtype": "github", "title": "[GitHub] hesreallyhim/awesome-claude-code", "status": "", "summary": "github.com/hesreallyhim/awesome-claude-code (~46k★) · curated \"awesome\" list.", "body": "# [GitHub] hesreallyhim/awesome-claude-code\n\n[github.com/hesreallyhim/awesome-claude-code](https://github.com/hesreallyhim/awesome-claude-code) (~46k★) · curated \"awesome\" list.\n\nA curated index of Claude Code resources, skills, and tooling.\n\n**Relevance to autoharness:** a discovery surface for the surrounding ecosystem — useful for tracking what artifacts users already have that autoharness could read/write."}, {"id": "sources/github/hexo-ai-sia.md", "layer": "sources", "subtype": "github", "title": "[GitHub] hexo-ai/sia", "status": "", "summary": "github.com/hexo-ai/sia · SIA: open-source self-improving AI · trending intersection project (last30days, 2026-06-10).", "body": "# [GitHub] hexo-ai/sia\n\n[github.com/hexo-ai/sia](https://github.com/hexo-ai/sia) · SIA: open-source self-improving AI · trending intersection project (last30days, 2026-06-10).\n\nAn open-source self-improving AI agent.\n\n**Relevance to autoharness:** a same-space project to track — \"self-improving agent\" is a crowded, fast-moving term; useful for watching how the bootstrap theme is being packaged."}, {"id": "sources/github/kayba-ai-autoharness.md", "layer": "sources", "subtype": "github", "title": "[GitHub] kayba-ai/autoharness", "status": "", "summary": "github.com/kayba-ai/autoharness (~290★) · name collision #3 — the closest competitor.", "body": "# [GitHub] kayba-ai/autoharness\n\n[github.com/kayba-ai/autoharness](https://github.com/kayba-ai/autoharness) (~290★) · **name collision #3** — the closest competitor.\n\nAn autonomous harness optimizer **product** that **requires a benchmark command** (Kayba sells managed optimization).\n\n**Relevance to autoharness:** the most important collision — same name, adjacent goal, but benchmark-*required*. autoharness's differentiator is the corner kayba doesn't cover: **benchmark-free, production-trajectory-bootstrapped** harness evolution (only the 14★ [retro-harness](../papers/rho.md) currently occupies it). See [synthesis/](../../synthesis/index.md)."}, {"id": "sources/github/mattpocock-skills.md", "layer": "sources", "subtype": "github", "title": "[GitHub] mattpocock/skills", "status": "", "summary": "github.com/mattpocock/skills (~124k★) · curated skill content pack.", "body": "# [GitHub] mattpocock/skills\n\n[github.com/mattpocock/skills](https://github.com/mattpocock/skills) (~124k★) · curated skill content pack.\n\nA widely-adopted community skill collection.\n\n**Relevance to autoharness:** another heat data point for the content-pack category (see the star-gap analysis in [synthesis/](../../synthesis/index.md))."}, {"id": "sources/github/microsoft-skillopt-sleep.md", "layer": "sources", "subtype": "github", "title": "[GitHub] microsoft/SkillOpt — SkillOpt-Sleep", "status": "", "summary": "github.com/microsoft/SkillOpt (~5,640★) · `skillopt_sleep/` package, released 2026-06-08, decoupled from the paper code · ships as Claude Code / Codex / Copilot `/sleep` plugins. Implementation of the SkillOpt paper.", "body": "# [GitHub] microsoft/SkillOpt — SkillOpt-Sleep\n\n[github.com/microsoft/SkillOpt](https://github.com/microsoft/SkillOpt) (~5,640★) · `skillopt_sleep/` package, released 2026-06-08, decoupled from the paper code · ships as Claude Code / Codex / Copilot `/sleep` plugins. Implementation of the [SkillOpt paper](../papers/skillopt.md).\n\n**The bootstrap-validation implementation** — the engineering skeleton closest to autoharness:\n- Pipeline: harvest own session transcripts → mine TaskRecords (heuristic miner reads user neg/pos feedback + retry chains as labels; optional LLM miner) → **train/val/test split** of mined tasks → replay offline → consolidate with a vendored strict-improvement gate → stage for user adoption. Code is explicit: \"train drives reflect; val gates updates; test held out entirely; never silently use test as val.\"\n- **Replay (ClaudeCliBackend):** each task replay is ONE headless `claude -p` subprocess in a fresh `mkdtemp` cwd — no hooks/LSP/plugins, all skills disabled, no tools, dynamic sections stripped. **The candidate skill/memory under test is injected as PROMPT TEXT (`## Skill` / `## Memory`), not as a real installed skill** — so it measures \"this text in a prompt\", not \"this rule as a retrieved/hook-triggered skill\".\n- Scoring with no human labels: rule judges (regex/section_present/contains/max_chars/tool_called) → all-pass = 1.0, fraction = soft; rubric judge for reference-free tasks. Responses cached on `skill_hash(prompt)` so held-out re-scoring is free.\n\n**Relevance to autoharness:** the reference engineering skeleton — but note the **tension**: clean-sandbox text-injection testing vs. autoharness's target of symbols that take effect *in place* in the live harness (rules actually loaded, hooks actually firing), closer to [MOSS](../papers/moss.md)'s real-failure replay. Landed 4 days after [RHO](../papers/rho.md) with no citation link — convergence, not lineage."}, {"id": "sources/github/nousresearch-hermes-agent.md", "layer": "sources", "subtype": "github", "title": "[GitHub] NousResearch/Hermes-Agent", "status": "", "summary": "github.com/NousResearch/Hermes-Agent · open-source agent with memory + self-learning.", "body": "# [GitHub] NousResearch/Hermes-Agent\n\n[github.com/NousResearch/Hermes-Agent](https://github.com/NousResearch/Hermes-Agent) · open-source agent with memory + self-learning.\n\nAutonomous **skill creation after complex tasks**; skills self-improve in use; periodic memory nudges (interval 10); FTS5 session search + LLM summarization; a `memory` tool (add/replace/remove) with capacity-driven consolidation; [Honcho](plastic-labs-honcho.md) user modeling. Also feeds back to the model level: batch trajectory generation + trajectory compression to train next-gen tool-calling models.\n\n**Recall is pure-file / keyword — no vector retrieval (by default).** Skills under `~/.hermes/skills/\u003ccat>/\u003cname>/SKILL.md` are selected by **3-level progressive disclosure**: Level-0 descriptor index (name+description) in the prompt → `skill_view(name)` loads the body on demand → `skill_view(name, path)` for a reference; the LLM picks by reading descriptors (no similarity step). Memory = two always-injected flat files (`MEMORY.md` ~2200 char, `USER.md` ~1375 char, frozen snapshot for prefix-cache); past-chat recall = **FTS5 keyword** search over a SQLite SessionDB (docs: *\"Keyword only, no vector/semantic\"*). Vector/embeddings exist only as **open proposals** (issues #346/#531/#844/#10355) and **optional external plugins** (Honcho/Mem0/Chroma-skill), never the default path.\n\n**Three production/maintenance paths — different trigger, different agent.** (1) *Autonomous creation* is gated by a **nudge counter**: `_iters_since_skill` accumulates one per tool-calling iteration (**across turns**) and, at turn finalization, once it ≥ `_skill_nudge_interval` (default **10**, config `skills.creation_nudge_interval`) AND `skill_manage` is available, it resets and calls `_spawn_background_review`. That **forks a daemon-thread AIAgent** *after the response is already delivered* (never competes for the live turn): same main model, **inherits the parent's cached system prompt → hits the same warm prefix cache**, whitelisted to memory+skill tools only, **replays the just-finished transcript**, and writes SKILL.md / memory straight to disk. The main conversation + its cache are never touched. Memory is symmetric (`_memory_nudge_interval` default 10). (2) *User-triggered* `/learn` (`build_learn_prompt`) is the **inline** path: the live agent authors the SKILL.md via `skill_manage` as a normal turn — no fork, no separate distillation engine. (3) *Consolidation* is a **separate forked aux-model curator** (`maybe_run_curator`): idle-triggered (≥ `min_idle_hours` 2h AND last run > `interval_hours` 7d), umbrella-building / pin / archive / patch; only touches `created_by: agent` skills, **never auto-deletes, only archives**; **LLM consolidation OFF by default** (`DEFAULT_CONSOLIDATE = False`), default is just the deterministic inactivity state machine active→stale(30d)→archived(90d). **State machine anchors on `last_used_at`** (`created_at` fallback if never used). **`stale` has zero behavioral effect — pure bookkeeping marker**: `set_state(STALE)` only writes a flag to the usage sidecar; the dir never moves, and repo-wide nothing in the recall / descriptor-index / loader path reads `state==stale` (only the curator's own next tick does), so a stale skill is recalled and usable exactly like active. **`archived` is the only state that changes recall, and it does so by physically `rename`-ing the dir into `.archive/`** (out of the skills tree → descriptor index can't see it), not by reading the flag; recoverable via `restore_skill`. Used again before 90d while stale → reactivate to active.\n\n**Relevance to autoharness:** the shipped reference for separating **production** from **consolidation** — and for keeping production cheap. The maintain-not-grow *production sample* is distilled by a **background fork that replays the just-finished trajectory while the parent's prefix cache is still warm** — i.e. at the cheapest possible moment to re-read the trace — and runs **off the user's critical path**; the user can also trigger it inline via `/learn`. Only **consolidation** pays for a separate aux-model agent, and even that conservatively archives (never deletes) and is opt-in. add/replace/remove + capacity-driven consolidation = maintain-not-grow in production."}, {"id": "sources/github/obra-superpowers.md", "layer": "sources", "subtype": "github", "title": "[GitHub] obra/superpowers", "status": "", "summary": "github.com/obra/superpowers (~223k★) · Jesse Vincent's \"skills framework + dev methodology\" · skill content pack.", "body": "# [GitHub] obra/superpowers\n\n[github.com/obra/superpowers](https://github.com/obra/superpowers) (~223k★) · Jesse Vincent's \"skills framework + dev methodology\" · skill **content pack**.\n\nAuto-triggering **mandatory workflows** (brainstorm → spec → plan → subagent-driven TDD → review → finish; deletes code written before tests). **No automatic learning loop** — all skills hand-curated, new ones generally not accepted: a static, human-maintained symbol layer.\n\n**Relevance to autoharness:** its 223k★ proves the demand for these artifacts; autoharness's job is to make them grow/improve from trajectories — exactly what superpowers refuses to do. This project's CLAUDE.md rules (docs→tests→code, every feature ships a test, verify-before-done) are nearly **isomorphic** to superpowers' methodology — worth reading its skill texts. On virality, see [synthesis/](../../synthesis/index.md)."}, {"id": "sources/github/openclaw.md", "layer": "sources", "subtype": "github", "title": "[GitHub] openclaw/openclaw", "status": "", "summary": "github.com/openclaw/openclaw · docs at docs.openclaw.ai · the most complete open-source memory mechanism.", "body": "# [GitHub] openclaw/openclaw\n\n[github.com/openclaw/openclaw](https://github.com/openclaw/openclaw) · docs at docs.openclaw.ai · the most complete open-source memory mechanism.\n\n- Memory is plain Markdown on disk (no hidden state): `MEMORY.md` (long-term, curated) + `memory/YYYY-MM-DD.md` (daily).\n- **Memory flush**: a silent turn before compaction reminds the agent to save important context. On by default.\n- **Dreaming**: background cron consolidation; promotes short-term signals to `MEMORY.md` only past a **score + recall-frequency + query-diversity** gate; summaries to `DREAMS.md`, rollback-able.\n- **Skills = install/run subsystem, not auto-distilled.** `src/skills/` discovers / source-installs / uploads / runs skills (agentskills.io-style); `extensions/migrate-hermes` + `migrate-claude` import skills from those ecosystems. There is **no trajectory→skill authoring** — unlike [Hermes](nousresearch-hermes-agent.md), OpenClaw self-learns only on the **memory** axis (flush + dreaming), never the skill axis.\n\n**Relevance to autoharness:** the canonical on-disk symbol layer (and the basis MOSS evaluates on, 0.25→0.61). **Caveat:** Dreaming is **memory management, not harness validation** — its gate is *recall utility* (will this be retrieved again), not *net task improvement* (repairs > regressions on a replay set). No replay, no improvement test. It rhymes with the symbolic-learning line in shape only; it sits **off** the [validation-signal spectrum](../../synthesis/offline-validation.md)."}, {"id": "sources/github/parikhakshat-autoharness.md", "layer": "sources", "subtype": "github", "title": "[GitHub] parikhakshat/autoharness", "status": "", "summary": "github.com/parikhakshat/autoharness (~292★) · name collision #2.", "body": "# [GitHub] parikhakshat/autoharness\n\n[github.com/parikhakshat/autoharness](https://github.com/parikhakshat/autoharness) (~292★) · **name collision #2**.\n\nA **fuzzing harness** generator — the \"other harness\" (fuzz drivers), unrelated to agent harnesses.\n\n**Relevance to autoharness:** distinguishes autoharness from fuzz-harness generation in the naming landscape. See the fuzzing-adjacent paper cluster (e.g. [QuartetFuzz](../papers/quartetfuzz.md)) and the other collisions ([aiming-lab](aiming-lab-autoharness.md), [kayba](kayba-ai-autoharness.md))."}, {"id": "sources/github/plastic-labs-honcho.md", "layer": "sources", "subtype": "github", "title": "[GitHub] plastic-labs/honcho", "status": "", "summary": "github.com/plastic-labs/honcho · dialectic user-modeling service (used by Hermes).", "body": "# [GitHub] plastic-labs/honcho\n\n[github.com/plastic-labs/honcho](https://github.com/plastic-labs/honcho) · dialectic user-modeling service (used by [Hermes](nousresearch-hermes-agent.md)).\n\nBuilds and serves a model of the user from interaction history.\n\n**Relevance to autoharness:** adjacent infrastructure — user modeling is a different externalized layer (per the [externalization survey](../papers/externalization-review.md)) than the harness, but relevant where harness behavior should adapt to a specific user."}, {"id": "sources/github/recursi.md", "layer": "sources", "subtype": "github", "title": "[项目] Recursi", "status": "", "summary": "recursi.dev · a self-improving LLM-connected coding environment (Show HN) · not a GitHub repo — a product/site.", "body": "# [项目] Recursi\n\n[recursi.dev](https://recursi.dev/) · a self-improving LLM-connected coding environment (Show HN) · **not a GitHub repo** — a product/site.\n\nA coding environment that improves itself as you use it.\n\n**Relevance to autoharness:** a product-side instance of the self-improving-harness idea — useful as a UX/packaging reference for what \"the harness improves itself\" looks like to an end user."}, {"id": "sources/github/sjhalani7-vaen.md", "layer": "sources", "subtype": "github", "title": "[GitHub] sjhalani7/vaen", "status": "", "summary": "github.com/sjhalani7/vaen · trending intersection project (last30days, 2026-06-10).", "body": "# [GitHub] sjhalani7/vaen\n\n[github.com/sjhalani7/vaen](https://github.com/sjhalani7/vaen) · trending intersection project (last30days, 2026-06-10).\n\nPackage / import **portable AI coding-agent harnesses**.\n\n**Relevance to autoharness:** addresses harness **portability** (package-and-import), a distribution concern adjacent to autoharness's optimize-in-place focus."}, {"id": "sources/github/tinyhumansai-openhuman.md", "layer": "sources", "subtype": "github", "title": "[GitHub] tinyhumansai/OpenHuman", "status": "", "summary": "github.com/tinyhumansai/openhuman · Rust+Tauri desktop personal-AI agent; GitHub-Trending May 2026. GPL-3.0, early beta. Blogs: mager.co explainer.", "body": "# [GitHub] tinyhumansai/OpenHuman\n\n[github.com/tinyhumansai/openhuman](https://github.com/tinyhumansai/openhuman) · Rust+Tauri desktop personal-AI agent; GitHub-Trending May 2026. GPL-3.0, early beta. Blogs: [mager.co explainer](https://www.mager.co/blog/2026-05-25-openhuman-explainer/).\n\nThe **Karpathy LLM-wiki pattern, productized**. Memory is a **Memory Tree**: every connected source (118+ OAuth integrations, auto-fetched every 20 min) is canonicalized → **≤3k-token Markdown chunks → scored → folded into hierarchical summary trees**, stored in local **SQLite** and dual-written as an editable **Obsidian `.md` vault**. Explicitly inspired by Karpathy's \"LLM Knowledgebase / obsidian-wiki\" (Apr-2026 gist): compile knowledge once into structured interlinked markdown and read the compiled output, instead of RAG re-deriving per query. `TokenJuice` compresses tool/scrape output (HTML→MD, dedup) before any LLM call (claims −80% tokens).\n\n**File vs vector — file-based by construction; query-time recall undocumented.** The build side (chunk→score→fold→SQLite+vault) is well-documented; the **retrieval algorithm at query time is NOT stated** in the README or explainer (tree-traversal vs keyword vs vector — unspecified), and the project makes **no explicit anti-embedding claim** (that framing is third-party review, not the project). The Karpathy pattern is non-RAG *in spirit* (navigate a maintained wiki/tree, not vector-retrieve), so the architecture implies hierarchical navigation, but the algorithm is unverified here — would need a source check (Rust core). Contrast peers: [Hermes](nousresearch-hermes-agent.md) self-learns from your activity; [OpenClaw](openclaw.md) is BYO-memory; OpenHuman pre-wires integrations and the tree \"builds itself.\" **Skills:** OpenHuman ships a `skill_registry` (`src/openhuman/skill_registry/`) that installs from the **HermesHub catalog** (`skills.json` — it consumes the Hermes ecosystem) plus a `create_skill` delegate sub-agent (`agent_registry/agents/skill_creator/`); but its central learning loop is **external-source → memory tree** (`SourceKind` = Chat/Email/Document from Gmail/Notion/Drive), **not** distillation of the agent's own task trajectory the way Hermes does.\n\n**Relevance to autoharness.** Strong thesis-alignment, different artifact. Karpathy's LLM-wiki = **\"maintain a structured, human-inspectable text store; compile once, don't re-derive\"** — the same anti-RAG, structural-text stance behind our spine (structural-first, no oracle) and our human-adoption/inspectability bias. Its **hierarchical summary tree** is a memory structure to contrast with our **typed skill DAG**: both are *navigable structured text*, not embeddings, but a tree encodes summarization depth while our DAG encodes typed relations (dependency/conflict/dup). Open question worth tracking: how a Karpathy-tree does query-time selection without vectors — directly informs our Retrieve layer's \"structure over similarity\" positioning (see [synthesis/](../../synthesis/index.md))."}, {"id": "sources/papers/agent-skill-eval-survey.md", "layer": "sources", "subtype": "papers", "title": "[论文] Agent Skill Evaluation and Evolution: Frameworks and Benchmarks", "status": "", "summary": "Ding, Zhou, Jin, Tong, Zhou, Metaxas — \"Agent Skill Evaluation and Evolution: Frameworks and Benchmarks\" (arXiv:2606.11435, 2026-06). Code/list: Cassie07/AgentSkill_Survey.", "body": "# [论文] Agent Skill Evaluation and Evolution: Frameworks and Benchmarks\n\n**Ding, Zhou, Jin, Tong, Zhou, Metaxas** — \"Agent Skill Evaluation and Evolution: Frameworks and Benchmarks\" ([arXiv:2606.11435](https://arxiv.org/abs/2606.11435), 2026-06). Code/list: [Cassie07/AgentSkill_Survey](https://github.com/Cassie07/AgentSkill_Survey).\n\nSurvey consolidating the shift from \"isolated skill creation to automated, evaluation-driven skill evolution.\"\n\nTwo taxonomies:\n- **Four evolution paradigms** — execution feedback, trajectory distillation, compression, reinforcement learning.\n- **Six skill-centric benchmark categories** — with the paper flagging structural gaps in coverage, trade-offs, and metric richness.\n\nOpen direction: skill ecosystems that are generalizable, efficient, and *verifiably safe*.\n\n**Relevance to autoharness:** the evaluation half is the live question for any harness optimizer — how to measure skill/harness utility without overfitting a benchmark. Pairs with [synthesis/offline-validation.md](../../synthesis/offline-validation.md). A companion reading list for cross-checking the cluster."}, {"id": "sources/papers/agent-skills-data.md", "layer": "sources", "subtype": "papers", "title": "[论文] Agent Skills: A Data-Driven Analysis of Claude Skills", "status": "", "summary": "George Ling, Shanshan Zhong, Richard Huang — arXiv:2602.08004 · 2026-02 · cs.SE / cs.SI.", "body": "# [论文] Agent Skills: A Data-Driven Analysis of Claude Skills\n\n**George Ling, Shanshan Zhong, Richard Huang** — [arXiv:2602.08004](https://arxiv.org/abs/2602.08004) · 2026-02 · cs.SE / cs.SI.\n\nEcosystem-scale empirical study of **40,285 publicly listed Claude skills** (availability / adoption / risk). Findings: bursty releases tracking attention shifts; supply heavily concentrated in SE workflows while IR + content-creation drive adoption (**supply–demand imbalance**); heavy-tailed length but most fit prompt budgets; **strong ecosystem homogeneity with widespread intent-level redundancy**; non-trivial safety risk from skills enabling state-changing / system-level actions.\n\n**Relevance to autoharness:** independent, large-N evidence that the skill corpus is **redundant at the intent level** — the empirical case for structural **dedup/subsume** at admission (our wedge), not just per-skill quality. Homogeneous descriptions are also exactly what makes recall collapse as N grows (similar descriptions become indistinguishable to the router). The state-changing-action risk reinforces the admission **guardrail**. Pairs with [SkillReducer](skillreducer.md) (description hygiene) and feeds [synthesis/skill-recall-execution](../../synthesis/skill-recall-execution.md)."}, {"id": "sources/papers/agentic-fuzzing.md", "layer": "sources", "subtype": "papers", "title": "[论文] Agentic Fuzzing: Opportunities and Challenges", "status": "", "summary": "(authors not captured) — arXiv:2605.10074 · 2026-05 · no public code.", "body": "# [论文] Agentic Fuzzing: Opportunities and Challenges\n\n**(authors not captured)** — [arXiv:2605.10074](https://arxiv.org/abs/2605.10074) · 2026-05 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nAgent reasons directly from a reference bug; names harness engineering as a core challenge. AFuzz on V8: 40 bugs, $35k bounty, 2 CVEs in a month.\n\n**Relevance to autoharness:** names \"harness engineering\" as the bottleneck even in the fuzzing world — convergent evidence that the harness layer is where reliability is won or lost."}, {"id": "sources/papers/apex.md", "layer": "sources", "subtype": "papers", "title": "[论文] APEX: Autonomous Policy Exploration for Self-Evolving LLM Agents", "status": "", "summary": "(authors not captured) — arXiv:2605.21240 · 2026-05 · no public code.", "body": "# [论文] APEX: Autonomous Policy Exploration for Self-Evolving LLM Agents\n\n**(authors not captured)** — [arXiv:2605.21240](https://arxiv.org/abs/2605.21240) · 2026-05 · no public code.\n\nWarns of **exploration collapse**: as memory grows, behavior concentrates on familiar high-reward routines — worse when there is no benchmark to reveal better options. Proposes a strategy map to keep exploring.\n\n**Relevance to autoharness:** direct evidence for the **exploration-budget invariant** — a benchmark-free optimizer ([RHO](rho.md)) is exactly the regime where collapse bites hardest, so an explicit exploration budget is mandatory, not optional."}, {"id": "sources/papers/autoharness-lou.md", "layer": "sources", "subtype": "papers", "title": "[论文] AutoHarness: Improving LLM Agents by Automatically Synthesizing a Code Harness", "status": "", "summary": "Lou, Lázaro-Gredilla, Dedieu, Wendelken, Lehrach, Murphy (Google DeepMind-affiliated) — arXiv:2603.03329 · 2026-02 · no public code. The namesake (not fuzzing).", "body": "# [论文] AutoHarness: Improving LLM Agents by Automatically Synthesizing a Code Harness\n\n**Lou, Lázaro-Gredilla, Dedieu, Wendelken, Lehrach, Murphy (Google DeepMind-affiliated)** — [arXiv:2603.03329](https://arxiv.org/abs/2603.03329) · 2026-02 · no public code. **The namesake** (not fuzzing).\n\nThe harness is the agent's **action boundary / immune system**: a code layer that filters environment-illegal actions and can escalate to a full code-policy.\n\n- Motivation: in Kaggle GameArena chess, **78% of Gemini-2.5-Flash losses were illegal moves**, not strategy.\n- Method: the LLM **synthesizes its own code harness** through a few rounds of iterative code refinement from environment feedback — the LLM acting as a mutation operator in a program-space search.\n- Result: harness prevents all illegal moves across **145 TextArena games**; smaller Flash + harness beats the larger Gemini-2.5-Pro.\n- Limit case — **harness-as-policy**: generate the entire policy as code, no LLM call at decision time. Code-policy beats Gemini-2.5-Pro and GPT-5.2-High on 16 single-player games, cheaper.\n\n**Relevance to autoharness:** the namesake and conceptual anchor. **Gap it leaves:** validated only in TextArena (clear rules, instant feedback, decidable legality). Moving \"feedback → harness-code iteration\" to sparse-feedback, fuzzy-legality real tasks (API calls, desktop, codebases) is the open problem — and autoharness's natural wedge."}, {"id": "sources/papers/bayesian-agent.md", "layer": "sources", "subtype": "papers", "title": "[论文] Bayesian-Agent: Posterior-Guided Skill Evolution for LLM Agent Harnesses", "status": "", "summary": "(authors not captured) — arXiv:2606.08348 · 2026-06 · code: DataArcTech/Bayesian-Agent (~27★).", "body": "# [论文] Bayesian-Agent: Posterior-Guided Skill Evolution for LLM Agent Harnesses\n\n**(authors not captured)** — [arXiv:2606.08348](https://arxiv.org/abs/2606.08348) · 2026-06 · code: [DataArcTech/Bayesian-Agent](https://github.com/DataArcTech/Bayesian-Agent) (~27★).\n\nFixes \"treating success/fail counts as reliable belief.\" Each skill/SOP is a hypothesis; maintain a **feature-conditioned posterior** over skills; map it to auditable actions **patch / split / compress / retire / explore**.\n\n**Relevance to autoharness:** the posterior-over-skills framing turns raw outcome counts into a belief that *chooses a lever* — directly informs autoharness's attribution→action mapping (violation→enforce, scope-mismatch→generalize, conflict→retire, gap→gated-add). The explicit `explore` action pairs with [APEX](apex.md)'s exploration-collapse warning."}, {"id": "sources/papers/embodiskill.md", "layer": "sources", "subtype": "papers", "title": "[论文] EmbodiSkill: Skill-Aware Reflection for Self-Evolving Embodied Agents", "status": "", "summary": "Ju, Wang, Ding, Yang, … Cao (15 authors) — \"EmbodiSkill: Skill-Aware Reflection for Self-Evolving Embodied Agents\" (arXiv:2605.10332, 2026-05).", "body": "# [论文] EmbodiSkill: Skill-Aware Reflection for Self-Evolving Embodied Agents\n\n**Ju, Wang, Ding, Yang, … Cao (15 authors)** — \"EmbodiSkill: Skill-Aware Reflection for Self-Evolving Embodied Agents\" ([arXiv:2605.10332](https://arxiv.org/abs/2605.10332), 2026-05).\n\nProblem: embodied agents must evolve skills from their own trajectories, but digital-domain methods give \"coarse skill updates,\" and a failed task is ambiguous — it may reflect **flawed skill content** *or* an **execution lapse** (agent ignored valid guidance). EmbodiSkill is a training-free framework that disambiguates: interpret each trajectory against the current skill, use *skill-changing* evidence to revise the skill body, and use *execution-lapse* evidence to preserve and emphasize the guidance that was already correct.\n\nResults: ALFWorld + EmbodiedBench — consistent success gains. On ALFWorld a frozen Qwen3.5-27B executor reaches **93.28%**, beating GPT-5.2 used directly (no skills) by 31.58%.\n\n**Relevance to autoharness:** the **\"bad skill vs. ignored skill\" distinction** is the crucial attribution guardrail — autoharness must not rewrite a harness rule that failed only because it was never followed (cf. SkillEvolver's silent-bypass audit). Embodied setting, but the attribution logic is domain-general."}, {"id": "sources/papers/evoskill.md", "layer": "sources", "subtype": "papers", "title": "[论文] EvoSkill: Automated Skill Discovery for Multi-Agent Systems", "status": "", "summary": "(authors not captured) — arXiv:2603.02766 · 2026-03 · code: sentient-agi/EvoSkill (~870★).", "body": "# [论文] EvoSkill: Automated Skill Discovery for Multi-Agent Systems\n\n**(authors not captured)** — [arXiv:2603.02766](https://arxiv.org/abs/2603.02766) · 2026-03 · code: [sentient-agi/EvoSkill](https://github.com/sentient-agi/EvoSkill) (~870★).\n\n失败分析驱动的 skill 自进化（模型权重冻结，只演化 skill）：分析执行失败 → 提出新 skill 或编辑已有 skill → 物化成结构化、可复用的 skill folder。\n\n**两端都咬 benchmark 标签**：数据集切成三份 disjoint——train 上检测失败（\"失败\"由标准答案判定，触发造/改 skill）、validation 上给候选打分做选择（OfficeQA 仅 17 例 ≈7%，确定性 fuzzy-match scorer 返 0/1，exact-match），test 报终值。造料端与裁决端都依赖 oracle 标签。\n\n**\"Pareto frontier\" 名不副实**：摘要称 Pareto，但 Algorithm 1 实为**固定容量、单分数 top-k frontier**——保留 k 个最高 validation 分的 program，候选分数超过最弱成员才挤入，并无多目标权衡。program = system prompt + 累积 skills，每个存为一条 git branch（记 parent / generation / allowed tools / scores）。\n\n结果：OfficeQA 60.6→67.9、SealQA 26.6→38.7；skill 从 SealQA **zero-shot 迁移**到 BrowseComp（+5.3）。\n\n**Relevance to autoharness:** 失败→skill 的循环 + 固定容量上限（防 symbol 层膨胀）可借；但它**两端都依赖标注 benchmark**，本项目没有——属[离线评测验证](../../synthesis/offline-validation.md)的「外部 benchmark」子类，整体否决其 benchmark 依赖。（原卡\"Pareto 非支配集\"依摘要措辞，与全文实现的 top-k 不符，已更正。）"}, {"id": "sources/papers/exg.md", "layer": "sources", "subtype": "papers", "title": "[论文] EXG: Self-Evolving Agents with Experience Graphs", "status": "", "summary": "(authors not captured) — arXiv:2605.17721 · 2026-05 · no public code.", "body": "# [论文] EXG: Self-Evolving Agents with Experience Graphs\n\n**(authors not captured)** — [arXiv:2605.17721](https://arxiv.org/abs/2605.17721) · 2026-05 · no public code.\n\nRepresents accumulated experience as an evolving graph the agent reads and extends.\n\n**Relevance to autoharness:** companion to [SAGE](sage.md) and [SkillDAG](skilldag.md) in the experience-graph cluster — a structural option for organizing trajectory-derived knowledge when a flat document stops scaling."}, {"id": "sources/papers/externalization-review.md", "layer": "sources", "subtype": "papers", "title": "[论文] Externalization in LLM Agents: A Unified Review of Memory, Skills, Protocols and Harness Engineering", "status": "", "summary": "Zhou, Chai, Chen, … Lin, Zhang (21 authors) — \"Externalization in LLM Agents: A Unified Review of Memory, Skills, Protocols and Harness Engineering\" (arXiv:2604.08224, 2026-04, 54pp).", "body": "# [论文] Externalization in LLM Agents: A Unified Review of Memory, Skills, Protocols and Harness Engineering\n\n**Zhou, Chai, Chen, … Lin, Zhang (21 authors)** — \"Externalization in LLM Agents: A Unified Review of Memory, Skills, Protocols and Harness Engineering\" ([arXiv:2604.08224](https://arxiv.org/abs/2604.08224), 2026-04, 54pp).\n\nThe umbrella survey for this whole collection. Thesis: modern agents are built \"less by changing model weights than by reorganizing the runtime around them\" — capability is **externalized** into infrastructure (the cognitive-artifacts framing), tracing a progression *weights → context → harness*.\n\nFour coupled forms of externalization:\n- **Memory** — externalizes state across time.\n- **Skills** — externalizes procedural expertise.\n- **Protocols** — externalizes interaction structure.\n- **Harness engineering** — the *unification layer* that coordinates the other three into governed execution.\n\nKey claims: infrastructure isn't glue — it \"transforms hard cognitive burdens into forms the model can solve more reliably\"; the parametric-vs-externalized trade-off is the central design axis; emerging frontier is **self-evolving harnesses and shared agent infrastructure**, with open problems in evaluation, governance, and model–infrastructure co-evolution.\n\n**Relevance to autoharness:** names the harness as a first-class engineering concern and the coordinating layer — direct vocabulary for positioning autoharness as a *self-evolving harness*. Use as the framing citation."}, {"id": "sources/papers/falsecrashreducer.md", "layer": "sources", "subtype": "papers", "title": "[论文] FalseCrashReducer: Mitigating False Positive Crashes in OSS-Fuzz-Gen Using Agentic AI", "status": "", "summary": "(authors not captured) — arXiv:2510.02185 · 2025-10 · no public code.", "body": "# [论文] FalseCrashReducer: Mitigating False Positive Crashes in OSS-Fuzz-Gen Using Agentic AI\n\n**(authors not captured)** — [arXiv:2510.02185](https://arxiv.org/abs/2510.02185) · 2025-10 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nDirectly targets OSS-Fuzz-Gen **false positives eroding maintainer trust** — agentic triage to suppress harness-induced false crashes.\n\n**Relevance to autoharness:** the clearest statement of the shared lesson — false positives erode the recipient's trust, so verification/triage before emission is the valuable part, not candidate generation."}, {"id": "sources/papers/gepa.md", "layer": "sources", "subtype": "papers", "title": "[论文] GEPA: Reflective Prompt Evolution Can Outperform Reinforcement Learning", "status": "", "summary": "(authors not captured) — arXiv:2507.19457 · 2025.", "body": "# [论文] GEPA: Reflective Prompt Evolution Can Outperform Reinforcement Learning\n\n**(authors not captured)** — [arXiv:2507.19457](https://arxiv.org/abs/2507.19457) · 2025.\n\nShows **reflective prompt evolution** (genetic-Pareto search over prompts guided by reflection) can beat RL fine-tuning at far lower sample cost.\n\n**Relevance to autoharness:** the strongest recent evidence that symbol-space optimization rivals weight-space — and the Pareto-reflective search pattern echoed by [EvoSkill](evoskill.md)."}, {"id": "sources/papers/graph-of-skills.md", "layer": "sources", "subtype": "papers", "title": "[论文] Graph-of-Skills (GoS): Dependency-Aware Structural Retrieval for Massive Agent Skills", "status": "", "summary": "Dawei Liu, Zongxia Li, Hongyang Du, Xiyang Wu, Shihang Gui, Yongbei Kuang, Lichao Sun (UPenn / Maryland / Brown / CMU / Lehigh) — arXiv:2604.05333, 2026-04 (v3 2026-05-27). code: davidliuk/graph-of-skills.", "body": "# [论文] Graph-of-Skills (GoS): Dependency-Aware Structural Retrieval for Massive Agent Skills\n\n**Dawei Liu, Zongxia Li, Hongyang Du, Xiyang Wu, Shihang Gui, Yongbei Kuang, Lichao Sun (UPenn / Maryland / Brown / CMU / Lehigh)** — [arXiv:2604.05333](https://arxiv.org/abs/2604.05333), 2026-04 (v3 2026-05-27). code: [davidliuk/graph-of-skills](https://github.com/davidliuk/graph-of-skills).\n\n**Inference-time structural retrieval layer** for large local skill libraries (creation/organization are upstream — SkillNet/AgentSkillOS; GoS only retrieves). Problem: flat loading saturates context; vector top-k surfaces topically-similar skills but misses their prerequisite chain → \"prerequisite gap\" → retrieved bundle execution-incomplete. GoS builds an executable skill graph **offline** (typed edges `R={dep, wf, sem, alt}`), then at query time frames retrieval as a budgeted selection (max relevance + dependency-completeness s.t. token budget), approximated in three stages: hybrid semantic-lexical seed → reverse-aware Personalized PageRank diffusion → budgeted rerank + hydration. SkillsBench 1000-skill / GPT-5.2-Codex: **+25.55% reward, −56.72% tokens**; holds across 200→2000 skills.\n\n**Relevance to autoharness:** the **召回 (retrieve)** layer of the design — borrow the budgeted, dependency-aware retrieval. Static offline graph + PPR (vs SkillDAG's online execution-backed edges); **no conflict edge**."}, {"id": "sources/papers/harnessagent.md", "layer": "sources", "subtype": "papers", "title": "[论文] HarnessAgent: Scaling Automatic Fuzzing Harness Construction", "status": "", "summary": "(authors not captured) — arXiv:2512.03420 · 2025-12 · no public code.", "body": "# [论文] HarnessAgent: Scaling Automatic Fuzzing Harness Construction\n\n**(authors not captured)** — [arXiv:2512.03420](https://arxiv.org/abs/2512.03420) · 2025-12 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nScales automatic construction of fuzzing harnesses.\n\n**Relevance to autoharness:** reference point for the scale-up phase of harness generation in the fuzzing line."}, {"id": "sources/papers/harnessfix.md", "layer": "sources", "subtype": "papers", "title": "[论文] HarnessFix: From Failed Trajectories to Reliable LLM Agents — Diagnosing and Repairing Harness Flaws", "status": "", "summary": "Chen, Wang et al. — arXiv:2606.06324 · 2026-06 · no public code.", "body": "# [论文] HarnessFix: From Failed Trajectories to Reliable LLM Agents — Diagnosing and Repairing Harness Flaws\n\n**Chen, Wang et al.** — [arXiv:2606.06324](https://arxiv.org/abs/2606.06324) · 2026-06 · no public code.\n\nAnswers \"**which harness layer caused the failure**\", *after* something else flagged the trajectory as failed. Trajectory-level failure is **not** self-derived — it comes from the external benchmark oracle (SWE-Bench resolved / Terminal-Bench tests / GAIA exact-match / AppWorld goal completion); the diagnosis agent just reads the externally-evaluated result.\n\nIts contribution is *step-level attribution inside a known-failed trajectory*:\n- Compile raw traces + harness code into a **Harness-aware Trace IR (HTIR)** — `TraceStep` nodes (Role, Execution Status, Artifact/state effect) linked by temporal / input-provenance / control-flow edges.\n- An **LLM diagnosis agent** does backward evidence-backtracking → ranked candidate responsible steps → adjudication → maps to one of **7 ETCLOVG layers** (Execution/sandbox, Tool interface, Context/memory, Lifecycle/orchestration, Observability, Verification/eval, Governance/security).\n- Repair gate = **TargetImprovement** (ΔD_target ≥ δ_min, flaw occurrence *re-diagnosed* on new trajectories, no ground-truth label — the benchmark-free verify worth borrowing) **+ RegressionBound** (R_new ≤ r_max, anchored to the benchmark oracle).\n\n**Relevance to autoharness:** borrow the step-attribution + re-diagnose-verify. The failure *definition* (benchmark oracle) does **not** transfer, and the 7-layer granularity is far coarser than the per-rule granularity autoharness needs. Caveat: only R_new is objective; ΔD_target carries the same LLM-attribution noise as the original diagnosis."}, {"id": "sources/papers/hasp.md", "layer": "sources", "subtype": "papers", "title": "[论文] HASP: Harnessing LLM Agents with Skill Programs", "status": "", "summary": "Hongjun Liu, Yifei Ming, Shafiq Joty, Chen Zhao (NYU · Salesforce AI Research) — arXiv:2605.17734 · 2026-05-18.", "body": "# [论文] HASP: Harnessing LLM Agents with Skill Programs\n\n**Hongjun Liu, Yifei Ming, Shafiq Joty, Chen Zhao** (NYU · Salesforce AI Research) — [arXiv:2605.17734](https://arxiv.org/abs/2605.17734) · 2026-05-18.\n\n> The skill+harness title collision: this is the paper most likely meant by \"skillharness.\" Distinct from [AutoHarness](autoharness-lou.md) and from this project (see [[autoharness-means-agent-harness]]).\n\nSkills become **Program Functions (PFs)** — executable modules, not advisory text. Each PF is `should_activate` (fires on a failure-prone state) + `intervene` (returns the repair). The harness is an external control layer: base policy proposes an action → harness retrieves PFs → evaluates activation → runs intervention (**MODIFY_ACTION** rewrites the next action, **INJECT_CONTEXT** appends corrective text, else **NOOP**) → revised action goes back. PFs are mined from training-pool failures and admitted only after syntax + interface + mock-execution validation. One interface, three uses: inference-time intervention, post-training supervision, self-improving library evolution.\n\n**Numbers.** Web-search: PF-only 51.0% → on-policy distillation 62.5%; HASP-Evolve+RS 60.3% vs Search-R1 29.9% (+30.4). Math 35.9→45.4. Coding pass@1 ~69.9. Interventions split 65.1% action-level / 34.9% context-level. Ablating the four evolution signals (timing/mode/correctness/outcome) costs 7.8/15.5/12.1/12.8 pts; **unfiltered evolution collapses to 36.3% vs 60.3% filtered.**\n\n**Referenced directions (their Related Work).**\n- **A. Post-training / RL for agent reasoning & tool use** — Search-R1, ReSearch, ZeroSearch, StepSearch, VerlTool; SimpleRL-zoo, Open-Reasoner-Zero, General-Reasoner, ToRL, AceCoder, P-GRPO. HASP frames itself as modular across SFT / rejection-sampling / on-policy-distillation rather than one RL paradigm.\n- **B. Skill-augmented & self-improving agents** — [ReAct], Toolformer, AutoGen, AgentFlow; [Reflexion](reflexion.md), ExpeL, [Voyager](voyager.md); MemSkill, SkillRL, EvolveR, [SAGE](sage.md). Contrast they draw: prior work reuses experience as **prompt text or task routines**; HASP uses **executable state→action intervention functions**.\n- **Table 1 axes** (Form / Runtime-control / Learning-signal / Policy-training / Skill-evolution): HASP claims it is the only one full on all five — its wedge is **runtime control** (others partial) + **skill evolution** (absent from pure-RL).\n\n**Relevance to autoharness.** HASP is the *opposite design corner* on the axis that defines us, which makes it the sharpest contrast point:\n- **Executable + auto-written + weight-training** vs our **text-layer, never-auto-write, frozen-model** stance. HASP writes/admits code and trains the policy; we treat human adoption as structural grounding (invariant 1) and stay text-space like [SkillOpt](skillopt.md), opposite to the [TMEM](tmem.md) weight corner.\n- Their PF `should_activate` predicate is the executable form of our **applicability gate** (invariant 6 — omission needs applicability before it's a verdict).\n- Their unfiltered-evolution collapse (36.3 vs 60.3) and per-signal ablations are external evidence for our **gate-or-collapse** posture (invariants 7–8) — file the collapse datapoint alongside [APEX](apex.md).\n- Action-vs-context intervention split mirrors our **attribution→lever** mapping (enforce / generalize / retire / gated-add), but HASP picks the lever to *act automatically*; we pick it to *propose to a human*.\n- Direction A (RL post-training) is orthogonal-to-counter to us (weight-free); Direction B is where our corpus overlaps — Reflexion / Voyager / SAGE already carded; MemSkill / SkillRL / EvolveR / ExpeL / AgentFlow are gaps."}, {"id": "sources/papers/java-fuzz-harness.md", "layer": "sources", "subtype": "papers", "title": "[论文] Coverage-Guided Multi-Agent Harness Generation for Java Library Fuzzing", "status": "", "summary": "(authors not captured) — arXiv:2603.08616 · 2026-03 · no public code.", "body": "# [论文] Coverage-Guided Multi-Agent Harness Generation for Java Library Fuzzing\n\n**(authors not captured)** — [arXiv:2603.08616](https://arxiv.org/abs/2603.08616) · 2026-03 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\n5 ReAct agents + on-demand MCP retrieval (no whole-codebase preprocessing); method-targeted coverage; agent-guided termination; ~$3.20 / 10 min per harness.\n\n**Relevance to autoharness:** on-demand retrieval over whole-codebase preprocessing is a cost pattern worth noting for trajectory analysis at scale."}, {"id": "sources/papers/masfuzzer.md", "layer": "sources", "subtype": "papers", "title": "[论文] MASFuzzer: Fuzz Driver Generation and Adaptive Scheduling", "status": "", "summary": "(authors not captured) — arXiv:2604.17977 · 2026-04 · no public code.", "body": "# [论文] MASFuzzer: Fuzz Driver Generation and Adaptive Scheduling\n\n**(authors not captured)** — [arXiv:2604.17977](https://arxiv.org/abs/2604.17977) · 2026-04 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nMultidimensional API-sequence mining + coverage-guided scheduling; +8.54% coverage; 16 bugs (9 CVEs).\n\n**Relevance to autoharness:** coverage-guided scheduling is a selection heuristic — which candidates to spend budget on — analogous to choosing which trajectories to replay."}, {"id": "sources/papers/metatool.md", "layer": "sources", "subtype": "papers", "title": "[论文] MetaTool: Deciding Whether to Use Tools and Which to Use", "status": "", "summary": "Yue Huang, Jiawen Shi, Yuan Li, … Lichao Sun — arXiv:2310.03128 (v6, 2024-12; submitted 2023-10) · ICLR 2024 · code: HowieHwong/MetaTool.", "body": "# [论文] MetaTool: Deciding Whether to Use Tools and Which to Use\n\n**Yue Huang, Jiawen Shi, Yuan Li, … Lichao Sun** — [arXiv:2310.03128](https://arxiv.org/abs/2310.03128) (v6, 2024-12; submitted 2023-10) · ICLR 2024 · code: [HowieHwong/MetaTool](https://github.com/HowieHwong/MetaTool).\n\nThe academic formalization of the **\"should this capability fire here?\"** question. Splits the decision into two measurable capabilities: **tool-usage awareness** (is a tool needed at all) and **tool selection** (which one). Ships **ToolE**, a query dataset (single- + multi-tool), with four selection subtasks: similar-choice, scenario-specific, reliability-issue, multi-tool.\n\nHeadline over 8 LLMs: **most still struggle to select tools correctly** — a measured gap between LLMs and \"genuine agents.\" Developer takeaway: pick an appropriate rewrite model to **regenerate tool descriptions** for the downstream LLM (i.e. the description is the routing lever).\n\n**Relevance to autoharness:** the closest *peer-reviewed proxy* for skill-recall — a skill firing when relevant is exactly \"usage awareness + selection,\" just measured on a labeled tool benchmark rather than on Claude Code. Confirms the failure is real and **description-bound**. Feeds [synthesis/skill-recall-execution](../../synthesis/skill-recall-execution.md); proxy-not-direct caveat noted there."}, {"id": "sources/papers/moss.md", "layer": "sources", "subtype": "papers", "title": "[论文] MOSS: Self-Evolution through Source-Level Rewriting in Autonomous Agent Systems", "status": "", "summary": "(HKGAI) — arXiv:2605.22794 · 2026-05 · code: hkgai-official/Moss (~8★).", "body": "# [论文] MOSS: Self-Evolution through Source-Level Rewriting in Autonomous Agent Systems\n\n**(HKGAI)** — [arXiv:2605.22794](https://arxiv.org/abs/2605.22794) · 2026-05 · code: [hkgai-official/Moss](https://github.com/hkgai-official/Moss) (~8★).\n\nClosest to production. Argues text-layer evolution (skill/prompt/memory) can't reach the routing/hooks/state-invariants that live in **code**; does source-level self-rewriting anchored to auto-curated production-failure batches, replay-verified in ephemeral workers, consent-gated in-place swap with health-probe rollback. Evaluated on OpenClaw (0.25→0.61, one cycle, no human).\n\n**Failure sourcing is NOT benchmark-based** (contrast [HarnessFix](harnessfix.md)): errors come from production sessions via two channels — a 30-min cron scanning new session content for *under-performing turns / \"weak chunks\"*, plus a manual `moss evo flag`. No oracle/threshold defined — \"weak\" is an unspecified LLM-ish quality judgment, so labeling is exposed to self-eval bias. The **validation set is the failure batch itself** (replayed on ephemeral trial workers); the only grader in the paper *measures* the 0.25→0.61 result, it doesn't label failures.\n\n**Relevance to autoharness:** borrow the collection channels + consent-gated swap + 90s health-probe rollback. Do **not** borrow the whole-system source-rewrite body — too heavy and OpenClaw-bound; autoharness's target is the symbol layer, not source code."}, {"id": "sources/papers/muse-autoskill.md", "layer": "sources", "subtype": "papers", "title": "[论文] MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation", "status": "", "summary": "Lin, Li, Song, Jiang, Zhang — \"MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation\" (arXiv:2605.27366, 2026-05, 30pp).", "body": "# [论文] MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation\n\n**Lin, Li, Song, Jiang, Zhang** — \"MUSE-Autoskill: Self-Evolving Agents via Skill Creation, Memory, Management, and Evaluation\" ([arXiv:2605.27366](https://arxiv.org/abs/2605.27366), 2026-05, 30pp).\n\n> Skill-lifecycle sibling in the [skill-as-state cluster](index.md).\n\nProblem: skill-creation methods treat skills as \"isolated and static artifacts,\" limiting reuse, reliability, and long-term improvement. MUSE (Memory-Utilizing Skill Evolution) manages a unified skill lifecycle:\n- **Creation** — generate skills on demand.\n- **Memory** — per-skill memory accumulates experience across tasks.\n- **Management** — organize and select skills efficiently.\n- **Evaluation/Refinement** — validate via **unit tests and runtime feedback**.\n\nCentral reframing: skills as long-lived, experience-aware, **testable** assets.\n\nResults: SkillsBench — preliminary evidence of gains in task success, efficiency, skill reuse, and cross-agent transfer (authors mark it work-in-progress).\n\n**Relevance to autoharness:** the *unit-test-the-skill* idea is the validation mechanism a harness optimizer needs; the per-skill memory is the substrate trajectory-bootstrapping reads from."}, {"id": "sources/papers/openclaw-skill.md", "layer": "sources", "subtype": "papers", "title": "[论文] OpenClaw-Skill: Collective Skill Tree Search for Agentic Large Language Models", "status": "", "summary": "Tianyi Lin, Chuanyu Sun, Jingyi Zhang, Changxu Wei, Huanjin Yao, Shunyu Liu, Xikun Zhang, Liu Liu, Jiaxing Huang (HK PolyU · NTU · Tsinghua · RMIT · BUAA) — arXiv:2606.16774 · 2026-06 · 13pp.", "body": "# [论文] OpenClaw-Skill: Collective Skill Tree Search for Agentic Large Language Models\n\n**Tianyi Lin, Chuanyu Sun, Jingyi Zhang, Changxu Wei, Huanjin Yao, Shunyu Liu, Xikun Zhang, Liu Liu, Jiaxing Huang** (HK PolyU · NTU · Tsinghua · RMIT · BUAA) — [arXiv:2606.16774](https://arxiv.org/abs/2606.16774) · 2026-06 · 13pp.\n\nProblem: equipping LLM agents with reusable skills (for tool use, multi-step reasoning, dynamic-environment interaction) is the bottleneck in real systems like [OpenClaw](../github/openclaw.md). Construct a structured, diverse, **generalizable tree of skills** automatically.\n\nMethod — **Collective Skill Tree Search (CSTS)**, two iterative phases driven by *collective intelligence* (multiple models, not one):\n- **CSN-Gen** (node generation): pools collective knowledge from multiple models to explore diverse candidate skills per subtask — broad exploration, not single-model bias.\n- **CSN-Assess** (node assessment): multiple models as judges, two scores — (1) **collective quality scoring** aggregates independent evaluations into a robust effectiveness estimate; (2) **collective transferability scoring** explicitly checks whether a skill generalizes *across different models*.\n- **Collective Skill Reinforcement Learning (CSRL)**: actively selects *multiple* relevant skills from the tree per problem to broaden solution-space search, so the policy isn't trapped by one skill's homogeneous/suboptimal solution.\n\nResult: trained model OpenClaw-Skill reports strong long-horizon planning, tool use, and generalization on challenging benchmarks (abstract-level; specific numbers in full PDF).\n\n**Relevance to autoharness:** two transplantable ideas. (1) **Collective transferability scoring** is a benchmark-free validation signal — \"does this skill help models *other than the one that wrote it*\" is a judge-consensus gate that needs no labeled oracle, sitting at point 3 of the [validation-signal spectrum](../../synthesis/offline-validation.md) and a concrete counter to [self-eval bias](skilllens.md). (2) CSRL's multi-skill selection is an explicit hedge against [exploration collapse](apex.md). **Caveat:** CSTS *grows* a skill tree (add/compose), whereas autoharness's wedge is per-rule *maintenance* under net-improvement gating (\"curate, not grow\"); borrow its assessment signal, not its growth bias."}, {"id": "sources/papers/quartetfuzz.md", "layer": "sources", "subtype": "papers", "title": "[论文] QuartetFuzz: Quality-Assured Fuzz Harness Generation via the Four Principles Framework", "status": "", "summary": "(authors not captured) — arXiv:2605.21824 · 2026-05 · code: OwenSanzas/QuartetFuzz.", "body": "# [论文] QuartetFuzz: Quality-Assured Fuzz Harness Generation via the Four Principles Framework\n\n**(authors not captured)** — [arXiv:2605.21824](https://arxiv.org/abs/2605.21824) · 2026-05 · code: [OwenSanzas/QuartetFuzz](https://github.com/OwenSanzas/QuartetFuzz).\n\n> Adjacent reference — fuzz-**driver** harness, a different \"harness\" from this project's agent harness. Kept for the output-quality-validation lesson.\n\nFour-principles correctness (Logic / API-protocol / Security-boundary / Entry-point) in a generate-check-fix loop before fuzzing. 42 reports, 29 fixed/confirmed (3 CVEs), 4.8% FP; P1/P2 checks intercepted 58 harness-induced false crashes.\n\n**Relevance to autoharness:** the most on-point fuzzing analogue — automatic pre-emission quality checks to avoid flooding the recipient with noise, mirroring the gate-before-commit discipline. See [synthesis/](../../synthesis/index.md) for the shared \"triage is mandatory\" lesson."}, {"id": "sources/papers/reflexion.md", "layer": "sources", "subtype": "papers", "title": "[论文] Reflexion: Language Agents with Verbal Reinforcement Learning", "status": "", "summary": "Shinn, Cassano, Gopinath, Narasimhan, Yao — arXiv:2303.11366 · 2023.", "body": "# [论文] Reflexion: Language Agents with Verbal Reinforcement Learning\n\n**Shinn, Cassano, Gopinath, Narasimhan, Yao** — [arXiv:2303.11366](https://arxiv.org/abs/2303.11366) · 2023.\n\nAgents improve by converting outcome feedback into **verbal self-reflection** stored in an episodic buffer — reinforcement in language, not weights.\n\n**Relevance to autoharness:** the canonical \"reflect-then-edit\" backward pass that the whole symbolic-learning line generalizes — `experience → reflection → symbolic artifact` (vs. `experience → gradient → weights`)."}, {"id": "sources/papers/reliable-fuzz-vision.md", "layer": "sources", "subtype": "papers", "title": "[论文] Towards Reliable LLM-Driven Fuzz Testing: Vision and Road Ahead", "status": "", "summary": "(authors not captured) — arXiv:2503.00795 · 2025-03 · no public code.", "body": "# [论文] Towards Reliable LLM-Driven Fuzz Testing: Vision and Road Ahead\n\n**(authors not captured)** — [arXiv:2503.00795](https://arxiv.org/abs/2503.00795) · 2025-03 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nA vision/position paper on making LLM-driven fuzz testing reliable.\n\n**Relevance to autoharness:** frames \"reliability of LLM-generated harnesses\" as the open agenda — the same framing the agent-harness line arrived at independently."}, {"id": "sources/papers/rho.md", "layer": "sources", "subtype": "papers", "title": "[论文] Retrospective Harness Optimization (RHO)", "status": "", "summary": "Wenbo Pan et al. — arXiv:2606.05922 · 2026-06 · code: wbopan/retro-harness (~14★, author = first author).", "body": "# [论文] Retrospective Harness Optimization (RHO)\n\n**Wenbo Pan et al.** — [arXiv:2606.05922](https://arxiv.org/abs/2606.05922) · 2026-06 · code: [wbopan/retro-harness](https://github.com/wbopan/retro-harness) (~14★, author = first author).\n\n**The most direct benchmark-free answer.** No ground truth at all: a DPP-selected difficulty-diverse coreset of past tasks → re-solve G× in parallel → self-validation + self-consistency → candidate edits picked by the agent's own **pairwise self-preference** (applied only if mean preference positive). SWE-Bench Pro 59→78% in one round, zero external grading.\n\nThe official repo optimizes CLAUDE.md / auto-memory / scripts — **autoharness's exact target**, and the only repo occupying the benchmark-free corner ([kayba](../github/kayba-ai-autoharness.md) requires a benchmark command).\n\n**Relevance to autoharness:** the lightest-dependency point on the [validation-signal spectrum](../../synthesis/offline-validation.md) (pure self-preference). Most general but most exposed to self-eval bias (cf. [SkillLens](skilllens.md) 46.4%). Keep an explicit exploration budget against the collapse [APEX](apex.md) warns of."}, {"id": "sources/papers/sage.md", "layer": "sources", "subtype": "papers", "title": "[论文] SAGE: A Self-Evolving Agentic Graph-Memory Engine", "status": "", "summary": "(authors not captured) — arXiv:2605.12061 · 2026-05 · no public code.", "body": "# [论文] SAGE: A Self-Evolving Agentic Graph-Memory Engine\n\n**(authors not captured)** — [arXiv:2605.12061](https://arxiv.org/abs/2605.12061) · 2026-05 · no public code.\n\nA graph-structured memory engine that evolves as the agent runs.\n\n**Relevance to autoharness:** part of the graph-memory line (with [EXG](exg.md), [SkillDAG](skilldag.md)) — relevant once the symbol layer is large enough that *structure* (typed relations, conflict edges) matters more than flat retrieval."}, {"id": "sources/papers/scheduzz.md", "layer": "sources", "subtype": "papers", "title": "[论文] Scheduzz: Constraint-based Fuzz Driver Generation with Dual Scheduling", "status": "", "summary": "(authors not captured) — arXiv:2507.18289 · 2025-07 · no public code.", "body": "# [论文] Scheduzz: Constraint-based Fuzz Driver Generation with Dual Scheduling\n\n**(authors not captured)** — [arXiv:2507.18289](https://arxiv.org/abs/2507.18289) · 2025-07 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nConstraint-based fuzz driver generation with dual scheduling.\n\n**Relevance to autoharness:** reference point for constraint-driven generation in the fuzzing harness line."}, {"id": "sources/papers/sec-bench-pro.md", "layer": "sources", "subtype": "papers", "title": "[论文] SEC-bench Pro: Can Language Models Solve Long-Horizon Software Security Tasks?", "status": "", "summary": "(authors not captured) — arXiv:2605.26548 · 2026-05 · no public code.", "body": "# [论文] SEC-bench Pro: Can Language Models Solve Long-Horizon Software Security Tasks?\n\n**(authors not captured)** — [arXiv:2605.26548](https://arxiv.org/abs/2605.26548) · 2026-05 · no public code.\n\n> Adjacent reference (security-task benchmark).\n\nA benchmark probing whether LLMs can solve long-horizon software-security tasks.\n\n**Relevance to autoharness:** an evaluation reference for the security-adjacent end of agent capability — context for where harness reliability matters most."}, {"id": "sources/papers/self-evolving-forget.md", "layer": "sources", "subtype": "papers", "title": "[论文] Do Self-Evolving Agents Forget? Capability Degradation and Preservation", "status": "", "summary": "(authors not captured) — arXiv:2605.09315 · 2026-05 · no public code.", "body": "# [论文] Do Self-Evolving Agents Forget? Capability Degradation and Preservation\n\n**(authors not captured)** — [arXiv:2605.09315](https://arxiv.org/abs/2605.09315) · 2026-05 · no public code.\n\nDocuments **non-monotonic self-evolution**: self-improvement can degrade previously-held capability, and preservation must be designed in.\n\n**Relevance to autoharness:** the case for **rollback + regression-gating as first-class** — net improvement on new tasks can hide regressions on old ones, so every change must be reversible and checked against prior behavior."}, {"id": "sources/papers/self-harness.md", "layer": "sources", "subtype": "papers", "title": "[论文] Self-Harness: Harnesses That Improve Themselves", "status": "", "summary": "(authors not captured) — arXiv:2606.09498 · 2026-06 · no public code.", "body": "# [论文] Self-Harness: Harnesses That Improve Themselves\n\n**(authors not captured)** — [arXiv:2606.09498](https://arxiv.org/abs/2606.09498) · 2026-06 · no public code.\n\nLoop: **Weakness Mining** (model-specific failures from traces) → minimal harness edits → **regression-test-gated** acceptance. Held-out pass-rate gains across 3 model families (MiniMax M2.5 / Qwen3.5-35B-A3B / GLM-5).\n\n**Most benchmark-bound of the bootstrap cluster — anchored at both ends:** instantiated on **Terminal-Bench-2.0** from a minimal initial harness; failure traces are produced on that benchmark; the Proposal-Validation gate accepts edits only via **held-out pass rates = benchmark ground-truth task success** (not self-eval like HarnessFix's flaw-rate or MOSS's batch-replay).\n\n**Relevance to autoharness:** only the *loop skeleton* (weakness-mine → minimal edit → regression gate) transfers; its failure-sourcing and gate do **not** — they need a benchmark autoharness doesn't have. Compare [rho.md](rho.md) (benchmark-free) at the opposite end of the [validation-signal spectrum](../../synthesis/offline-validation.md)."}, {"id": "sources/papers/sgdr-web-agents.md", "layer": "sources", "subtype": "papers", "title": "[论文] Online Skill Learning for Web Agents via State-Grounded Dynamic Retrieval (SGDR)", "status": "", "summary": "Li, Deng, Wang, Huang, Shi, Tan, Lu, Liu — \"Online Skill Learning for Web Agents via State-Grounded Dynamic Retrieval\" (arXiv:2606.04391, 2026-06, 17pp). Code: plusnli/skill-dynamic-retrieval.", "body": "# [论文] Online Skill Learning for Web Agents via State-Grounded Dynamic Retrieval (SGDR)\n\n**Li, Deng, Wang, Huang, Shi, Tan, Lu, Liu** — \"Online Skill Learning for Web Agents via State-Grounded Dynamic Retrieval\" ([arXiv:2606.04391](https://arxiv.org/abs/2606.04391), 2026-06, 17pp). Code: [plusnli/skill-dynamic-retrieval](https://github.com/plusnli/skill-dynamic-retrieval).\n\nProblem: existing online skill learning retrieves a fixed skill set from the **initial instruction** and holds it constant — misaligned with web execution, where \"the appropriate next action depends not only on the
