 task goal but also on the current webpage state.\" SGDR (State-Grounded Dynamic Retrieval) enables **stepwise** reuse:\n- Sliding-window extraction turns completed trajectories into reusable sub-procedures usable at intermediate states.\n- Dual **text-code** representation links retrieval to executable actions.\n- State-grounded retrieval matches skills to *both* goal and current page state.\n\nResults: WebArena (5 domains) — 37.5% with GPT-4.1, 24.3% with Qwen3-4B; +10.6% / +10.0% relative over the strongest baseline.\n\n**Relevance to autoharness:** retrieval keyed to **runtime state**, not just the task — a reminder that harness behavior is state-dependent, and that skills/rules should bind to the situation they apply in. Sub-trajectory extraction is a granularity option for trajectory-bootstrapping."}, {"id": "sources/papers/skill-harnessing-ra.md", "layer": "sources", "subtype": "papers", "title": "[论文] Harnessing Agent Skills: Architectural Patterns and a Reference Architecture for Skill-Mediated LLM Agents", "status": "", "summary": "Boming Xia, Liming Zhu, Zhenchang Xing, Qinghua Lu, Dino Sejdinovic, Xiwei Xu (RAIR Centre · Adelaide Univ · CSIRO · UNSW) — arXiv:2606.20631 · 2026-05-29.", "body": "# [论文] Harnessing Agent Skills: Architectural Patterns and a Reference Architecture for Skill-Mediated LLM Agents\n\n**Boming Xia, Liming Zhu, Zhenchang Xing, Qinghua Lu, Dino Sejdinovic, Xiwei Xu** (RAIR Centre · Adelaide Univ · CSIRO · UNSW) — [arXiv:2606.20631](https://arxiv.org/abs/2606.20631) · 2026-05-29.\n\nThe framing/architecture companion (sequential arXiv id to [SkillHarness](skillharness.md)). Defines **agent skill harnessing**: the layer governing *static artefact → skill-in-use (run-scoped) → skill-mediated behaviour (observable output)*. Output: a 10-pattern catalogue + 4-layer reference architecture, evaluated over 8 systems.\n\n**Five core patterns.** (1) **Progressive Skill Activation** — available→selectable→active; descriptor-first to cut \"context tax.\" (2) **Skill–Execution Authority Separation** — a capability reference grants no execution authority; authority comes from a separate policy. (3) **Verifiable Skill Contract** — independently checkable criteria → passed/failed/inconclusive/verifier-error. (4) **Runtime Skill-BOM** — per-run, skill-centred provenance manifest (exposed/selected/activated/excluded/unavailable). (5) **Skill–Agent Co-Evolution Loop** — run evidence drives *validated candidate changes*, never direct mutation of shared artefacts.\n**Five supporting patterns.** Skill Eligibility Gate · Skill Scope Cascade · Skill Resource Materialisation Boundary · Skill Extension Bundle · Runtime Skill Repair (bounded same-run, stored artefact unchanged).\n\n**Reference architecture (4 layers):** Supply Chain (artefacts at rest + return path) · Mediation (resolution, admission, staged activation) · Execution Control (executable consequences; Runtime Action Control at the boundary) · Evidence & Feedback (records/verifications/repair → back to Mediation; accepted changes → back to Supply Chain). Cross-cutting: Policy/Config + Identifier.\n\n**Taxonomy.** Skills are distinctive because **five dimensions take their skill-form simultaneously**: runtime participation, enactment, authority implication, evidence need, evolution path. Skills vs tools (interpreted-not-executed; reference-without-authority) vs memory (run-scoped skill-centred evidence + governed feedback to a versioned artefact) vs reusable prompts (boundary is **dimensional, not categorical**). Splits **skill harnessing** (run-scoped artefact→use) from **skill management** (lifecycle: authoring/distribution/storage/update).\n\n**Referenced directions.** §9.1 Agent Harness & Harness Engineering; §9.2 Agent Skills & Skill Harnessing. Cited across intro/patterns: externalisation/harness (rajasekaran2026, lin2026, trivedy2026, lopopolo2026, zhou2026externalization); capability security (miller2003); software supply-chain (williams2025, xia2023empirical); skill systems — Claude Code, OpenAI Codex, OpenHands, Cline, Windsurf, OpenCode; research — [HASP](hasp.md) (liu2026harnessing), FlowEvo, [SkillOS](skillos.md) (ouyang2026), SkillWeaver, SkillClaw.\n\n**Validation & code — two findings (verified 2026-06-23).**\n- **No code repo, no concrete validation logic/flow/code.** This is a blueprint, not an implementation: the arXiv abs page has no GitHub / artifact / data-availability statement (checked). The \"validation gate\" inside the Co-Evolution Loop is left at the *responsibility* level — delegated to the **Verifiable Skill Contract** pattern (a separate verifier emitting passed/failed/inconclusive/verifier-error via boundary / trajectory / replay checks), which the paper self-labels **\"more research-informed than practitioner-mature.\"** Assertions/thresholds/scoring/merge-criteria are all left to implementers. The one concrete engineering takeaway is the **validation-bottleneck** tension — *\"weak validation promotes drift while strict validation slows useful updates\"* — with \"how strict\" deliberately unanswered.\n- **It validates *itself* qualitatively, not empirically.** No benchmark, no numbers, no ablation: it uses **Galster & Avgeriou's 6-step RA method** + **coverage across 8 systems** (showing existing systems fit the 10 patterns / 4 layers).\n- **Where the actual validation logic/code lives** (the cited systems, not this paper): [HASP](hasp.md) — executable validator, skill admitted only after running verifications ([arXiv:2605.17734](https://arxiv.org/abs/2605.17734)); **SkillRL** — recursive skill evolution co-evolved with policy via RL, code at [github.com/aiming-lab/SkillRL](https://github.com/aiming-lab/SkillRL); **FlowEvo** — workflows compiled to executable skills with replay tests; **Aeon** — verification-triggered changes via reviewable PRs with attached verification plans; [SkillOS](skillos.md) — frozen executor / curator split (repository-governed).\n\n**Relevance to autoharness.** This is the **architecture vocabulary for exactly what we build** — most of our invariants map onto a named pattern, which is useful for [docs/design/](../../design/index.md):\n- **Skill–Agent Co-Evolution Loop** (run evidence → validated candidate, not direct mutation) = our **never-auto-write + gate** (invariants 1, 7).\n- **Verifiable Skill Contract** (passed/failed/inconclusive) = our **zero-oracle objective gate** (invariant 7).\n- **Skill Eligibility Gate** (applicability/trust/provenance before selectability) = **applicability** (invariant 6).\n- **Skill–Execution Authority Separation + Runtime Action Control** = our security chokepoints / least-privilege.\n- **Runtime Skill-BOM** = the provenance/evidence trail behind our attribution→lever.\n- The **harnessing vs management split** directly frames our new `docs/design/management.md` (lifecycle) vs the run-scoped maintenance loop, and **Runtime Skill Repair** (same-run, artefact unchanged) is *not* us — we persist maintenance, so it's a clean boundary to state."}, {"id": "sources/papers/skill-mas.md", "layer": "sources", "subtype": "papers", "title": "[论文] Skill-MAS: Evolving Meta-Skill for Automatic Multi-Agent Systems", "status": "", "summary": "Lin (HKUST-GZ), Yang (Ant Group), Qin (HKUST-GZ, corr.) — \"Skill-MAS: Evolving Meta-Skill for Automatic Multi-Agent Systems\" (arXiv:2606.18837, 2026-06). Code: linhh29/Skill_MAS.", "body": "# [论文] Skill-MAS: Evolving Meta-Skill for Automatic Multi-Agent Systems\n\n**Lin (HKUST-GZ), Yang (Ant Group), Qin (HKUST-GZ, corr.)** — \"Skill-MAS: Evolving Meta-Skill for Automatic Multi-Agent Systems\" ([arXiv:2606.18837](https://arxiv.org/abs/2606.18837), 2026-06). Code: [linhh29/Skill_MAS](https://github.com/linhh29/Skill_MAS).\n\nProblem: automatic multi-agent systems trade off capability vs. experience retention — inference-time methods use strong frozen LLMs but can't learn from past runs; training-time methods learn but are capped at small models. Skill-MAS is a third path: **decouple experience retention from parametric updates** by treating orchestration capability as an evolvable **Meta-Skill** (NL documentation spanning task decomposition, agent engineering, workflow orchestration).\n\nOptimization loop:\n- **Multi-Trajectory Rollout** — K independent trajectories per task turn single outcomes into distributional statistics (uncertainty + difficulty), separating capability from execution noise.\n- **Selective Reflection** — prioritize volatile/hard tasks (joint score + elbow truncation), then hierarchical contrastive analysis (within-task → cross-task) to distill strategy-level principles. Best validation-scoring skill picked for test.\n\nResults: 4 benchmarks (DeepResearchBench, HLE-Math, BrowseComp-Plus, VitaBench) × 4 LLMs; beats inference-time and training-time baselines by a large margin (one exception) at a better cost-performance point. Evolved Meta-Skills transfer across unseen tasks and across LLMs.\n\n**Relevance to autoharness:** lifts the skill-as-trainable-state paradigm from the sub-agent to the **meta-agent orchestration** level, with a held-out validation gate — same selection discipline as [SkillOpt](skillopt.md). The orchestration layer is itself harness-shaped."}, {"id": "sources/papers/skilladaptor.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillAdaptor: Self-Adapting Skills for LLM Agents from Trajectories", "status": "", "summary": "Yu, Xie, Yao, Wang, Liang, Qi, Deng — \"SkillAdaptor: Self-Adapting Skills for LLM Agents from Trajectories\" (arXiv:2606.01311, 2026-05). Code (planned): zjunlp/SkillAdaptor.", "body": "# [论文] SkillAdaptor: Self-Adapting Skills for LLM Agents from Trajectories\n\n**Yu, Xie, Yao, Wang, Liang, Qi, Deng** — \"SkillAdaptor: Self-Adapting Skills for LLM Agents from Trajectories\" ([arXiv:2606.01311](https://arxiv.org/abs/2606.01311), 2026-05). Code (planned): [zjunlp/SkillAdaptor](https://github.com/zjunlp/SkillAdaptor).\n\nProblem: training-free skill adaptation that updates from **full trajectories or session-level feedback** localizes failure imprecisely and yields \"unstable or overly broad revisions.\" SkillAdaptor is **step-level** with explicit failure attribution, plugging into \"OpenClaw-class agent harnesses.\" For a failed trajectory it: identifies the first actionable fault step → links responsibility to candidate skills → applies targeted updates under explicit **acceptance checks** → keeps the backbone frozen.\n\nResults: WebShop, PinchBench, Claw-Eval with Kimi-K2.5 / GLM-5 / GPT-5.2 — beats no-skill and skill-adaptation baselines on all three (e.g. +1.8 Claw-Eval, +1.7 WebShop success, +1.5 PinchBench). Argues step-level attribution gives **more stable and auditable** weight-free maintenance.\n\n**Relevance to autoharness:** the failure-attribution granularity question — *which* step/skill/harness layer caused the failure — mirrors [HarnessFix](harnessfix.md). Step-level + acceptance-gated is the precise-edit discipline autoharness needs to avoid broad, regressive rewrites."}, {"id": "sources/papers/skilldag.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillDAG: Self-Evolving Typed Skill Graphs for LLM Skill Selection at Scale", "status": "", "summary": "Bai, Wan, Zhou, Yu, Zhao, You, Tsang — \"SkillDAG: Self-Evolving Typed Skill Graphs for LLM Skill Selection at Scale\" (arXiv:2606.03056, 2026-06, 19pp). Code: Ericbai06/SkillDAG.", "body": "# [论文] SkillDAG: Self-Evolving Typed Skill Graphs for LLM Skill Selection at Scale\n\n**Bai, Wan, Zhou, Yu, Zhao, You, Tsang** — \"SkillDAG: Self-Evolving Typed Skill Graphs for LLM Skill Selection at Scale\" ([arXiv:2606.03056](https://arxiv.org/abs/2606.03056), 2026-06, 19pp). Code: [Ericbai06/SkillDAG](https://github.com/Ericbai06/SkillDAG).\n\nProblem: with large skill libraries, picking the right subset is a **structural** problem, not similarity matching — skills \"depend on, conflict with, specialize, or duplicate one another,\" structure hidden from both full enumeration and embedding similarity. SkillDAG encodes inter-skill relations as a **typed directed graph** the agent queries at inference time as a structural retrieval interface; it is \"queried and evolved during execution,\" not fixed in a pipeline. Each search returns vector matches + typed-edge neighbors + **conflict signals**; a **propose-then-commit protocol** lets the agent add execution-backed edges, so structure accumulates across episodes.\n\nResults: ALFWorld + SkillsBench with MiniMax-M2.7 — 67.1% success / 27.3% reward, +12.8 / +8.6 over the strongest Graph-of-Skills baseline; transfers to gpt-5.2-codex; intrinsic Ret@K 65.5 → 78.2. Gains hold as the pool scales 10× (fixed pipelines degrade) via \"set-monotone online edits.\"\n\n**Relevance to autoharness:** the **conflict-aware, self-evolving** structure is what a maturing harness needs once skills/rules multiply — explicit conflict edges are a guardrail against contradictory harness rules. Selection-layer peer to the editing-layer optimizers."}, {"id": "sources/papers/skillevolver.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillEvolver: A Meta-Skill for Online Skill Learning from Failures in Agent Self-Evolution", "status": "", "summary": "Zhang, Zhu, Zhou, Jia, Wang — \"SkillEvolver: A Meta-Skill for Online Skill Learning from Failures in Agent Self-Evolution\" (arXiv:2605.10500, 2026-05).", "body": "# [论文] SkillEvolver: A Meta-Skill for Online Skill Learning from Failures in Agent Self-Evolution\n\n**Zhang, Zhu, Zhou, Jia, Wang** — \"SkillEvolver: A Meta-Skill for Online Skill Learning from Failures in Agent Self-Evolution\" ([arXiv:2605.10500](https://arxiv.org/abs/2605.10500), 2026-05).\n\nProblem: agent skills are static artifacts — \"authored once… consumed unchanged, with no mechanism to improve from real use.\" SkillEvolver is a lightweight, plug-and-play **meta-skill** that repeatedly authors, deploys, and refines domain skills.\n\nDistinguishing choices:\n- Learning target is the skill's **prose and code, not weights** — output works in any agent, no retraining.\n- The meta-skill is itself just a skill, loadable by any protocol-compliant CLI-agent.\n- Unlike trace-distillation, refinement happens **only after deployment**, learning from failures a *different* agent hits while using the skill.\n- A **fresh-agent overfit audit** detects leakage and deployment-specific failures, including a **silent-bypass mode** (skill looks valid but is never actually invoked).\n\nResults: 83 SkillsBench tasks across 15+ domains — 56.8% vs. 43.6% (curated human skills) vs. 29.9% (no-skill). KernelBench GPU-kernel: mean speedup 1.16 → 1.51.\n\n**Relevance to autoharness:** closest sibling to the harness wedge — post-deployment, failure-driven, weight-free, with an explicit **overfit/silent-bypass audit**. The silent-bypass check is a guardrail autoharness should adopt: an edit that is never exercised is not an improvement."}, {"id": "sources/papers/skillgen.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillGen: Verified Inference-Time Agent Skill Synthesis", "status": "", "summary": "(authors not captured) — arXiv:2605.10999 · 2026-05 · code: yccm/SkillGen (~10★).", "body": "# [论文] SkillGen: Verified Inference-Time Agent Skill Synthesis\n\n**(authors not captured)** — [arXiv:2605.10999](https://arxiv.org/abs/2605.10999) · 2026-05 · code: [yccm/SkillGen](https://github.com/yccm/SkillGen) (~10★).\n\nKey idea: model skills as **interventions** for causal verification — compare the same instances with and without the skill, counting both repairs **and** regressions. Contrastive induction over success + fail trajectories.\n\n**Relevance to autoharness:** the intervention framing is the right way to answer \"is the *net* effect of this change positive?\" rather than \"how many failures did it fix?\" — the repair-vs-regression accounting autoharness's gate needs."}, {"id": "sources/papers/skillgraph.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillGraph: Skill-Augmented Reinforcement Learning for Agents via Evolving Skill Graphs", "status": "", "summary": "Xiaoyuan Li, Moxin Li, Keqin Bao, Yubo Ma, Wenjie Wang, Dayiheng Liu, Fuli Feng (USTC / Alibaba / NUS) — arXiv:2605.12039, 2026-05-12. ⚠️ distinct from SkillDAG and SkillOps (name collision).", "body": "# [论文] SkillGraph: Skill-Augmented Reinforcement Learning for Agents via Evolving Skill Graphs\n\n**Xiaoyuan Li, Moxin Li, Keqin Bao, Yubo Ma, Wenjie Wang, Dayiheng Liu, Fuli Feng (USTC / Alibaba / NUS)** — [arXiv:2605.12039](https://arxiv.org/abs/2605.12039), 2026-05-12. ⚠️ distinct from SkillDAG and SkillOps (name collision).\n\nSkills as nodes in a directed graph with typed edges **prerequisite / enhancement / co-occurrence**; a task retrieves an **ordered skill subgraph** (not single skills). Three stages: graph construction (distill skills + typed relations from traces), graph-aware retrieval (seed → expand along edges → topological order → dependency-ordered sequence), graph evolution (node: insert/merge/split/deprecate; edge: reinforce/discover/prune; progressive unlocking). The graph **co-evolves with the agent policy via RL (GRPO)** — closed loop: richer trajectories → better graph → better retrieval → stronger policy. ALFWorld / WebShop / 7 search-augmented QA; SOTA vs memory-augmented RL, large gains on compositional tasks. Most related: SkillRL (elevates a flat skill bank into a typed dependency graph).\n\n**Relevance to autoharness:** hybrid — its **graph lifecycle ops (merge / split / deprecate / prune)** are borrowable management vocabulary; the **RL policy co-evolution (GRPO) is evolution we do not take**. No conflict edge."}, {"id": "sources/papers/skillharness.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillHarness: Harnessing Safe Skills for Computer-Use Agents", "status": "", "summary": "Yurun Chen, Biao Yi, Keting Yin, Shengyu Zhang — arXiv:2606.20636 · 2026-06-02.", "body": "# [论文] SkillHarness: Harnessing Safe Skills for Computer-Use Agents\n\n**Yurun Chen, Biao Yi, Keting Yin, Shengyu Zhang** — [arXiv:2606.20636](https://arxiv.org/abs/2606.20636) · 2026-06-02.\n\nThe literal name collision (and the closer one). Targets **computer-use agents (CUAs)**: prior skill learning assumes static/safe environments, so it inherits risky behavior from raw trajectories and breaks under pop-ups / DOM drift.\n\n**Method.** Skill library decoupled into **macro skills** (high-level intent + success patterns + failure lessons + **risk guards** + links) and **micro skills** (parameterized code grounded in current state). The **skill boundary** is induced from three signals — successful trajectories, failure cases, identified risks — so a skill carries *the conditions under which its pattern stays reliable*, not just the executable pattern. Acquisition is **task-free exploration**: a goal proposer fills capability-cluster gaps, an evolution policy does **sparse, evidence-gated** updates. **Safety = risk guards**: policy-derived state constraints that must hold before a micro skill activates; planner suppresses micro skills on state drift and falls back to LLM planning; an **adaptive bypass disables template replay after repeated failures**.\n\n**Numbers.** Unsafe rate of learned skills −57.1%; utilization safety +31.9% avg; SR +19% avg. USR 2.2% vs SkillWeaver 43.6% vs ASI 75.0%. WASP: SR 85.0 / ASR 2.5 (default SR 56.4). **Ablation: removing the skill boundary causes the largest ASR jump (+9.6); removing micro skills changes nothing** — the boundary, not the code, carries the safety. Benchmarks: ST-WebAgentBench, WASP, OS-Harm, OpenApps; GPT-5.4 family + Qwen3.6 / OpenCUA / MAI-UI.\n\n**Referenced directions (Related Work).**\n- **A. Skill learning** — [Voyager](voyager.md); ASI, SkillWeaver, Polyskill (code/trajectory skills for CUAs); SkillRL (Xia 2026), Wang 2025a (RL self-improving library). Skill-safety: \"Agent Skills in the Wild\" (Liu 2026), \"When skills lie\" / hidden-comment injection (Wang 2026).\n- **B. Harness engineering** — Harness-Engineering survey (Lopopolo 2026); prompt eng. (Sahoo 2024); context eng. — Agentic Context Engineering (Zhang 2025), HarmonyGuard (Chen 2025); Agent Workflow Memory (Wang 2024). Intro also: Cascade, CUA-Skill, Mirage-1; human-skill theory (Dreyfus & Dreyfus, Fitts & Posner).\n\n**Relevance to autoharness.** Strong corroboration on our spine, opposite on auto-write:\n- \"**Stable, curated accumulation rather than maximal growth**\" + sparse evidence-gated updates = direct external echo of our **maintain-not-grow** (invariant 2) and **every-change-passes-a-gate** (invariant 7).\n- **Risk guards = activation only when state constraints hold** = the executable form of our **applicability gate** (invariant 6 — without applicability it's a candidate, not a verdict) and fail-safe planning (invariant 9).\n- **Skill boundary from success+failure+risk; ablating it hurts most** = evidence that the *boundary/condition* is the load-bearing artifact, not the instruction text — matches \"objective signal is the spine\" (invariant 3).\n- **Adaptive bypass after repeated failures** ≈ our exploration budget / anti-collapse (invariant 8).\n- **Contrast:** it **auto-learns/auto-writes** skills from task-free exploration (heavily gated) — opposite to our **never-auto-write / human-adoption-as-grounding** (invariant 1); and its domain is GUI/OS state, not our text-harness layer."}, {"id": "sources/papers/skillhone.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillHone: A Harness for Continual Agent Skill Evolution Through Persistent Decision History", "status": "", "summary": "Zhiwei Li, Yong Hu (WeChat AI / Tencent Inc.; work done during intern at WeChat AI) — \"SkillHone: A Harness for Continual Agent Skill Evolution Through Persistent Decision History\" (arXiv:2606.08671, 2026-06). No public code — abstract/page carry no code-availability statement, n", "body": "# [论文] SkillHone: A Harness for Continual Agent Skill Evolution Through Persistent Decision History\n\n**Zhiwei Li, Yong Hu (WeChat AI / Tencent Inc.; work done during intern at WeChat AI)** — \"SkillHone: A Harness for Continual Agent Skill Evolution Through Persistent Decision History\" ([arXiv:2606.08671](https://arxiv.org/abs/2606.08671), 2026-06). **No public code** — abstract/page carry no code-availability statement, no GitHub/project-page link found (as of 2026-06-22); joins HarnessFix / Self-Harness in the paper-but-no-code bucket.\n\nProblem: existing approaches improve skills only within bounded runs and \"retain only the final artifact, discarding the decision history\" — so future agents can't see earlier revisions, evaluations, or rejected options. SkillHone is a **harness** anchored in persistent decision history:\n- Couples skill revisions with evaluation-side evidence that supplies practice feedback.\n- Records structured logs of diagnoses, revisions, evidence, and outcomes.\n- **Role-separated subagents** test candidates on practice probes with **redacted reporting** and propose revisions informed by past decisions.\n- Enables cross-session refinement without rediscovering past rationale.\n\nResults: deep-research benchmarks in a raw open-web setting (no integrated search stack), Qwen3.6-35B-A3B backbone — **+15.8 on GAIA**, +3.2 on WebWalkerQA-EN; also beats prior skill-evolution methods.\n\n**Relevance to autoharness:** the most direct harness-engineering peer in this collection — treats the **harness itself as the locus of improvement** and persists *process* (including rejected alternatives), not just the final skill. Role separation + redacted feedback are concrete guardrail patterns; persisting rejected options is exactly the audit trail autoharness's rollback story needs."}, {"id": "sources/papers/skilllens.md", "layer": "sources", "subtype": "papers", "title": "[论文] From Raw Experience to Skill Consumption (SkillLens)", "status": "", "summary": "(authors not captured) — arXiv:2605.23899 · 2026-05 · no public code.", "body": "# [论文] From Raw Experience to Skill Consumption (SkillLens)\n\n**(authors not captured)** — [arXiv:2605.23899](https://arxiv.org/abs/2605.23899) · 2026-05 · no public code.\n\nFull-lifecycle study of model-generated skills. Findings: skills are beneficial on average but show **non-trivial negative transfer**; a strong extractor can be a weak consumer; utility is independent of model scale. Source of the widely-cited **\"LLM self-eval ≈ 46.4% accuracy\"** warning.\n\n**Relevance to autoharness:** the empirical case for gating — negative transfer is real, so additions must be net-improvement-tested, and self-eval-only signals (the right end of the [validation-signal spectrum](../../synthesis/offline-validation.md)) are noisy enough to need guardrails."}, {"id": "sources/papers/skillmd-mining.md", "layer": "sources", "subtype": "papers", "title": "[论文] Automating SKILL.md Generation for Computer-Using Agents via Interaction Trajectory Mining", "status": "", "summary": "Yuexing Hao (MIT), Xiaomin Li (Harvard) — arXiv:2606.20363 · 2026-06.", "body": "# [论文] Automating SKILL.md Generation for Computer-Using Agents via Interaction Trajectory Mining\n\n**Yuexing Hao (MIT), Xiaomin Li (Harvard)** — [arXiv:2606.20363](https://arxiv.org/abs/2606.20363) · 2026-06.\n\nQuestion: hand-written skill files are a bottleneck (must be named, scoped, documented, kept in sync as interfaces change). Can a `SKILL.md` library be **mined from interaction trajectories** in a way that actually improves the downstream policy? **A diagnostic study — the headline answer is \"not yet.\"**\n\nMethod — three-stage pipeline:\n1. **Segmentation:** cut GUI trajectories at change-points where adjacent-action Euclidean distance exceeds a threshold (tuned on held-out data to maximize boundary F1).\n2. **Library construction:** each segment → a length-invariant **bag-of-actions summary** (mean/variance, *order discarded*) → Wasserstein (Bures) agglomerative clustering (k=8–16) → supervised-contrastive MLP refinement.\n3. **Skill-aware GRPO:** Qwen3-8B trained with GRPO, scored by an **offline learned reward model** (trained on pairwise preferences, *not* on live task-success labels).\n\nKey results — **readability ≠ transfer**:\n- Clusters are readable on the source benchmark (InteraSkill Workflows): 5/8 clusters ≥0.95 purity.\n- But GRPO lifts IW skill-step accuracy only 18.5%→20.5%, leaves BrowseComp+ flat (43.5%→43.3%), and **drops** WebArena (55.8%→44.2%).\n- A trivial **frequency prior beats** the learned MLP/GRPO policies (34.9% on IW); exact-sequence match is 0%.\n\nFour named failure causes: boundary detector **over-splits** (high recall, low precision); **orderless representation** discards the sequence that makes GUI skills executable (select-before-copy); the **reward model is a proxy** (ranks skill-flow similarity, not cross-domain success); the threshold is **not domain-stable** (IW→WebArena boundary F1 = 0.119).\n\n**Relevance to autoharness:** the most useful *negative* result in the corpus — a direct cautionary tale on autoharness's own premise (mine trajectories → skill files). Three load-bearing warnings: (1) **inspectability is not improvement** — clean, high-purity mined skills can still fail to transfer, so a harness edit must gate on *net task improvement*, never on how readable the artifact looks (reinforces the [operational definition](../../synthesis/offline-validation.md)); (2) **order matters** — any trace→skill representation that throws away sequence loses what makes a skill executable; (3) **offline proxy rewards underperform trivial priors** — a learned scorer not anchored to task success is worse than counting frequencies, hardening the case for structural / replay-based gating over a trained reward model."}, {"id": "sources/papers/skillopt.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillOpt: Executive Strategy for Self-Evolving Agent Skills", "status": "", "summary": "Microsoft — arXiv:2605.23904 · 2026-05 · code: microsoft/SkillOpt (~5,640★). See also the SkillOpt-Sleep bootstrap-validation plugin.", "body": "# [论文] SkillOpt: Executive Strategy for Self-Evolving Agent Skills\n\n**Microsoft** — [arXiv:2605.23904](https://arxiv.org/abs/2605.23904) · 2026-05 · code: [microsoft/SkillOpt](https://github.com/microsoft/SkillOpt) (~5,640★). See also the [SkillOpt-Sleep](../github/microsoft-skillopt-sleep.md) bootstrap-validation plugin.\n\nFirst systematic controllable **text-space optimizer**. An optimizer model turns scored rollouts into bounded add/delete/replace edits on one skill doc; an edit is accepted only if it **strictly improves a held-out validation score**. Textual learning-rate budget + rejected-edit buffer + slow/meta update.\n\nBest or tied on all 52 (model × benchmark × harness) cells; GPT-5.5 +23.5/+24.8/+19.1 pts (chat / Codex / Claude Code); skills transfer across model scales and harnesses; zero inference-time overhead.\n\n**Relevance to autoharness:** the canonical **held-out-gate** discipline and the engineering skeleton autoharness builds on. \"Gradient descent in symbol space\": rollout = forward, reflection = backward, held-out gate = validation (cf. the [symbolic-learning thesis](../blogs/symbolic-learning-renaissance.md))."}, {"id": "sources/papers/skillos.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillOS: Learning Skill Curation for Self-Evolving Agents", "status": "", "summary": "(authors not captured) — arXiv:2605.06614 · 2026-05 · no public code.", "body": "# [论文] SkillOS: Learning Skill Curation for Self-Evolving Agents\n\n**(authors not captured)** — [arXiv:2605.06614](https://arxiv.org/abs/2605.06614) · 2026-05 · no public code.\n\nTreats **curation** — not creation — as the learned function for a self-evolving agent's skill set.\n\n**Relevance to autoharness:** reinforces the **maintain-not-grow** invariant: the scarce capability is curating (dedup / compress / retire) the symbol set, not generating more of it."}, {"id": "sources/papers/skillreducer.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillReducer: Optimizing LLM Agent Skills for Token Efficiency", "status": "", "summary": "Yudong Gao, Zongjie Li, … Pingchuan Ma, Shuai Wang — arXiv:2603.29919 · 2026-03 · cs.SE.", "body": "# [论文] SkillReducer: Optimizing LLM Agent Skills for Token Efficiency\n\n**Yudong Gao, Zongjie Li, … Pingchuan Ma, Shuai Wang** — [arXiv:2603.29919](https://arxiv.org/abs/2603.29919) · 2026-03 · cs.SE.\n\nToken-efficiency optimizer for skills, built on a **large empirical study of 55,315 public skills**: **26.4% have no routing description at all**, and **>60% of body content is non-actionable**. Two stages: (1) **routing layer** — compress over-long descriptions and synthesize missing ones via \"adversarial delta debugging\"; (2) **body** — taxonomy-driven split of core actionable rules from on-demand supplements (**progressive disclosure**), with faithfulness checks + self-correcting loop. Results: 48% description / 39% body compression, **+2.8% functional quality**, cross-model transfer retention **0.965**.\n\n**Relevance to autoharness:** the **routing description IS the trigger burden** — and a quarter of real skills ship without one, structurally guaranteeing they can't be recalled. Quantifies, at corpus scale, the description-hygiene lever behind skill recall, and validates the two-stage (index vs body) load model. The compression/dedup angle pairs with [Agent-Skills-data](agent-skills-data.md). (Abstract headlines compression, not a trigger-recall number; a practitioner write-up attributes a CLI-based binary trigger detector to its eval — **unverified from the abstract**, do not cite as a recall metric.) Feeds [synthesis/skill-recall-execution](../../synthesis/skill-recall-execution.md)."}, {"id": "sources/papers/skillwiki.md", "layer": "sources", "subtype": "papers", "title": "[论文] SkillWiki: A Living Knowledge Infrastructure for Agent Skills", "status": "", "summary": "Huang, Ding, Liu, … Yu, Sui (11 authors) — \"SkillWiki: A Living Knowledge Infrastructure for Agent Skills\" (arXiv:2606.16523, 2026-06). Demo + code: Huangdingcheng/SkillWiki.", "body": "# [论文] SkillWiki: A Living Knowledge Infrastructure for Agent Skills\n\n**Huang, Ding, Liu, … Yu, Sui (11 authors)** — \"SkillWiki: A Living Knowledge Infrastructure for Agent Skills\" ([arXiv:2606.16523](https://arxiv.org/abs/2606.16523), 2026-06). Demo + code: [Huangdingcheng/SkillWiki](https://github.com/Huangdingcheng/SkillWiki).\n\nPremise: Wikipedia manages knowledge, GitHub manages software, but agent skills \"still lack an infrastructure for large-scale production, governance, and evolution.\"\n\nMechanism: convert heterogeneous knowledge into reusable skill assets while preserving links back to originating evidence (**provenance-aware grounding**). Covers the full lifecycle — knowledge ingestion → skill production → provenance-aware exploration → governance → execution-driven evolution. Delivered as a demonstration system, not a benchmark study.\n\nVision: knowledge, skills, and execution experience co-evolve in one shared infrastructure.\n\n**Relevance to autoharness:** the *governance + provenance* angle — every skill/harness edit traceable to its evidence — aligns with autoharness's audit/gate/rollback wedge. Infrastructure peer rather than an optimizer."}, {"id": "sources/papers/socratic-swe.md", "layer": "sources", "subtype": "papers", "title": "[论文] Socratic-SWE: Self-Evolving Coding Agents via Trace-Derived Agent Skills", "status": "", "summary": "Xiao, Jiao, Wang, Wang, Zhao, Wei, Zhang, Qu — \"Socratic-SWE: Self-Evolving Coding Agents via Trace-Derived Agent Skills\" (arXiv:2606.07412, 2026-06).", "body": "# [论文] Socratic-SWE: Self-Evolving Coding Agents via Trace-Derived Agent Skills\n\n**Xiao, Jiao, Wang, Wang, Zhao, Wei, Zhang, Qu** — \"Socratic-SWE: Self-Evolving Coding Agents via Trace-Derived Agent Skills\" ([arXiv:2606.07412](https://arxiv.org/abs/2606.07412), 2026-06).\n\nProblem: training SWE agents is bottlenecked by scarce high-quality tasks; fixed mutation / bug-injection synthesis produces task distributions disconnected from the agent's actual weaknesses. Socratic-SWE is a closed loop that recycles the agent's own solving **traces** as training signal — distilling them into structured agent skills that capture recurring failures and repair patterns, then using those skills to **generate targeted repair tasks in real repos**.\n\nLoop: candidate tasks pass execution-based validation → scored by a **solver-gradient alignment reward** (keep tasks both verifiable and useful) → updated solver generates new traces → curriculum adapts each round.\n\nResults: SWE-bench Verified/Lite/Pro, Terminal-Bench 2.0 — consistently beats self-evolving baselines at equal compute; **50.40% on SWE-bench Verified after three iterations**.\n\n**Relevance to autoharness:** demonstrates traces as \"a scalable substrate for self-evolving agents\" — the same trajectory-bootstrapping premise, applied to curriculum rather than harness. The solver-gradient-alignment filter (keep only *useful* derived artifacts) is a selection idea worth porting."}, {"id": "sources/papers/stitch.md", "layer": "sources", "subtype": "papers", "title": "[论文] STITCH: Automatic, Expressive, and Scalable Fuzzing with Stitching", "status": "", "summary": "(authors not captured) — arXiv:2602.18689 · 2026-02 · no public code.", "body": "# [论文] STITCH: Automatic, Expressive, and Scalable Fuzzing with Stitching\n\n**(authors not captured)** — [arXiv:2602.18689](https://arxiv.org/abs/2602.18689) · 2026-02 · no public code.\n\n> Adjacent reference (fuzz-driver harness).\n\nRuntime-assembled API \"blocks\" instead of synthesis-time fixed sequences; **70% precision vs 12% next-best**; 131 new bugs across 102 projects.\n\n**Relevance to autoharness:** runtime assembly over fixed-at-build sequences rhymes with state-grounded retrieval ([SGDR](sgdr-web-agents.md)) — bind behavior to the runtime situation, not the initial plan."}, {"id": "sources/papers/textgrad.md", "layer": "sources", "subtype": "papers", "title": "[论文] TextGrad: Automatic \"Differentiation\" via Text", "status": "", "summary": "Yuksekgonul, Bianchi, Boen, Liu, Huang, Guestrin, Zou (Stanford) — arXiv:2406.07496 · 2024.", "body": "# [论文] TextGrad: Automatic \"Differentiation\" via Text\n\n**Yuksekgonul, Bianchi, Boen, Liu, Huang, Guestrin, Zou (Stanford)** — [arXiv:2406.07496](https://arxiv.org/abs/2406.07496) · 2024.\n\nBackpropagates **natural-language \"gradients\"** (textual feedback) through a compound LLM system to optimize its components.\n\n**Relevance to autoharness:** makes the \"gradient descent in symbol space\" analogy concrete — textual feedback as the backward signal, the mechanism SkillOpt later operationalizes with a held-out gate."}, {"id": "sources/papers/tmem.md", "layer": "sources", "subtype": "papers", "title": "[论文] Scaling Self-Evolving Agents via Parametric Memory (TMEM)", "status": "", "summary": "(authors not captured) — arXiv:2606.04536 · 2026-06 · no public code.", "body": "# [论文] Scaling Self-Evolving Agents via Parametric Memory (TMEM)\n\n**(authors not captured)** — [arXiv:2606.04536](https://arxiv.org/abs/2606.04536) · 2026-06 · no public code.\n\nDistills supervision into fast **LoRA weights online** — parametric memory rather than a text artifact.\n\n**Relevance to autoharness:** the **counter-example** to the weight-free thesis. Where the symbolic-learning line learns the *document*, TMEM learns the *weights* — useful as the contrast that sharpens autoharness's \"learn the symbol layer, stay model-portable\" stance."}, {"id": "sources/papers/trace2skill.md", "layer": "sources", "subtype": "papers", "title": "[论文] Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills", "status": "", "summary": "Jingwei Ni et al. (Alibaba Qwen + ETH Zürich / Univ. Zurich / Peking / Zhejiang) — arXiv:2603.25158, 2026-03 (v5 2026-06-04). code: Qwen-Applications/Trace2Skill (~123★; 4–5 community re-implementations).", "body": "# [论文] Trace2Skill: Distill Trajectory-Local Lessons into Transferable Agent Skills\n\n**Jingwei Ni et al. (Alibaba Qwen + ETH Zürich / Univ. Zurich / Peking / Zhejiang)** — [arXiv:2603.25158](https://arxiv.org/abs/2603.25158), 2026-03 (v5 2026-06-04). code: [Qwen-Applications/Trace2Skill](https://github.com/Qwen-Applications/Trace2Skill) (~123★; 4–5 community re-implementations).\n\n**Skill creation/deepening** (the 沉淀/intake side, not management). Three-stage pipeline: (1) roll out a frozen agent → labeled success + failure trajectories; (2) propose trajectory-level skill **patches in parallel** with separate error & success analysts (Addition: new pattern from a success / new warning from an error; Edition: deepen an existing rule); (3) hierarchically **merge** all patches into one portable skill. Key claim: **parallel consolidation > sequential online editing** — sequential editing fragments knowledge across the collection and makes later skills depend on update order. Qwen3.5-35B-derived skills lift a 122B agent **+57.65pp on WikiTableQuestions**; beats ReasoningBank-style episodic retrieval; portable across model scales/families and OOD, with no parameter updates or test-time retrieval.\n\n**Relevance to autoharness:** the **沉淀 (intake)** reference — \"parallel merge of patches beats sequential edits\" supports batch maintenance over per-trace online editing. This is the *creation* side; relations / conflict / dedup are downstream management."}, {"id": "sources/papers/voyager.md", "layer": "sources", "subtype": "papers", "title": "[论文] Voyager: An Open-Ended Embodied Agent with Large Language Models", "status": "", "summary": "Wang, Xie, Jiang et al. (NVIDIA / Caltech / others) — arXiv:2305.16291 · 2023.", "body": "# [论文] Voyager: An Open-Ended Embodied Agent with Large Language Models\n\n**Wang, Xie, Jiang et al. (NVIDIA / Caltech / others)** — [arXiv:2305.16291](https://arxiv.org/abs/2305.16291) · 2023.\n\nThe foundational **executable skill library**: an LLM agent in Minecraft that writes, stores, and reuses code skills, growing a self-extending library through environment feedback.\n\n**Relevance to autoharness:** the origin point of \"skill = reusable code artifact grown from experience\" — the lineage the [symbolic-learning thesis](../blogs/symbolic-learning-renaissance.md) traces forward to AutoHarness and SkillOpt."}, {"id": "sources/papers/what-makes-a-harness.md", "layer": "sources", "subtype": "papers", "title": "[论文] What Makes a Harness a Harness: Necessary and Sufficient Conditions for an Agent Harness", "status": "", "summary": "(authors not captured) — arXiv:2606.10106 · 2026-06 · no public code.", "body": "# [论文] What Makes a Harness a Harness: Necessary and Sufficient Conditions for an Agent Harness\n\n**(authors not captured)** — [arXiv:2606.10106](https://arxiv.org/abs/2606.10106) · 2026-06 · no public code.\n\nAn operational, necessary/sufficient **definition** of \"agent harness\", with an inclusion/exclusion test against framework / SDK / orchestrator / eval-harness.\n\n**Relevance to autoharness:** the vocabulary citation for the design docs — pins down what counts as the harness layer autoharness operates on, separating it from neighboring infrastructure."}, {"id": "synthesis/offline-validation.md", "layer": "synthesis", "subtype": "", "title": "方向：离线评测验证 harness 更改（裁决轴 · 重）", "status": "", "summary": "这一族都是 skill / harness 自进化系统——目的都是让符号层一轮轮 update 越改越好；验证只是其中给进化把关的一环。一次 harness 编辑\"算不算变好\"，靠什么裁决？本大类的共性：为验证一个 update 是否正确，要在一个评测集上离线跑一批实验、与 agent 主运行异步——不是边跑边学、零额外重跑，而是专门起一轮实验来打分。这是 autoharness 的裁决轴，与入料口（料从哪来）、编辑把关（准入机制）正交：同样取历史 trace，入料口把它当候选来源（决定「提出什么」）、本方向把它当验证集/标尺（决定「接不接受」），生成某", "body": "# 方向：离线评测验证 harness 更改（裁决轴 · 重）\n\n这一族都是 **skill / harness 自进化**系统——目的都是让符号层一轮轮 update 越改越好；验证只是其中给进化把关的一环。一次 harness 编辑\"算不算变好\"，靠什么裁决？本大类的共性：为验证一个 update 是否正确，要在一个**评测集上离线跑一批实验**、与 agent 主运行**异步**——不是边跑边学、零额外重跑，而是专门起一轮实验来打分。这是 autoharness 的**裁决**轴，与[入料口](trace-to-experience.md)（料从哪来）、编辑把关（准入机制）正交：同样取历史 trace，[入料口](trace-to-experience.md)把它当**候选来源**（决定「提出什么」）、本方向把它当**验证集/标尺**（决定「接不接受」），生成某候选的 trace 不得用来验证它。\n\n按**评测集从哪来**分两子类：① 来自已有外部标注 benchmark；② 从自有历史 trace 自举。两者共担\"实验开销重\"，区别只在真值**外借还是自造**——也因此分别暴露于**外部依赖**与**自评偏差**。\n\n两表均加一列 **skill 改动思路**（驱动信号 → 改动形态）。它是[入料口/提出轴](trace-to-experience.md)的横切指针——答「基于什么改、改成什么形态」，与本表主轴「接不接受」**正交**；列出只为对照各源共有的「skill 改进步」如何分叉（驱动信号尤其分裂：失败 / 打分 rollout / 成功-失败对照，并非都\"基于错误\"），裁决评判仍以各表的「选择·门」「我的评判」为准。\n\n## 子类①：基于已有外部 benchmark\n\n评测集是外部已标注数据集 + 可判定 oracle。autoharness 没有 benchmark，故**整体否决其依赖，只借循环骨架与机制**。\n\n| 来源 | 优化对象 | skill 改动思路（驱动信号 → 改动形态） | benchmark 咬在哪端 | 选择 / 门 | 我的评判 |\n|---|---|---|---|---|---|\n| [kayba](../sources/github/kayba-ai-autoharness.md) | harness | 黑盒产品，自动迭代 harness（机制不公开） | 裁决端（**要你提供 benchmark command**） | benchmark 跑分 | 否决：撞名竞品，但本项目无 benchmark |\n| [SkillOpt](../sources/papers/skillopt.md) | 单 skill doc（add/del/replace） | 优化器读**打分 rollout（含成功，非只失败）**→有界 add/del/replace | 裁决端（held-out 分数严格改善） | held-out 门 + 文本学习率/拒绝缓冲 | 借 held-out 门**纪律** + 编辑骨架，弃 benchmark 锚 |\n| [EvoSkill](../sources/papers/evoskill.md) | system prompt + skills（存 git branch） | 分析**失败**→造新 / 改旧 skill，物化成结构化 folder | **两端**（train 判失败 + val 选择，均需 oracle 标签） | 固定容量 **top-k** frontier（摘要称 Pareto，实为单分数） | 借失败→skill 循环 + 容量上限防膨胀，弃两端标签依赖 |\n| [Self-Harness](../sources/papers/self-harness.md) | harness（minimal edit） | 挖**模型特异**弱点（from traces）→驱动最小编辑 | **两端**锚 Terminal-Bench（失败 trace + held-out 通过率门） | 回归门（held-out pass rate） | 借 weakness-mine→minimal edit→regression-gate **骨架**，弃 benchmark 锚 |\n| [HarnessFix](../sources/papers/harnessfix.md) | harness（7 层定位修复） | 编译 trace+harness 成 IR→LLM 反向归因定位故障层→**先诊断后改** | 失败**定义**靠外部 oracle | TargetImprovement（**再诊断**，无标签←可借）+ RegressionBound（锚 oracle） | 借 step 级归因 + 再诊断-验证半，弃 oracle 失败定义 + 7 层粗粒度 |\n\n共同教训：候选生成廉价，**值钱的是发射前的自动 triage / 验证**；但它们把\"验证\"压在外部 benchmark 上，正是 autoharness 要替换掉的依赖。\n\n## 子类②：从自有 trace 自举 eval + replay（不需外部 benchmark）\n\n评测集从历史 trace（尤其失败）bootstrap，临时起 replay 真跑，拿\"净改善（修复 > 回归）\"硬信号。**autoharness 落在这条。**\n\n| 来源 | skill 改动思路（驱动信号 → 改动形态） | eval 集来源（从 trace 怎么收） | 验证怎么跑 | 判定真值 | 实验开销 | 我的评判 |\n|---|---|---|---|---|---|---|\n| [RHO](../sources/papers/rho.md) | 候选编辑从多次 re-solve 的**自洽+自验证**涌现（改 CLAUDE.md/memory/脚本） | DPP 选难度多样的过往任务 coreset | 并行 **re-solve G×** → 自洽 + 自验证 | 成对**自偏好**（均值为正才采纳） | **最重**（每候选 re-solve G×） | 采纳：唯一占 benchmark-free 角的 replay；自评偏差最高（cf. [SkillLens](../sources/papers/skilllens.md) ≈46.4%），须配探索预算 |\n| [MOSS](../sources/papers/moss.md) | **源码级**自重写——改文本层够不到的 code（路由/hooks/状态不变量） | 30min cron 扫生产会话挑\"弱块\"失败批（+ 手动 flag） | 临时 worker 上**重放失败批** | 健康探针（回滚）+ 改善度量 | 重（起临时 worker 重放） | 采纳：采集通道 + consent 换装 + 90s 健康探针回滚；勿借整源码重写 |\n| [SkillGen](../sources/papers/skillgen.md) | 对照**成功 vs 失败**轨迹诱导出技能（contrastive induction） | 成功 + 失败轨迹（对照诱导） | 同实例**带/不带技能两跑** | 同计**修复 与 回归**两侧 → 净效应 | 重（每实例 2× 跑） | 采纳：干预式净效应记账，正是 gate 要的\"是不是净正\" |\n| [SkillOpt-Sleep](../sources/github/microsoft-skillopt-sleep.md) | 承 SkillOpt 有界编辑：train 上反思 mined TaskRecords→候选 skill/memory | harvest 自有 session → mine TaskRecords（±反馈/retry 链当标签）→ train/val/test split | 每任务一个 headless `claude -p` 子进程（fresh cwd、禁 tools、候选作 **prompt text** 注入）offline replay | rule judges（regex/section/contains…）全过=1.0 / rubric judge，无人工标签 + strict-improvement 门 | 中（按 skill_hash 缓存，held-out 重评免费） | 采纳：最贴 autoharness 的工程骨架（harvest→mine→split→replay→strict gate）；caveat：测\"文本在 prompt 里\"≠\"规则作 hook 触发的 skill\"就地生效（cf. MOSS 真失败重放） |\n\n「实验开销」一列即本子类的命门：越靠纯 benchmark-free（RHO）越通用，却越要靠多跑实验压住自评偏差。\n\n## 界外 / 对照\n\n按\"离线跑实验验证 update\"这一大类边界，下列**不入本方向**：\n\n- **不跑 replay 实验**：darwin-skill 式（judge 共识 + test-prompts，judge 一致 ≠ 任务改善）。\n- **完全不跑实验的轻量替代**：结构性把关——只看结构（去重/冲突/边界）就放行，是同一问题（\"接不接受\"）的便宜答案，整族落在本大类**之外**（本大类定义即\"要跑实验\"）。但二者**组合**：先用结构门筛掉多数候选，**replay 只对过门的少数跑**，把实验开销压到可承受。\n- **要防**：[探索坍缩](../sources/papers/apex.md)（重放只验旧任务 → 留显式探索预算）；[非单调遗忘](../sources/papers/self-evolving-forget.md)（回滚 + 回归门作一等公民）。\n- **术语锚**：\"agent harness\" 由 [What Makes a Harness a Harness](../sources/papers/what-makes-a-harness.md) 钉定。\n\n## 小结\n\n**共识**：验证 update 是否正确，都要在一个评测集上**离线跑一批实验**——有 benchmark 就直接跑分（子类①），没有就从自有 trace（尤其失败）自举 eval + replay 拿净改善硬信号（子类②）。\n\n**两子类分歧**：评测集**外借 vs 自造**。外借（①）真值硬、自评偏差低，但依赖本项目没有的标注 benchmark；自造（②）零外部依赖、最通用，却最暴露于自评偏差（[SkillLens](../sources/papers/skilllens.md) 把上限按在 ≈46.4%）。\n\n**代价（整族命门）**：都重——SkillOpt/EvoSkill/Self-Harness 跑 held-out、RHO 每候选 re-solve G×、MOSS 重放失败批、SkillGen 每实例 2× 跑。实验预算极易爆，故 [探索坍缩](../sources/papers/apex.md) / [非单调遗忘](../sources/papers/self-evolving-forget.md) 的回滚 + 预算封顶在此是一等公民；与轻量结构门组合是压成本的关键。\n\n**wedge**：autoharness 取**子类②**的自举 replay，但移植**子类①**的循环骨架（weakness-mine→minimal edit→regression-gate）——把回归测试纪律套到 harness 演化：每次编辑在自有历史（尤其失败）建的 replay 集上**可验证地净改善**、且**最小/可审计/可回滚**，同时给实验预算封顶。\n\n> **重开提示**：[动态验证生命周期](../ideas/dynamic-validation-lifecycle.md) 主张验证随交互**就地发生**、历史 eval 因**环境漂移**失效，据此把本方向从「裁决轴」降为「兜底」（只在高风险、或结构 + 动态都拿不准时动用）。该卡重开此处地位，待开决策工作表。"}, {"id": "synthesis/skill-recall-execution.md", "layer": "synthesis", "subtype": "", "title": "方向：skill 的召回率与执行率", "status": "", "summary": "一个 skill「存在」不等于它「被用」。把这条链拆成可测的三段,跨来源对齐各段被谁量过、谁没量。与 trace 沉淀经验 紧邻(那条管入料,这条管出口生效)。", "body": "# 方向：skill 的召回率与执行率\n\n一个 skill「存在」不等于它「被用」。把这条链拆成可测的三段,跨来源对齐各段被谁量过、谁没量。与 [trace 沉淀经验](trace-to-experience.md) 紧邻(那条管入料,这条管出口生效)。\n\n## 三段链(必须分清,否则一切数字都含混)\n\n| 段 | 机制 | 概率 | 谁在量 |\n|---|---|---|---|\n| **① description 注入** | 启动时全部 skill 的 name+desc 进上下文当索引 | **100% 确定** | 非问题 |\n| **② 召回/触发**(正文被读 + 决定去用) | 模型据 desc 判断该不该调,才加载 body | **概率性** | ECC 自述 `~50–80%`;eval 实测 |\n| **③ 执行率**(触发后真照做) | 模型把正文内容落到行为上 | **概率性** | 几乎无人单独量 |\n\n「被使用率」指的是 **②**(条件召回 P(调用│相关)),**不是 ①**。must-always 的东西走 ② 必漏,所以 ECC 把它塞进 hook-instinct 绕开 ②——见 [hook 强制注入](../ideas/hook-forced-injection.md)。\n\n## 各来源量到了哪一段(对齐 + 我的评判)\n\n| 来源 | 量的是 | 段 | 性质 | 评判 | 结论(autoharness 据此做什么) |\n|---|---|---|---|---|---|\n| [ECC](../sources/github/affaan-m-ecc.md) | skill「fire ~50–80%」 | ② | **自述、无测量**(文档一句话,无数据) | 方向对、数字不可引 | 方向纳入;数字进 `experiments/` 自测,不写入文档 |\n| 实践 eval([来源](https://thenuancedperspective.substack.com/p/agent-skills-work-but-the-research)) | 显式提示下调用率 **仅 ~70%** | ② | 单点实测,非同行评审 | 唯一落在 50–80 区间的真数 | 暂作量级锚点,待自测复现后才敢引 |\n| [MetaTool](../sources/papers/metatool.md) | tool-usage awareness + selection,8 模型「难以正确选」 | ② 的代理 | 同行评审、**但在 tool benchmark 上,非 Claude Code** | 最硬的代理,非直接 | 坐实「召回是真问题」,但 skill 专属数仍须自测 |\n| [SkillReducer](../sources/papers/skillreducer.md) | 55,315 skill 里 **26.4% 无 routing 描述** | ② 的上界 | 大样本实证 | 描述缺失=结构性不可召回 | 描述卫生设为**准入前置闸**(无描述不予收) |\n| [Agent-Skills-data](../sources/papers/agent-skills-data.md) | 40,285 skill **intent 级冗余/同质** | ② 随 N 退化的成因 | 大样本实证 | 同质描述→路由难分→召回崩 | 结构去重/消歧列为召回**刚需**(非可选优化) |\n\n(ACL2024 [UltraTool](https://arxiv.org/abs/2401.17167) 同测 plan→select→use 全链,可补充 ② 的代理证据。)\n\n## 小结:空白与对 autoharness 的意义\n\n- **直接量「Claude Code skill 触发召回率」的同行评审工作≈没有。** 学术只量代理(labeled benchmark 上的 tool selection),生态工作量的是冗余/描述质量(② 的上界与退化成因),唯一直接数来自实践 eval。**这本身是个实验机会**——`experiments/` 里自测 description 触发率,才能把 ECC 的传说变成可引证据。\n- **召回是宿主原生的,我们不拥有 ② 的开关**;但**决定 ② 的东西我们能塑造**:描述卫生(SkillReducer)+ 结构化去重/消歧(Agent-Skills-data)。所以结构化去重/冲突闸**就是召回杠杆**——N 一大、同质描述相撞,不治理就路由崩。\n- **③ 执行率几乎是研究空白**,而它正是 [滚动 curate](../ideas/adherence-driven-curate.md) 要的「被遵守/被矛盾」信号轴——触发了却没照做,等于一次「矛盾」。"}, {"id": "synthesis/trace-to-experience.md", "layer": "synthesis", "subtype": "", "title": "方向：从 trace 沉淀经验（intake / 入料口）", "status": "", "summary": "一次运行留下的 trace（工具 I/O、对话、运行轨迹）如何被蒸馏、固化成可复用的经验（instinct / skill / memory）？把\"以运行痕迹为底料、自动长出符号\"的来源卡聚到一起对比。这是 autoharness 的入料口轴，与下游的编辑把关（准入）、离线评测验证（裁决）正交：本方向只问料从哪来、怎么沉淀——trace 在此是候选来料（挖复现模式→候选符号，决定「提出什么」），而非裁决轴里把 trace 当验证集/真值（决定「接不接受」）。同一条 trace 不能既生成某候选又验证它（=训练集当测试集），故二者取的痕迹须物理隔离。", "body": "# 方向：从 trace 沉淀经验（intake / 入料口）\n\n一次运行留下的 trace（工具 I/O、对话、运行轨迹）如何被蒸馏、固化成可复用的经验（instinct / skill / memory）？把\"以运行痕迹为底料、自动长出符号\"的来源卡聚到一起对比。这是 autoharness 的**入料口**轴，与下游的编辑把关（准入）、[离线评测验证](offline-validation.md)（裁决）正交：本方向只问**料从哪来、怎么沉淀**——trace 在此是**候选来料**（挖复现模式→候选符号，决定「提出什么」），而非[裁决轴](offline-validation.md)里把 trace 当**验证集/真值**（决定「接不接受」）。同一条 trace 不能既生成某候选又验证它（=训练集当测试集），故二者取的痕迹须物理隔离。\n\n**硬边界（定义）**：本方向特指**不需要任何已标注 benchmark、只基于历史 trace 的经验沉淀**。料口是真实运行留下的痕迹（工具 I/O、用户对话、运行轨迹），靠频次 / 复现 / 召回 / 容量这类**无标注信号**沉淀——不预设带 ground-truth 标签的成功/失败轨迹，也不靠可判定 oracle 打分。凡是以\"已标注 benchmark / 可判定 oracle\"为前提才跑得动的蒸馏，不属于本方向。\n\n## 概念矩阵：本方向（benchmark-free · 仅历史 trace）\n\n| 来源 | 原料 | 蒸馏机制 | 沉淀产物 | 沉淀闸门 | 我的评判 |\n|---|---|---|---|---|---|\n| [ECC](../sources/github/affaan-m-ecc.md) | tool I/O（读不到 prompt，纠正靠反推） | 单次 Haiku 扫 500 行尾窗找 3+ 复现 | instinct（Action+Evidence + 频次 confidence） | 乐观写入、**无门**（curate 是死规格） | 采纳抓取+一次性生成前端；否决\"沉淀无闸\" |\n| [Hermes-Agent](../sources/github/nousresearch-hermes-agent.md) | 复杂任务后的轨迹 | 任务后自主造 skill + 容量驱动 consolidation | skill（SKILL.md）+ MEMORY/USER 平文件 | 容量上限触发 add/replace/remove | 采纳：maintain-not-grow 的生产样例 |\n| [OpenClaw](../sources/github/openclaw.md) | 短期会话信号 | 后台 Dreaming cron consolidation | MEMORY.md | **recall-utility** 门（score+召回频次+查询多样性） | 存疑：门是召回效用非净改善，off 验证谱系 |\n\n## 界外对照（需 oracle/benchmark，或原料非 trace——剔除/保留作反证与祖型）\n\n按硬边界，下列来源**不入本方向**：\n\n- ~~Trace2Skill~~ — **已剔除**：须先 roll out 出**带标注的成功+失败轨迹**才能并行提 patch，前提就是一个已标注 benchmark，与\"只基于历史 trace\"直接冲突。\n- [SKILL.md Mining](../sources/papers/skillmd-mining.md) — **否决其方法**，但保留为本方向最有力的**反证**：用 benchmark + 学到的 offline reward 去挖 trace，可读却不可迁移、丢序、还输给一个频次先验——正说明沉淀该走 benchmark-free 且 gate on 净改善。\n- [Reflexion](../sources/papers/reflexion.md) — **祖型**：`经验→反思→符号` 的反向通路；机制本身与 benchmark 无关，但其 demo 依赖环境的成功/失败反馈，故列界外。\n- [Socratic-SWE](../sources/papers/socratic-swe.md) — trace-bootstrapping 的正面样例，但筛选靠 **execution 验证 + solver-gradient 奖励**（可判定 oracle），不满足 benchmark-free；可借的只是\"只留有用派生物\"的选择思路。\n- [OpenHuman](../sources/github/tinyhumansai-openhuman.md) — 无 benchmark，但**原料是外部集成数据、不是 trace**，在料口这一维就出界；保留以对照其记忆树结构（树 vs 我们的 DAG）。\n\n## 小结\n\n**共识**：历史 trace 是无标注、可规模化的经验底料——[Reflexion](../sources/papers/reflexion.md) 立下 `经验→反思→符号` 祖型，benchmark-free 系统（ECC/Hermes/OpenClaw）在生产里把它跑通。\n\n**分歧**：沉淀闸门各不相同且大多不对齐\"任务改善\"——ECC 乐观无门、OpenClaw 召回效用、Hermes 容量上限。原料口也分裂：多数只抓 tool I/O，读不到用户原话。\n\n**空白 / wedge**：在 benchmark-free 的硬约束下，几乎所有系统都把**沉淀**与**准入裁决**混为一谈或省掉了门，且都从 tool 执行反推意图。autoharness 的切口是把 trace 当**候选来料而非裁决**，并把抓取口从执行上移到对话回合。[SKILL.md Mining](../sources/papers/skillmd-mining.md) 的反证压住底线：沉淀产物必须 gate on **净改善**，不能 gate on 可读性、更不能靠 offline proxy reward。\n\n**已蒸馏的 idea**：本方向直接喂养 [从对话回合捕获候选](../ideas/trace-based-pattern-extraction.md)（候选来料 + 抓取口上移）、[滚动 curate](../ideas/adherence-driven-curate.md)（沉淀后的存活信号）。"}], "edges": [{"from": "design/architecture.md", "to": "design/spine.md"}, {"from": "design/architecture.md", "to": "design/cap.md"}, {"from": "design/architecture.md", "to": "design/ref.md"}, {"from": "design/architecture.md", "to": "design/reflector-subagent.md"}, {"from": "design/architecture.md", "to": "design/stage-skill.md"}, {"from": "design/architecture.md", "to": "design/validate-store.md"}, {"from": "design/architecture.md", "to": "design/mng.md"}, {"from": "design/architecture.md", "to": "ideas/additive-over-native-skill.md"}, {"from": "design/architecture.md", "to": "ideas/precipitate-storage-layer.md"}, {"from": "design/cap.md", "to": "design/ref.md"}, {"from": "design/cap.md", "to": "ideas/trace-based-pattern-extraction.md"}, {"from": "design/cap.md", "to": "design/validate-store.md"}, {"from": "design/cap.md", "to": "design/reflector-subagent.md"}, {"from": "design/cap.md", "to": "ideas/additive-over-native-skill.md"}, {"from": "design/cap.md", "to": "sources/github/affaan-m-ecc.md"}, {"from": "design/mng.md", "to": "ideas/adherence-driven-curate.md"}, {"from": "design/mng.md", "to": "sources/github/nousresearch-hermes-agent.md"}, {"from": "design/mng.md", "to": "ideas/lifecycle-by-provenance.md"}, {"from": "design/mng.md", "to": "ideas/additive-over-native-skill.md"}, {"from": "design/mng.md", "to": "design/validate-store.md"}, {"from": "design/mng.md", "to": "ideas/dynamic-validation-lifecycle   a.href = cardUrl(id);
  return a;
}

function renderDirectory() {
  document.title = DATA.title + " — cards";
  meta.replaceChildren(el("span", "badge", DATA.nodes.length + " cards"));
  content.replaceChildren(el("h1", "", DATA.title + " — all cards"));
  relations.replaceChildren();
  DATA.layers.forEach(layer => {
    const members = DATA.nodes.filter(n => n.layer === layer);
    if (!members.length) return;
    const section = el("div", "dirlist");
    section.append(el("h2", "", layer.toUpperCase() + " · " + members.length));
    members.forEach(n => {
      const a = el("a", "", n.title + (n.subtype ? "  (" + n.subtype + ")" : ""));
      a.href = cardUrl(n.id);
      section.append(a);
    });
    content.append(section);
  });
}

function renderCard(id) {
  const node = nodeById[id];
  if (!node) return renderDirectory();
  document.title = node.title + " — " + DATA.title;

  meta.replaceChildren();
  const layerBadge = el("span", "badge layer", node.layer);
  layerBadge.style.setProperty("--layer-color", layerColor(node.layer));
  meta.append(layerBadge);
  if (node.subtype) meta.append(el("span", "badge", node.subtype));
  if (node.status) meta.append(el("span", "badge", "status: " + node.status));
  const raw = el("a", "raw", "open raw .md");
  raw.href = rawUrl(id);
  meta.append(raw);

  content.innerHTML = DOMPurify.sanitize(marked.parse(node.body || ""));

  content.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");
    if (/^[a-z][a-z0-9+.-]*:/i.test(href) || href.startsWith("#")) {
      a.target = "_blank"; a.rel = "noopener";
      return;
    }
    const clean = href.split("#")[0];
    const target = resolvePath(id, clean);
    a.href = nodeById[target] ? cardUrl(target) : rawUrl(target);
  });
  content.querySelectorAll("img[src]").forEach(img => {
    const src = img.getAttribute("src");
    if (!/^[a-z][a-z0-9+.-]*:/i.test(src)) img.src = rawUrl(resolvePath(id, src));
  });

  relations.replaceChildren();
  const cites = outEdges[id] || [], citedBy = inEdges[id] || [];
  if (cites.length) {
    const row = el("div", "rel-row");
    row.append(el("span", "rel-label", "links to"));
    cites.forEach(t => row.append(chipLink(t)));
    relations.append(row);
  }
  if (citedBy.length) {
    const row = el("div", "rel-row");
    row.append(el("span", "rel-label", "linked from"));
    citedBy.forEach(t => row.append(chipLink(t)));
    relations.append(row);
  }
  scrollTo(0, 0);
}

function route() {
  const id = decodeURIComponent(location.hash.slice(1));
  id ? renderCard(id) : renderDirectory();
}
addEventListener("hashchange", route);
route();

document.getElementById("theme-toggle").addEventListener("click", () => {
  const root = document.documentElement;
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  const current = root.dataset.theme || (dark ? "dark" : "light");
  root.dataset.theme = current === "dark" ? "light" : "dark";
});
</script>
</body>
</html>
